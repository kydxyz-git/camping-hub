            <div class="form-image-drop-icon">📷</div>
            <div class="form-image-drop-text">이미지 선택 또는 끌어다 놓기 (여러 장 가능)</div>
            <div class="form-image-drop-sub">자동으로 4:5 크롭 · 첫 이미지가 카드 대표 · 📋 Ctrl+V (Cmd+V) 붙여넣기</div>
          </label>
          <div id="cf-image-list" class="camp-image-list"></div>
        </div>

      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" id="cf-cancel">취소</button>
        <button class="btn" id="cf-submit">${isEdit ? '저장' : '캠핑장 추가'}</button>
      </div>
    </div>

    <div class="submit-progress" id="submit-progress">
      <div class="submit-progress-card">
        <div class="submit-progress-spinner"></div>
        <div class="submit-progress-text" id="submit-progress-text">처리 중...</div>
        <div class="submit-progress-sub" id="submit-progress-sub">잠시만 기다려주세요</div>
      </div>
    </div>
  `;

  const $ = (id) => document.getElementById(id);
  const backHash = isEdit ? `camps/${_campForm.editIdx}` : 'camps';
  $('back-btn').onclick = () => { resetCampForm(); location.hash = backHash; };
  $('cf-cancel').onclick = () => { resetCampForm(); location.hash = backHash; };

  $('cf-name').oninput = (e) => { _campForm.name = e.target.value; };
  $('cf-region').onchange = (e) => { _campForm.region = e.target.value; };
  $('cf-url').oninput = (e) => { _campForm.url = e.target.value; };
  $('cf-rating').oninput = (e) => { _campForm.rating = parseFloat(e.target.value) || 0; };
  $('cf-visits').oninput = (e) => { _campForm.visits = parseInt(e.target.value) || 0; };
  $('cf-graega').onchange = (e) => { _campForm.graega = e.target.checked; };

  // 좌표 입력 + paste 통째 분리 ("37.5665, 126.978" 형태)
  function _parseLatLngString(s) {
    if (!s) return null;
    // 공백/콤마/세미콜론으로 두 숫자 추출
    const m = s.replace(/[，;\t]/g, ',').match(/([-+]?\d+\.?\d*)\s*,\s*([-+]?\d+\.?\d*)/);
    if (!m) return null;
    const lat = parseFloat(m[1]);
    const lng = parseFloat(m[2]);
    if (isNaN(lat) || isNaN(lng)) return null;
    // 한국 범위 대략 검증 (위도 33~39, 경도 124~132)
    if (lat < 33 || lat > 39 || lng < 124 || lng > 132) return null;
    return { lat, lng };
  }
  const latInput = $('cf-lat');
  const lngInput = $('cf-lng');
  latInput.oninput = (e) => {
    const v = e.target.value.trim();
    _campForm.lat = v === '' ? null : (parseFloat(v) || null);
  };
  lngInput.oninput = (e) => {
    const v = e.target.value.trim();
    _campForm.lng = v === '' ? null : (parseFloat(v) || null);
  };
  // 위도 칸에 "lat, lng" 통째 paste 시 자동 분리
  latInput.addEventListener('paste', (e) => {
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    const parsed = _parseLatLngString(pasted);
    if (parsed) {
      e.preventDefault();
      latInput.value = parsed.lat;
      lngInput.value = parsed.lng;
      _campForm.lat = parsed.lat;
      _campForm.lng = parsed.lng;
      showToast(`📍 좌표 자동 입력: ${parsed.lat}, ${parsed.lng}`, 'success', 2500);
      _coordPickerMoveMarker(parsed.lat, parsed.lng, true);
    }
  });
  // 경도 칸에도 동일 처리 (혹시 순서 바꿔 paste할 때)
  lngInput.addEventListener('paste', (e) => {
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    const parsed = _parseLatLngString(pasted);
    if (parsed) {
      e.preventDefault();
      latInput.value = parsed.lat;
      lngInput.value = parsed.lng;
      _campForm.lat = parsed.lat;
      _campForm.lng = parsed.lng;
      showToast(`📍 좌표 자동 입력: ${parsed.lat}, ${parsed.lng}`, 'success', 2500);
      _coordPickerMoveMarker(parsed.lat, parsed.lng, true);
    }
  });

  // ─── 좌표 피커 미니맵 (Leaflet lazy load) ───
  let _pickerMap = null;
  let _pickerMarker = null;
  const pickerMsg = $('coord-picker-msg');
  function _setPickerMsg(text, isError) {
    pickerMsg.textContent = text;
    pickerMsg.style.color = isError ? '#c94a4a' : 'var(--muted)';
  }
  // 마커 이동 + 입력 칸 업데이트 (centerMap=true면 지도도 center 이동)
  function _coordPickerMoveMarker(lat, lng, centerMap) {
    if (!_pickerMap || !window.L) return;
    if (_pickerMarker) {
      _pickerMarker.setLatLng([lat, lng]);
    } else {
      _pickerMarker = L.marker([lat, lng], { draggable: true }).addTo(_pickerMap);
      _pickerMarker.on('dragend', (e) => {
        const ll = e.target.getLatLng();
        const lat2 = +ll.lat.toFixed(7), lng2 = +ll.lng.toFixed(7);
        latInput.value = lat2; lngInput.value = lng2;
        _campForm.lat = lat2; _campForm.lng = lng2;
        _setPickerMsg(`✅ 드래그 완료: ${lat2}, ${lng2}`);
      });
    }
    if (centerMap) _pickerMap.setView([lat, lng], Math.max(_pickerMap.getZoom(), 14));
  }
  // Leaflet 로드 + 지도 init
  function _initPickerMap() {
    if (_pickerMap) return;  // 한 번만
    const initLat = (typeof _campForm.lat === 'number') ? _campForm.lat : 36.5;
    const initLng = (typeof _campForm.lng === 'number') ? _campForm.lng : 127.8;
    const initZoom = (typeof _campForm.lat === 'number') ? 14 : 7;
    _pickerMap = L.map('coord-picker-map', {
      center: [initLat, initLng], zoom: initZoom,
      minZoom: 6, maxZoom: 18,
      maxBounds: [[33.0, 124.5], [38.7, 132.0]],
      maxBoundsViscosity: 1.0,
    });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 19,
    }).addTo(_pickerMap);
    // 기존 좌표 있으면 마커 표시
    if (typeof _campForm.lat === 'number' && typeof _campForm.lng === 'number') {
      _coordPickerMoveMarker(_campForm.lat, _campForm.lng, false);
    }
    // 지도 클릭 → 마커 이동 + 좌표 입력
    _pickerMap.on('click', (e) => {
      const lat = +e.latlng.lat.toFixed(7);
      const lng = +e.latlng.lng.toFixed(7);
      latInput.value = lat; lngInput.value = lng;
      _campForm.lat = lat; _campForm.lng = lng;
      _coordPickerMoveMarker(lat, lng, false);
      _setPickerMsg(`✅ 좌표 설정: ${lat}, ${lng}`);
    });
    setTimeout(() => _pickerMap.invalidateSize(), 100);
    setTimeout(() => _pickerMap.invalidateSize(), 500);
  }
  // Leaflet 라이브러리 동적 로드
  function _loadLeafletAndInit() {
    if (window.L) { _initPickerMap(); return; }
    const script = document.createElement('script');
    script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    script.crossOrigin = '';
    script.onload = () => _initPickerMap();
    script.onerror = () => _setPickerMsg('지도 로드 실패. 새로고침해주세요.', true);
    document.head.appendChild(script);
  }
  _loadLeafletAndInit();

  // 장소 검색 (Nominatim — OSM 무료 지오코딩, 사용량 1req/sec 제한)
  const searchInput = $('coord-picker-search');
  const searchBtn = $('coord-picker-search-btn');
  // 검색어가 주소처럼 보이는지 (광역시도/시/군/구/동/리/면/길/로 등 키워드)
  function _looksLikeAddress(q) {
    const addressKeywords = /(특별시|광역시|도|시|군|구|동|읍|면|리|길|로|번지|번길|아파트|빌딩|호|층)/;
    return addressKeywords.test(q);
  }
  // 초기값: 캠핑장명 또는 빈 값
  if (_campForm.name) searchInput.value = _campForm.name;
  async function _doPickerSearch() {
    const q = searchInput.value.trim();
    if (!q) { _setPickerMsg('검색어를 입력하세요', true); return; }
    _setPickerMsg('🔍 검색 중...');
    const isAddress = _looksLikeAddress(q);
    try {
      // 한국 국가 제한 + 한국어 우선, 주소면 addressdetails 활성화
      const baseParams = `format=json&countrycodes=kr&limit=5&accept-language=ko${isAddress ? '&addressdetails=1' : ''}`;
      const url = `https://nominatim.openstreetmap.org/search?${baseParams}&q=${encodeURIComponent(q)}`;
      const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
      const data = await resp.json();
      if (!data || data.length === 0) {
        _setPickerMsg('❌ 검색 결과 없음. 다른 키워드 시도 또는 지도에서 직접 클릭하세요.', true);
        return;
      }
      // 첫 결과 자동 적용
      const top = data[0];
      const lat = +parseFloat(top.lat).toFixed(7);
      const lng = +parseFloat(top.lon).toFixed(7);
      latInput.value = lat; lngInput.value = lng;
      _campForm.lat = lat; _campForm.lng = lng;
      _coordPickerMoveMarker(lat, lng, true);
      // 결과가 여러개면 후보 목록도 메시지에 표시 (다른 결과로 선택 가능)
      if (data.length > 1) {
        _coordPickerCandidates = data;  // 임시 저장
        const candidatesHtml = data.slice(0, 5).map((r, i) => {
          const label = (r.display_name || '').slice(0, 60);
          const isActive = i === 0;
          return `<span class="picker-candidate ${isActive ? 'is-active' : ''}" data-i="${i}" style="cursor:pointer;padding:2px 6px;margin:2px;display:inline-block;background:${isActive ? '#1a1a1a' : '#e8e8e8'};color:${isActive ? '#fff' : '#333'};border-radius:3px;font-size:11px;">${i+1}순위</span>`;
        }).join(' ');
        pickerMsg.innerHTML = `📍 <b>1순위 적용:</b> ${(top.display_name || '').slice(0, 50)}<br><small style="color:#666;">${data.length}개 후보 (클릭으로 변경):</small> ${candidatesHtml}`;
        pickerMsg.style.color = 'var(--muted)';
        // 후보 클릭 핸들러
        pickerMsg.querySelectorAll('.picker-candidate').forEach(el => {
          el.onclick = (e) => {
            const i = +e.currentTarget.dataset.i;
            const r = _coordPickerCandidates[i];
            if (!r) return;
            const lat2 = +parseFloat(r.lat).toFixed(7);
            const lng2 = +parseFloat(r.lon).toFixed(7);
            latInput.value = lat2; lngInput.value = lng2;
            _campForm.lat = lat2; _campForm.lng = lng2;
            _coordPickerMoveMarker(lat2, lng2, true);
            // active 상태 갱신
            pickerMsg.querySelectorAll('.picker-candidate').forEach(s => {
              s.classList.remove('is-active');
              s.style.background = '#e8e8e8';
              s.style.color = '#333';
            });
            e.currentTarget.classList.add('is-active');
            e.currentTarget.style.background = '#1a1a1a';
            e.currentTarget.style.color = '#fff';
          };
        });
      } else {
        _setPickerMsg(`📍 적용: ${(top.display_name || '').slice(0, 60)} (드래그로 미세조정 가능)`);
      }
    } catch (e) {
      _setPickerMsg('검색 실패: ' + e.message, true);
    }
  }
  let _coordPickerCandidates = [];
  searchBtn.onclick = _doPickerSearch;
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing) {
      e.preventDefault();
      _doPickerSearch();
    }
  });
  // 좌표 삭제
  $('coord-picker-clear-btn').onclick = () => {
    latInput.value = ''; lngInput.value = '';
    _campForm.lat = null; _campForm.lng = null;
    if (_pickerMarker) {
      _pickerMap.removeLayer(_pickerMarker);
      _pickerMarker = null;
    }
    _setPickerMsg('🗑 좌표 삭제됨');
  };

  // ─── 영상 URL 여러개 관리 ───
  function _renderVideosList() {
    const listEl = $('cf-videos-list');
    if (!listEl) return;
    if (_campForm.videos.length === 0) {
      listEl.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:4px 0;">아직 추가된 영상이 없어요</div>';
      return;
    }
    listEl.innerHTML = _campForm.videos.map((url, i) => `
      <div class="video-item" style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg);border:1px solid var(--line);border-radius:6px;margin-bottom:4px;">
        <span style="font-size:11px;color:var(--muted);flex-shrink:0;">🎬 ${i+1}</span>
        <a href="${escapeHtml(url)}" target="_blank" rel="noopener" style="flex:1;min-width:0;font-size:12px;color:var(--point);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(url)}</a>
        <button type="button" class="video-del-btn" data-i="${i}" style="flex-shrink:0;padding:2px 8px;background:#c94a4a;color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer;">삭제</button>
      </div>
    `).join('');
    // 삭제 버튼 핸들러
    listEl.querySelectorAll('.video-del-btn').forEach(btn => {
      btn.onclick = (e) => {
        const i = +e.target.dataset.i;
        _campForm.videos.splice(i, 1);
        _renderVideosList();
      };
    });
  }
  function _addVideo() {
    const input = $('cf-video-input');
    const url = input.value.trim();
    if (!url) { showToast('영상 URL을 입력하세요', 'error'); return; }
    if (!/^https?:\/\//i.test(url)) { showToast('http:// 또는 https://로 시작하는 URL이어야 해요', 'error'); return; }
    if (_campForm.videos.includes(url)) { showToast('이미 추가된 영상이에요', 'error'); return; }
    _campForm.videos.push(url);
    input.value = '';
    _renderVideosList();
    showToast('🎬 영상 추가됨', 'success', 1500);
  }
  $('cf-video-add-btn').onclick = _addVideo;
  $('cf-video-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing) {
      e.preventDefault();
      _addVideo();
    }
  });
  _renderVideosList();

  // extras 자유 입력
  $('cf-extras').oninput = (e) => {
    _campForm.extras = e.target.value.split(',').map(s => s.trim()).filter(Boolean);
  };

  // checkbox 그룹 (seasons / landscape)
  c.querySelectorAll('input[type="checkbox"][data-field]').forEach(cb => {
    cb.onchange = (e) => {
      const field = e.target.dataset.field;
      const val = e.target.value;
      const arr = _campForm[field];
      if (e.target.checked) {
        if (!arr.includes(val)) arr.push(val);
      } else {
        const idx = arr.indexOf(val);
        if (idx !== -1) arr.splice(idx, 1);
      }
    };
  });

  // 이미지 드래그&드롭 + 멀티 업로드
  const drop = $('cf-image-drop');
  const fileInput = $('cf-image');
  const listEl = $('cf-image-list');

  async function handleFiles(files) {
    if (_campForm.images.length + files.length > 10) {
      return showToast('이미지는 최대 10장까지 가능해요', 'error');
    }
    for (const file of files) {
      if (!file.type.startsWith('image/')) continue;
      try {
        const { base64, previewUrl, size } = await cropImage4to5(file);
        _campForm.images.push({ type: 'new', base64, previewUrl, size, fileName: file.name });
      } catch (err) {
        showToast(`'${file.name}' 처리 실패: ${err.message}`, 'error');
      }
    }
    renderImageList();
  }

  function renderImageList() {
    if (_campForm.images.length === 0) {
      listEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0;">아직 이미지가 없어요</div>';
      return;
    }
    listEl.innerHTML = _campForm.images.map((img, i) => {
      const src = img.type === 'existing' ? '../' + img.src.replace(/^\.\//, '') : img.previewUrl;
      const label = img.type === 'existing' ? '기존' : '새';
      const labelColor = img.type === 'existing' ? '#666' : '#2dab5e';
      return `
        <div class="camp-image-item" data-i="${i}" draggable="false">
          <span class="camp-image-drag" title="드래그해서 순서 변경">⋮⋮</span>
          <span class="camp-image-idx">${i+1}</span>
          <img src="${src}" alt="">
          <span class="camp-image-label" style="color:${labelColor};">${label}</span>
          <button class="camp-image-remove" data-rm="${i}">×</button>
        </div>
      `;
    }).join('');
    // 제거 버튼
    listEl.querySelectorAll('[data-rm]').forEach(btn => {
      btn.onclick = (e) => {
        e.preventDefault();
        const idx = +btn.dataset.rm;
        _campForm.images.splice(idx, 1);
        renderImageList();
      };
    });
    // 드래그&드롭 순서 변경 (SortableJS 활용)
    if (typeof Sortable !== 'undefined') {
      Sortable.create(listEl, {
        handle: '.camp-image-drag',
        animation: 180,
        delay: 200,
        delayOnTouchOnly: true,
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag',
        onEnd: () => {
          // DOM 순서대로 _campForm.images 재정렬
          const newOrder = Array.from(listEl.querySelectorAll('.camp-image-item[data-i]'))
            .map(el => +el.dataset.i);
          _campForm.images = newOrder.map(oi => _campForm.images[oi]);
          renderImageList(); // 인덱스 재표시
        }
      });
    }
  }

  fileInput.onchange = (e) => { if (e.target.files.length) handleFiles(Array.from(e.target.files)); };
  drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('is-dragover'); };
  drop.ondragleave = () => drop.classList.remove('is-dragover');
  drop.ondrop = (e) => {
    e.preventDefault(); drop.classList.remove('is-dragover');
    if (e.dataTransfer.files.length) handleFiles(Array.from(e.dataTransfer.files));
  };

  // 클립보드 paste (Ctrl+V / Cmd+V) — 한 번에 한 장씩 추가
  attachClipboardPaste((file) => handleFiles([file]));

  renderImageList();
  $('cf-submit').onclick = submitCampForm;
}

function resetCampForm() {
  _campForm = {
    mode: 'add', editIdx: null,
    name: '', region: '', seasons: [], landscape: [], extras: [],
    graega: false, url: '', rating: 0, visits: 0,
    lat: null, lng: null,
    videos: [],
    images: [],
  };
}

async function submitCampForm() {
  const isEdit = _campForm.mode === 'edit';

  // 검증
  if (!_campForm.name.trim()) return showToast('캠핑장 이름을 입력해주세요', 'error');
  if (!_campForm.region) return showToast('지역을 선택해주세요', 'error');

  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    return showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');
  }

  const progress = document.getElementById('submit-progress');
  const ptext = document.getElementById('submit-progress-text');
  const psub = document.getElementById('submit-progress-sub');
  progress.classList.add('is-active');

  try {
    ptext.textContent = '데이터 준비 중...';
    psub.textContent = '이미지 경로 계산';

    const newCamps = JSON.parse(JSON.stringify(cache.camps));

    // 이미지 처리: 새 이미지의 경로 결정, 기존 이미지 경로 유지
    // 기존 캠핑장에 새 이미지 추가 시: 기존 hash 재사용. 새 캠핑장이면 새 hash 생성.
    let existingHash = null;
    if (isEdit) {
      // 기존 이미지에서 hash 추출 (없으면 새로 생성)
      const firstExisting = _campForm.images.find(img => img.type === 'existing');
      if (firstExisting) {
        const m = firstExisting.src.match(/camps\/([a-f0-9]+)(?:-\d+)?\.jpg/);
        if (m) existingHash = m[1];
      }
    }
    const hash = existingHash || _campImgIdBase();

    // 최종 imgs 배열 + 업로드할 새 이미지 + 삭제할 이미지 계산
    const finalImgs = [];
    const filesToUpload = [];
    const filesToDelete = [];

    // 이미지 순서대로 새 파일명 부여 (1번째: hash.jpg, 2번째: hash-2.jpg, ...)
    // BUT 기존 이미지면 경로 그대로 유지 (이름 안 바꿈)
    // 다만 첫 자리에 기존 이미지가 와야 하는 경우와 새 이미지가 와야 하는 경우가 섞이면 복잡
    // 단순화: 모두 새 파일명 부여 + 기존 파일 다 삭제 + 모두 새로 업로드
    // 이게 깔끔. base64 fetch 한 번 더 하는 비용은 작음.

    // 1) 기존 imgs 전체를 일단 삭제 후보로 (실제로 쓰는지 나중에 결정)
    const oldImgs = isEdit ? (cache.camps[_campForm.editIdx].imgs || []) : [];
    const oldImgPaths = oldImgs.map(p => p.replace(/^\.\//, ''));

    // 2) 새 imgs 배열 구성
    for (let i = 0; i < _campForm.images.length; i++) {
      const img = _campForm.images[i];
      const fname = i === 0 ? `${hash}.jpg` : `${hash}-${i+1}.jpg`;
      const newPath = `images/camps/${fname}`;
      finalImgs.push(`./${newPath}`);

      if (img.type === 'new') {
        filesToUpload.push({ path: newPath, content: img.base64, encoding: 'base64' });
      } else if (img.type === 'existing') {
        // 같은 경로면 그대로 둠 (덮어쓸 필요 없음)
        const oldNoDot = img.src.replace(/^\.\//, '');
        if (oldNoDot === newPath) {
          // 같음, 아무것도 안 함
        } else {
          // 경로가 바뀜 (순서 변경 때문) → 기존 파일을 fetch해서 새 경로에 업로드
          ptext.textContent = `이미지 재배치 중... (${i+1}/${_campForm.images.length})`;
          const url = '../' + oldNoDot;
          const resp = await fetch(url);
          const blob = await resp.blob();
          const b64 = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result.split(',')[1]);
            r.onerror = () => rej(new Error('fetch failed'));
            r.readAsDataURL(blob);
          });
          filesToUpload.push({ path: newPath, content: b64, encoding: 'base64' });
        }
      }
    }

    // 3) 삭제할 파일: 기존 파일 중 새 finalImgs에 없는 것
    const finalImgPaths = new Set(finalImgs.map(p => p.replace(/^\.\//, '')));
    for (const oldPath of oldImgPaths) {
      if (!finalImgPaths.has(oldPath)) {
        filesToDelete.push(oldPath);
      }
    }

    // 4) 캠핑장 객체 구성
    const _nowIso = new Date().toISOString();
    const _oldCamp = isEdit ? cache.camps[_campForm.editIdx] : null;
    const campObj = {
      id: isEdit
        ? (_oldCamp.id || makeContentId('camp', _campForm.name.trim()))
        : makeContentId('camp', _campForm.name.trim()),
      name: _campForm.name.trim(),
      region: _campForm.region,
      seasons: _campForm.seasons,
      landscape: _campForm.landscape,
      extras: _campForm.extras,
      graega: _campForm.graega,
      url: _campForm.url.trim(),
      imgs: finalImgs,
      rating: _campForm.rating,
      visits: _campForm.visits,
      published: isEdit ? (_oldCamp.published !== false) : true,
      created_at: isEdit ? (_oldCamp.created_at || _nowIso) : _nowIso,
      updated_at: _nowIso,
    };
    // 좌표 (값 있을 때만 포함 — null/undefined는 JSON에서 깔끔하게 생략)
    if (typeof _campForm.lat === 'number' && !isNaN(_campForm.lat)) campObj.lat = _campForm.lat;
    if (typeof _campForm.lng === 'number' && !isNaN(_campForm.lng)) campObj.lng = _campForm.lng;
    // 개별 영상 URL (비어있지 않을 때만 포함)
    if (Array.isArray(_campForm.videos) && _campForm.videos.length > 0) {
      campObj.videos = _campForm.videos.slice();
    }

    if (isEdit) {
      newCamps[_campForm.editIdx] = campObj;
    } else {
      newCamps.push(campObj);
    }

    const action = isEdit ? '수정' : '추가';
    const message = `${isEdit ? 'update' : 'sync'}(admin): 캠핑장 '${campObj.name}' ${action}`;
    ptext.textContent = 'GitHub 업로드 중...';
    psub.textContent = `이미지 ${filesToUpload.length}장 · 데이터${filesToDelete.length ? ` · 삭제 ${filesToDelete.length}` : ''}`;

    await ghCommitWithDeletions(
      [
        ...filesToUpload,
        { path: 'data/camps.json', content: JSON.stringify(newCamps, null, 2) + '\n', encoding: 'utf-8' },
      ],
      filesToDelete,
      message
    );

    cache.camps = newCamps;
    cache.loadedAt = Date.now();

    ptext.textContent = '완료!';
    psub.textContent = '1~2분 후 사이트에 반영됩니다';
    setTimeout(() => {
      progress.classList.remove('is-active');
      resetCampForm();
      showToast(`캠핑장 '${campObj.name}' ${action} 완료!`, 'success', 3500);
      location.hash = isEdit ? `camps/${_campForm.editIdx}` : 'camps';
    }, 1000);

  } catch (e) {
    progress.classList.remove('is-active');
    console.error(e);
    showToast('업로드 실패: ' + e.message, 'error', 5000);
  }
}

// 캠핑장 삭제
async function deleteCamp(idx) {
  const camp = cache.camps[idx];
  if (!camp) return;

  if (!confirm(`캠핑장 '${camp.name}'을(를) 삭제할까요?\n\n이미지 ${(camp.imgs || []).length}장도 함께 삭제됩니다. 되돌릴 수 없어요.`)) return;
  if (!confirm(`정말로 삭제할까요? 마지막 확인입니다.`)) return;

  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    return showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');
  }

  const progress = document.createElement('div');
  progress.className = 'submit-progress is-active';
  progress.innerHTML = `
    <div class="submit-progress-card">
      <div class="submit-progress-spinner"></div>
      <div class="submit-progress-text">캠핑장 삭제 중...</div>
      <div class="submit-progress-sub">GitHub 업로드</div>
    </div>
  `;
  document.body.appendChild(progress);

  try {
    const newCamps = JSON.parse(JSON.stringify(cache.camps));
    newCamps.splice(idx, 1);

    const deletePaths = (camp.imgs || []).map(p => p.replace(/^\.\//, ''));

    const message = `delete(admin): 캠핑장 '${camp.name}' 삭제`;
    await ghCommitWithDeletions(
      [{ path: 'data/camps.json', content: JSON.stringify(newCamps, null, 2) + '\n', encoding: 'utf-8' }],
      deletePaths,
      message
    );

    cache.camps = newCamps;
    cache.loadedAt = Date.now();

    progress.remove();
    showToast(`캠핑장 '${camp.name}' 삭제됨`, 'success', 2500);
    location.hash = 'camps';
  } catch (e) {
    progress.remove();
    console.error(e);
    showToast('삭제 실패: ' + e.message, 'error', 5000);
  }
}

// ════════════════════════════════════════════════════════════════════
// 시리즈 리스트 (2레벨: 시리즈 그룹 → EP)
// ════════════════════════════════════════════════════════════════════
const _seriesOpen = new Set([0]); // 첫 시리즈는 기본 펼침
let _seriesDragOrder = null; // 드래그로 변경된 시리즈 순서 (null이면 변경 없음)
let _epDragOrder = null;     // EP 수동 정렬 변경 상태 { si: number, newOrder: number[] }

function renderSeriesList() {
  document.getElementById('topbar-title').innerHTML = '🎬 시리즈 EP';
  const c = document.getElementById('app-content');
  const totalEps = cache.series.reduce((s,x) => s + x.eps.length, 0);
  c.innerHTML = `
    <div class="page-header">
      <button class="page-back" id="back-btn">← 대시보드</button>
      <a class="btn btn-sm" href="#series/new" style="margin-left:auto;">+ EP 추가</a>
      <div class="page-count">${cache.series.length}시리즈 · ${totalEps}편</div>
    </div>
    <div id="series-sortable">
      ${cache.series.map((s, si) => {
        const sPub = s.published !== false;
        return `
        <div class="series-group ${_seriesOpen.has(si) ? 'is-open' : ''} ${sPub ? '' : 'is-unpublished'}" data-si="${si}">
          <div class="series-group-bar" style="background:${escapeHtml(s.color || 'var(--accent-soft)')}"></div>
          <div class="series-group-header">
            <span class="drag-handle" title="드래그해서 순서 변경">⋮⋮</span>
            <div class="series-group-header-clickable" data-toggle="${si}">
              <span class="series-group-emoji">${escapeHtml(s.emoji || '🎬')}</span>${escapeHtml(s.name)}<span class="series-group-count">${s.eps.length}편</span>
            </div>
            <div class="series-group-header-right">
              ${toggleHtml(sPub, `data-series-toggle="${si}"`, 'green')}
              <span class="series-group-arrow" data-toggle="${si}">›</span>
            </div>
          </div>
          <div class="series-group-eps">
            <div class="series-sort-bar">
              <span class="series-sort-label">EP 정렬:</span>
              <select class="series-sort-select" data-series-sort="${si}"
                      onmousedown="event.stopPropagation();" onclick="event.stopPropagation();" ontouchstart="event.stopPropagation();">
                ${SORT_MODES.map(m => `<option value="${m.value}" ${(s.sort || 'ep_desc') === m.value ? 'selected' : ''}>${m.label}</option>`).join('')}
              </select>
            </div>
            ${(s.sort === 'random') ? `<div class="series-sort-note">🎲 메인 사이트에서는 매 페이지 로드마다 다른 순서로 보입니다 (admin은 입력 순서)<br>✨ 최근 7일 이내 신규 EP는 항상 상위에 노출됩니다</div>` : ''}
            <div class="ep-sortable" data-ep-sortable="${si}">
              ${getSortedEpsForAdmin(s).map(({ ep, ei }) => {
                const epPub = ep.published !== false;
                const isManual = (s.sort || 'ep_desc') === 'manual';
                return `
                <div class="series-ep-item ${epPub ? '' : 'is-unpublished'}" data-ei="${ei}">
                  ${isManual ? `<span class="drag-handle drag-handle--ep" title="드래그해서 순서 변경">⋮⋮</span>` : ''}
                  <a class="series-ep-link" href="#series/${si}/${ei}">
                    <span class="series-ep-num">${ep.ep > 0 ? 'EP.' + String(ep.ep).padStart(2, '0') : '단편'}</span>
                    <span class="series-ep-title">${escapeHtml(ep.title)}</span>
                  </a>
                  ${toggleHtml(epPub, `data-ep-toggle="${si}-${ei}"`)}
                  <a class="series-ep-arrow" href="#series/${si}/${ei}">›</a>
                </div>
                `;
              }).join('')}
            </div>
            <div class="series-group-actions">
              <a class="btn btn-secondary btn-sm" href="#series-edit/${si}">✏️ 시리즈 수정</a>
              <button class="btn btn-danger btn-sm" data-series-delete="${si}" ${s.eps.length > 0 ? 'disabled title="EP가 있는 시리즈는 삭제할 수 없어요. EP를 먼저 모두 삭제하세요."' : ''}>🗑 시리즈 삭제</button>
            </div>
          </div>
        </div>
        `;
      }).join('')}

      <a class="series-add-card" href="#series/new-series">
        <span class="series-add-icon">+</span>
        <span>새 시리즈 만들기</span>
      </a>
    </div>
  `;
  document.getElementById('back-btn').onclick = () => {
    location.hash = '';
  };
  // 시리즈 그룹 펼치기/접기 — 명시적으로 toggle 영역만
  c.querySelectorAll('[data-toggle]').forEach(h => {
    h.onclick = () => {
      const si = +h.dataset.toggle;
      if (_seriesOpen.has(si)) _seriesOpen.delete(si);
      else _seriesOpen.add(si);
      h.closest('.series-group').classList.toggle('is-open');
    };
  });
  // 시리즈 공개/비공개 토글
  c.querySelectorAll('[data-series-toggle]').forEach(toggleEl => {
    const cb = toggleEl.querySelector('input');
    cb.addEventListener('change', async (e) => {
      e.stopPropagation();
      const si = +toggleEl.dataset.seriesToggle;
      const ok = await togglePublished('series', { si }, e.target.checked, toggleEl);
      if (ok) {
        toggleEl.closest('.series-group').classList.toggle('is-unpublished', !e.target.checked);
      }
    });
  });
  // EP 공개/비공개 토글
  c.querySelectorAll('[data-ep-toggle]').forEach(toggleEl => {
    const cb = toggleEl.querySelector('input');
    cb.addEventListener('change', async (e) => {
      e.stopPropagation();
      const [si, ei] = toggleEl.dataset.epToggle.split('-').map(Number);
      const ok = await togglePublished('series-ep', { si, ei }, e.target.checked, toggleEl);
      if (ok) {
        toggleEl.closest('.series-ep-item').classList.toggle('is-unpublished', !e.target.checked);
      }
    });
  });
  // 시리즈 삭제 버튼
  c.querySelectorAll('[data-series-delete]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const si = +btn.dataset.seriesDelete;
      deleteSeries(si);
    };
  });

  // EP 정렬 모드 변경
  c.querySelectorAll('[data-series-sort]').forEach(sel => {
    sel.addEventListener('change', async (e) => {
      e.stopPropagation();
      const si = +sel.dataset.seriesSort;
      const newSort = sel.value;
      await changeSeriesSort(si, newSort, sel);
    });
    // 드롭다운 클릭이 시리즈 그룹 펼치기에 영향 안 가게
    sel.addEventListener('click', (e) => e.stopPropagation());
  });

  // 드래그&드롭 정렬 (시리즈 그룹만)
  const sortableEl = document.getElementById('series-sortable');
  if (sortableEl && typeof Sortable !== 'undefined') {
    Sortable.create(sortableEl, {
      handle: '.series-group > .series-group-header > .drag-handle', // 시리즈 헤더의 핸들만
      animation: 180,
      delay: 200,
      delayOnTouchOnly: true,
      forceFallback: false,
      // 드래그 대상에서 제외: select, button, input, a 태그 (이벤트가 정상 동작하도록)
      filter: 'select, button, input, a, label.pub-toggle',
      preventOnFilter: false,
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      onEnd: (evt) => {
        // 새 순서 계산 (드래그 직후 DOM 상태 기준)
        const newOrder = Array.from(sortableEl.querySelectorAll('.series-group[data-si]'))
          .map(el => +el.dataset.si);
        const originalOrder = cache.series.map((_, i) => i);
        const changed = newOrder.some((v, i) => v !== originalOrder[i]);
        if (!changed) return; // 변경 없으면 무시
        // 자동 저장: 즉시 commit (저장 바 거치지 않음)
        saveSeriesOrder(newOrder);
      }
    });
  }

  // EP 드래그&드롭 정렬 (sort=manual인 시리즈만)
  if (typeof Sortable !== 'undefined') {
    c.querySelectorAll('[data-ep-sortable]').forEach(epContainer => {
      const si = +epContainer.dataset.epSortable;
      const series = cache.series[si];
      if (!series || (series.sort || 'ep_desc') !== 'manual') return;

      Sortable.create(epContainer, {
        handle: '.drag-handle--ep',
        animation: 180,
        delay: 200,
        delayOnTouchOnly: true,
        filter: 'select, button, input, a, label.pub-toggle',
        preventOnFilter: false,
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag',
        onEnd: (evt) => {
          const newOrder = Array.from(epContainer.querySelectorAll('.series-ep-item[data-ei]'))
            .map(el => +el.dataset.ei);
          const originalOrder = series.eps.map((_, i) => i);
          const changed = newOrder.some((v, i) => v !== originalOrder[i]);
          if (!changed) return;
          // 자동 저장: 즉시 commit (저장 바 거치지 않음)
          saveEpOrder(si, newOrder);
        }
      });
    });
  }
}

// 시리즈 정렬 모드 변경 (드롭다운 즉시 commit)
async function changeSeriesSort(si, newSort, selectEl) {
  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    selectEl.value = cache.series[si].sort || 'ep_desc'; // 원복
    return showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');
  }

  // 진행 오버레이 — 다른 클릭/조작 차단
  const progress = document.createElement('div');
  progress.className = 'submit-progress is-active';
  progress.innerHTML = `
    <div class="submit-progress-card">
      <div class="submit-progress-spinner"></div>
      <div class="submit-progress-text">정렬 모드 변경 중...</div>
      <div class="submit-progress-sub">GitHub 업로드</div>
    </div>
  `;
  document.body.appendChild(progress);

  try {
    const newSeries = JSON.parse(JSON.stringify(cache.series));
    newSeries[si].sort = newSort;
    const modeLabel = (SORT_MODES.find(m => m.value === newSort) || {}).label || newSort;
    const message = `sort(admin): 시리즈 '${newSeries[si].name}' 정렬 → ${modeLabel}`;
    await ghCommitMultipleFiles([
      { path: 'data/series.json', content: JSON.stringify(newSeries, null, 2) + '\n', encoding: 'utf-8' },
    ], message);
    cache.series = newSeries;
    cache.loadedAt = Date.now();
    // 결과 즉시 확인 위해 해당 시리즈 자동 펼침
    _seriesOpen.add(si);
    // 정렬 모드 변경은 자동 저장이므로, 드래그 저장 바 상태도 같이 정리
    _seriesDragOrder = null;
    progress.remove();
    showToast(`정렬: ${modeLabel}`, 'success', 2000);
    // 항상 재렌더 (admin 화면도 즉시 새 정렬 결과 반영)
    renderSeriesList();
  } catch (e) {
    console.error(e);
    progress.remove();
    selectEl.disabled = false;
    selectEl.value = cache.series[si].sort || 'ep_desc'; // 원복
    showToast('변경 실패: ' + e.message, 'error', 4000);
  }
}

// 음식/장비 정렬 모드 변경 (config.json에 foodsSort/itemsSort 저장)
async function changeProductSort(type, newSort, selectEl) {
  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    selectEl.value = (cache.config && cache.config[type + 'Sort']) || 'random';
    return showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');
  }
  const prevVal = selectEl.value;
  selectEl.disabled = true;
  const progress = document.createElement('div');
  progress.className = 'submit-progress is-active';
  progress.innerHTML = `
    <div class="submit-progress-card">
      <div class="submit-progress-spinner"></div>
      <div class="submit-progress-text">정렬 모드 변경 중...</div>
      <div class="submit-progress-sub">GitHub 업로드</div>
    </div>
  `;
  document.body.appendChild(progress);
  try {
    const newConfig = JSON.parse(JSON.stringify(cache.config || {}));
    newConfig[type + 'Sort'] = newSort;
    const modeLabel = (PRODUCT_SORT_MODES.find(m => m.value === newSort) || {}).label || newSort;
    const typeLabel = type === 'foods' ? '음식' : '장비';
    const message = `sort(admin): ${typeLabel} 정렬 → ${modeLabel}`;
    await ghCommitMultipleFiles([
      { path: 'data/config.json', content: JSON.stringify(newConfig, null, 2) + '\n', encoding: 'utf-8' },
    ], message);
    cache.config = newConfig;
    cache.loadedAt = Date.now();
    progress.remove();
    selectEl.disabled = false;
    showToast(`${typeLabel} 정렬 → ${modeLabel}`, 'success');
    // 리스트 다시 그려서 admin 화면도 새 정렬 반영 (manual은 드래그 핸들 노출)
    if (type === 'foods') renderFoodList();
    else renderItemList();
  } catch (e) {
    console.error(e);
    progress.remove();
    selectEl.disabled = false;
    selectEl.value = prevVal;
    showToast('변경 실패: ' + e.message, 'error', 4000);
  }
}

// 음식/장비 수동 순서 commit (드래그앤드롭 후 호출)
async function saveProductOrder(type, newOrder) {
  if (!newOrder || !newOrder.length) return;
  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');
    if (type === 'foods') renderFoodList(); else renderItemList();
    return;
  }
  const progress = document.createElement('div');
  progress.className = 'submit-progress is-active';
  progress.innerHTML = `
    <div class="submit-progress-card">
      <div class="submit-progress-spinner"></div>
      <div class="submit-progress-text">순서 저장 중...</div>
      <div class="submit-progress-sub">GitHub 업로드</div>
    </div>
  `;
  document.body.appendChild(progress);
  try {
    const cacheKey = type;
    const origArr = cache[cacheKey];
    const reordered = newOrder.map(i => origArr[i]);
    const typeLabel = type === 'foods' ? '음식' : '장비';
    const dataPath = `data/${cacheKey}.json`;
    await ghCommitMultipleFiles([
      { path: dataPath, content: JSON.stringify(reordered, null, 2) + '\n', encoding: 'utf-8' },
    ], `sort(admin): ${typeLabel} 수동 순서 변경`);
    cache[cacheKey] = reordered;
    cache.loadedAt = Date.now();
    progress.remove();
    showToast('순서 저장 완료', 'success');
  } catch (e) {
    console.error(e);
    progress.remove();
    showToast('순서 저장 실패: ' + e.message, 'error', 4000);
    if (type === 'foods') renderFoodList(); else renderItemList();
  }
}

async function saveSeriesOrder(newOrder) {
  if (!newOrder || !newOrder.length) return;

  progress.className = 'submit-progress is-active';

    <div class="submit-progress-card">
      <div class="submit-progress-spinner"></div>
      <div class="submit-progress-text">시리즈 순서 저장 중...</div>
      <div class="submit-progress-sub">GitHub 업로드</div>
    </div>
  `;
  document.body.appendChild(progress);

  try {
    const message = `reorder(admin): 시리즈 순서 변경 (${newSeries.map(s => s.name).slice(0, 3).join(', ')}${newSeries.length > 3 ? ' …' : ''})`;
    await ghCommitMultipleFiles([

    ], message);

    cache.series = newSeries;
    cache.loadedAt = Date.now();
    _seriesDragOrder = null;

  }
}

function suggestNextEp(seriesIdx) {
  const s = cache.series[seriesIdx];
  if (!s) return 1;
  const maxEp = s.eps.reduce((m, e) => Math.max(m, e.ep || 0), 0);
  return maxEp + 1;
}

function renderEpAddForm() {
  // 폼 초기화 (이전 상태 정리)
  if (!_epForm._initialized || _epForm.mode !== 'add') {
    _epForm = {
      mode: 'add',
      editSi: null, editEi: null,
      seriesIdx: 0,
      ep: suggestNextEp(0),
      title: '', url: '',
      camp_id: '',
      imageBase64: null, imagePreviewUrl: null, imageSize: 0,
      imageChanged: false,
      _initialized: true,
    };

  _renderEpFormUI();
}

          <select id="f-camp">
            <option value="">— 연결 안 함 —</option>
            ${(cache.camps || []).slice().sort((a,b) => (a.name||'').localeCompare(b.name||'', 'ko')).map(c => {
              const hasCoord = typeof c.lat === 'number' && typeof c.lng === 'number';
              const gIcon = c.graega ? '⭐ ' : '';

              return `<option value="${escapeHtml(c.id)}" ${c.id === _epForm.camp_id ? 'selected' : ''}>${gIcon}${coordIcon}${escapeHtml(c.name)}</option>`;

    // add 모드일 때만 EP 번호 자동 제안 (수정 시엔 유지)
    if (!isEdit) {
      $('f-ep').value = suggestNextEp(_epForm.seriesIdx);
      _epForm.ep = +$('f-ep').value;
    }
  };
  $('f-ep').oninput = (e) => { _epForm.ep = e.target.value; };
  $('f-title').oninput = (e) => { _epForm.title = e.target.value; };
  $('f-url').oninput = (e) => { _epForm.url = e.target.value; };
  $('f-camp').onchange = (e) => { _epForm.camp_id = e.target.value || ''; };

  // 이미지 업로드 + 드래그&드롭
  const drop = $('f-image-drop');
  const fileInput = $('f-image');

  async function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      showToast('이미지 파일만 가능해요', 'error');
      return;
    }
    try {
      previewEl.innerHTML = '<div class="loading">이미지 처리 중...</div>';
      const { base64, previewUrl, size } = await cropImage4to5(file);
      _epForm.imageBase64 = base64;
      _epForm.imagePreviewUrl = previewUrl;
      _epForm.imageSize = size;
      _epForm.imageChanged = true;
      renderImagePreview();
    } catch (err) {
      previewEl.innerHTML = '';
      showToast('이미지 처리 실패: ' + err.message, 'error');
    }
  }

  function renderImagePreview() {
    if (!_epForm.imagePreviewUrl) {
      previewEl.innerHTML = '';
      return;

    const isNew = _epForm.imageChanged;
    previewEl.innerHTML = `
      <div class="form-image-preview">
        <div class="form-image-preview-thumb"><img src="${_epForm.imagePreviewUrl}" alt=""></div>

      </div>
    `;
    if (isNew) {
      $('f-image-remove').onclick = (e) => {
        e.preventDefault();
        _epForm.imageBase64 = null;
        _epForm.imageChanged = false;
        // edit 모드면 기존 이미지로 복원, add 모드면 비움
        if (isEdit) {
          const orig = cache.series[_epForm.editSi].eps[_epForm.editEi];
          _epForm.imagePreviewUrl = orig.thumb ? '../' + orig.thumb.replace(/^\.\//, '') : null;
        } else {
          _epForm.imagePreviewUrl = null;
        }
        fileInput.value = '';
        renderImagePreview();
      };
    }
  }

  fileInput.onchange = (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); };
  drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('is-dragover'); };
  drop.ondragleave = () => drop.classList.remove('is-dragover');
  drop.ondrop = (e) => {
    e.preventDefault(); drop.classList.remove('is-dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  };

  // 클립보드 paste (Ctrl+V / Cmd+V)
  attachClipboardPaste(handleFile);

  renderImagePreview(); // 기존 이미지 표시
  $('f-submit').onclick = submitEpForm;
}

function resetEpForm() {
  _epForm = {
    mode: 'add', editSi: null, editEi: null,
    seriesIdx: 0, ep: '', title: '', url: '',
    camp_id: '',
    imageBase64: null, imagePreviewUrl: null, imageSize: 0,
    imageChanged: false,
    _initialized: false,
  };
}

async function submitEpForm() {
  const isEdit = _epForm.mode === 'edit';
  const series = cache.series[_epForm.seriesIdx];

  // 검증
  if (!series) return showToast('시리즈를 선택해주세요', 'error');
  if (_epForm.ep === '' || _epForm.ep === null || isNaN(+_epForm.ep)) return showToast('EP 번호를 입력해주세요', 'error');
  if (!_epForm.title.trim()) return showToast('제목을 입력해주세요', 'error');
  if (!_epForm.url.trim()) return showToast('릴스 URL을 입력해주세요', 'error');
  if (!isEdit && !_epForm.imageBase64) return showToast('썸네일 이미지를 선택해주세요', 'error');

  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    return showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');
  }

  const ep = +_epForm.ep;

  // 진행 오버레이
  const progress = document.getElementById('submit-progress');
  const ptext = document.getElementById('submit-progress-text');
  const psub = document.getElementById('submit-progress-sub');
  progress.classList.add('is-active');

  try {
    ptext.textContent = '데이터 준비 중...';
    psub.textContent = '시리즈 정보 갱신';
    const newSeries = JSON.parse(JSON.stringify(cache.series));
    const files = [];

    if (isEdit) {
      // === 수정 모드 ===
      const oldSi = _epForm.editSi;
      const oldEi = _epForm.editEi;
      const oldEp = newSeries[oldSi].eps[oldEi];
      const oldThumb = oldEp.thumb;

      // 새 슬러그 (시리즈/EP번호 바뀌었을 수 있음)
      const newSlug = getSeriesSlug(series.name, ep);
      const newImagePath = `images/series/${newSlug}.jpg`;
      const newThumbField = `./${newImagePath}`;

      // 시리즈/EP번호/이미지 변경 여부 확인
      const slugChanged = oldThumb !== newThumbField;
      const imageChanged = _epForm.imageChanged;

      // 새 EP 객체
      const _nowIsoEp = new Date().toISOString();
      const updatedEp = {
        id: oldEp.id || makeContentId('ep', `${newSeries[_epForm.seriesIdx].name}_${_epForm.title.trim()}_${ep}`),
        ep: ep,
        title: _epForm.title.trim(),
        url: _epForm.url.trim(),
        thumb: newThumbField,
        published: oldEp.published !== false,
        created_at: oldEp.created_at || _nowIsoEp,
        updated_at: _nowIsoEp,
      };
      // 캠핑장 연결 (값 있을 때만 필드 포함)
      if (_epForm.camp_id) updatedEp.camp_id = _epForm.camp_id;

      // 시리즈가 같으면 자리 유지 (정렬 모드가 ep_desc/asc면 자동 재정렬되므로 그냥 두기)
      // 시리즈가 바뀌면 원래 시리즈에서 제거 + 새 시리즈에 삽입
      if (_epForm.seriesIdx === oldSi) {
        newSeries[oldSi].eps[oldEi] = updatedEp;
      } else {
        // 원래 시리즈에서 제거
        newSeries[oldSi].eps.splice(oldEi, 1);
        // 새 시리즈에 삽입 (ep 번호 내림차순 자리 찾기)
        const targetEps = newSeries[_epForm.seriesIdx].eps;
        if (ep > 0) {
          let inserted = false;
          for (let i = 0; i < targetEps.length; i++) {
            if ((targetEps[i].ep || 0) > 0 && targetEps[i].ep < ep) {
              targetEps.splice(i, 0, updatedEp); inserted = true; break;
            }
          }
          if (!inserted) targetEps.push(updatedEp);
        } else {
          targetEps.unshift(updatedEp);
        }
      }

      // 이미지 처리
      if (imageChanged) {
        // 새 이미지 업로드 (새 경로로)
        files.push({ path: newImagePath, content: _epForm.imageBase64, encoding: 'base64' });
      } else if (slugChanged && oldThumb) {
        // 이미지는 안 바뀌었는데 슬러그(시리즈/EP번호)가 바뀜
        // → 옛 이미지를 새 경로로 복사. 옛 파일은 정리 안 함 (안전, 작업 단순)
        // 클라이언트에서 이미지 fetch → base64 → 새 경로로 업로드
        ptext.textContent = '이미지 이동 중...';
        const oldUrl = '../' + oldThumb.replace(/^\.\//, '');
        const imgResp = await fetch(oldUrl);
        const imgBlob = await imgResp.blob();
        const imgBase64 = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result.split(',')[1]);
          r.onerror = () => reject(new Error('이미지 읽기 실패'));
          r.readAsDataURL(imgBlob);
        });
        files.push({ path: newImagePath, content: imgBase64, encoding: 'base64' });
      }
      // (slugChanged 안 됐고 imageChanged 안 됐으면 이미지 파일 변경 없음)

      files.push({ path: 'data/series.json', content: JSON.stringify(newSeries, null, 2) + '\n', encoding: 'utf-8' });

      const message = `update(admin): ${series.name} ${ep > 0 ? 'EP.' + String(ep).padStart(2, '0') : '단편'} '${updatedEp.title}' 수정`;
      ptext.textContent = 'GitHub 업로드 중...';
      await ghCommitMultipleFiles(files, message);

      cache.series = newSeries;
      cache.loadedAt = Date.now();

      ptext.textContent = '완료!';
      psub.textContent = '1~2분 후 사이트에 반영됩니다';
      setTimeout(() => {
        progress.classList.remove('is-active');
        resetEpForm();
        showToast('EP 수정 완료!', 'success', 3500);
        location.hash = 'series';
      }, 1000);

    } else {
      // === 추가 모드 (기존 로직) ===
      const slug = getSeriesSlug(series.name, ep);
      const imagePath = `images/series/${slug}.jpg`;
      const _nowIsoEpNew = new Date().toISOString();
      const newEp = {
        id: makeContentId('ep', `${series.name}_${_epForm.title.trim()}_${ep}`),
        ep: ep,
        title: _epForm.title.trim(),
        url: _epForm.url.trim(),
        thumb: `./${imagePath}`,
        published: true,
        created_at: _nowIsoEpNew,
        updated_at: _nowIsoEpNew,
      };
      if (_epForm.camp_id) newEp.camp_id = _epForm.camp_id;

      const targetSeries = newSeries[_epForm.seriesIdx];
      if (ep > 0) {
        let inserted = false;
        for (let i = 0; i < targetSeries.eps.length; i++) {
          if ((targetSeries.eps[i].ep || 0) > 0 && targetSeries.eps[i].ep < ep) {
            targetSeries.eps.splice(i, 0, newEp); inserted = true; break;
          }
        }
        if (!inserted) targetSeries.eps.push(newEp);
      } else {
        targetSeries.eps.unshift(newEp);
      }

      const today = kstToday();
      const sitemapResp = await fetch(`../sitemap.xml?v=${Date.now()}`);
      const sitemapText = await sitemapResp.text();
      const newSitemap = sitemapText.replace(/<lastmod>\d{4}-\d{2}-\d{2}<\/lastmod>/g, `<lastmod>${today}</lastmod>`);

      ptext.textContent = 'GitHub 업로드 중...';
      psub.textContent = '이미지 + 데이터';

      const message = `sync(admin): ${series.name} ${ep > 0 ? 'EP.' + String(ep).padStart(2, '0') : '단편'} '${newEp.title}' 추가`;
      await ghCommitMultipleFiles([
        { path: imagePath, content: _epForm.imageBase64, encoding: 'base64' },
        { path: 'data/series.json', content: JSON.stringify(newSeries, null, 2) + '\n', encoding: 'utf-8' },
        { path: 'sitemap.xml', content: newSitemap, encoding: 'utf-8' },
      ], message);

      cache.series = newSeries;
      cache.loadedAt = Date.now();

      ptext.textContent = '완료!';
      psub.textContent = '1~2분 후 사이트에 반영됩니다';
      setTimeout(() => {
        progress.classList.remove('is-active');
        resetEpForm();
        showToast('EP 추가 완료!', 'success', 3500);
        location.hash = 'series';
      }, 1000);
    }

  } catch (e) {
    progress.classList.remove('is-active');
    console.error(e);
    showToast('업로드 실패: ' + e.message, 'error', 5000);
  }
}

// EP 삭제
// ════════════════════════════════════════════════════════════════════
async function deleteEp(si, ei) {
  const series = cache.series[si];
  if (!series) return;
  const ep = series.eps[ei];
  if (!ep) return;

  // 2단계 확인
  const label = ep.ep > 0 ? `EP.${String(ep.ep).padStart(2,'0')}` : '단편';
  if (!confirm(`'${series.name}'의 ${label} "${ep.title}"을(를) 삭제할까요?\n\n이 작업은 되돌릴 수 없어요 (이미지 파일도 함께 삭제됩니다).`)) return;
  if (!confirm(`정말로 삭제할까요? 마지막 확인입니다.`)) return;

  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    return showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');
  }

  const progress = document.createElement('div');
  progress.className = 'submit-progress is-active';
  progress.innerHTML = `
    <div class="submit-progress-card">
      <div class="submit-progress-spinner"></div>
      <div class="submit-progress-text">EP 삭제 중...</div>
      <div class="submit-progress-sub">GitHub 업로드</div>
    </div>
  `;
  document.body.appendChild(progress);

  try {
    // 새 series.json (해당 EP 제거)
    const newSeries = JSON.parse(JSON.stringify(cache.series));
    newSeries[si].eps.splice(ei, 1);

    // 이미지 파일도 같이 삭제 — Git Data API의 tree에서 mode=null 또는 sha=null로 제거
    // SHA를 null로 보내면 해당 경로의 파일을 삭제 처리
    const imagePath = ep.thumb ? ep.thumb.replace(/^\.\//, '') : null;

    const message = `delete(admin): ${series.name} ${label} '${ep.title}' 삭제`;
    await ghCommitWithDeletions(
      [
        { path: 'data/series.json', content: JSON.stringify(newSeries, null, 2) + '\n', encoding: 'utf-8' },
      ],
      imagePath ? [imagePath] : [],
      message
    );

    cache.series = newSeries;
    cache.loadedAt = Date.now();

    progress.remove();
    showToast(`'${ep.title}' 삭제됨`, 'success', 2500);
    location.hash = 'series';
  } catch (e) {
    progress.remove();
    console.error(e);
    showToast('삭제 실패: ' + e.message, 'error', 5000);
  }
}

const SORT_MODES = [
  { value: 'ep_desc', label: '최신순 (EP↓)',  desc: 'EP.05, EP.04, ..., EP.01' },
  { value: 'ep_asc',  label: '순서대로 (EP↑)', desc: 'EP.01, EP.02, ..., EP.05' },
  { value: 'random',  label: '랜덤',           desc: '매 페이지 로드마다 셔플' },
  { value: 'manual',  label: '수동',           desc: '저장된 순서 그대로' },
];

// 음식/장비용 정렬 모드 (시리즈와 다름: EP 개념 없음)
const PRODUCT_SORT_MODES = [
  { value: 'random', label: '🎲 랜덤',   desc: '✨ 최근 7일 신규 상위 + 셔플' },
  { value: 'latest', label: '🔝 최신순', desc: 'created_at 내림차순' },
  { value: 'manual', label: '📝 수동',   desc: '드래그로 순서 변경' },
];

// admin 음식/장비 정렬 (드래그앤드롭이 작동하려면 manual에선 visible만, 다른 모드는 정렬 적용)
function getSortedProductsForAdmin(dataArr, mode) {
  const indexed = (dataArr || []).map((x, idx) => ({ x, idx }));
  if (mode === 'manual') return indexed;
  if (mode === 'latest') {
    return [...indexed].sort((a, b) => {
      const ta = a.x.created_at ? new Date(a.x.created_at).getTime() : 0;
      const tb = b.x.created_at ? new Date(b.x.created_at).getTime() : 0;
      return tb - ta;
    });
  }
  // random은 admin에선 입력 순서 그대로 (사용자 메시지: "admin은 입력 순서")
  return indexed;
}

// admin 화면에서 EP를 sort 모드에 맞춰 정렬 (원본 인덱스 함께 반환)
function getSortedEpsForAdmin(series) {
  const mode = series.sort || 'ep_desc';
  const indexed = series.eps.map((ep, ei) => ({ ep, ei }));
  if (mode === 'manual' || mode === 'random') {
    return indexed;
  }
  return [...indexed].sort((a, b) => {
    const aHas = (a.ep.ep || 0) > 0, bHas = (b.ep.ep || 0) > 0;
    if (mode === 'ep_asc') {
      if (aHas && bHas) return a.ep.ep - b.ep.ep;
    } else {
      if (aHas && bHas) return b.ep.ep - a.ep.ep;
    }
    if (aHas) return -1;
    if (bHas) return 1;
    return 0;
  });
}

    showToast('삭제 실패: ' + e.message, 'error', 5000);
  }
}

// 출처 배지 (쿠팡/컬리/네이버)
function sourceBadge(source) {
  if (!source) return '';
  const s = source.toLowerCase();
  if (s === '쿠팡' || s === 'coupang') return '<span class="badge badge-coupang">쿠팡</span>';
  if (s === '컬리' || s === 'kurly')   return '<span class="badge badge-kurly">컬리</span>';
  if (s === '네이버' || s === 'naver') return '<span class="badge badge-naver">네이버</span>';
  return `<span class="badge">${escapeHtml(source)}</span>`;
}

// 가격 HTML (원가/할인가/할인율)
function priceHtml(item) {
  const o = item.price_original;
  const s = item.price_sale;
  const d = item.discount_rate;
  if (!o && !s) return '<span style="color:var(--muted)">-</span>';
  const fmt = n => Number(n).toLocaleString('ko-KR') + '원';
  if (s != null && s !== o) {
    return `<span class="price-original">${fmt(o)}</span><span class="price-sale">${fmt(s)}</span>${d ? `<span class="price-discount">${d}%</span>` : ''}`;
  }
  return `<span class="price-sale">${fmt(o)}</span>`;
}

// 리스트 카드 한 줄
function productListItem(item, hrefPrefix, fallbackEmoji, dataAttrKey, opts) {
  opts = opts || {};
  const thumb = item.thumb
    ? `<img src="../${item.thumb.replace(/^\.\//, '')}" alt="" loading="lazy">`
    : fallbackEmoji;
  const src = item.source ? `<span style="font-size:11px;color:var(--muted);margin-right:6px;">${escapeHtml(item.source)}</span>` : '';
  const isPub = item.published !== false;
  const handle = opts.manual ? `<span class="drag-handle drag-handle--product" title="드래그해서 순서 변경">⋮⋮</span>` : '';
  return `
    <div class="list-item ${isPub ? '' : 'is-unpublished'}" data-idx="${item._idx}">
      ${handle}
      <a class="list-item-link" href="#${hrefPrefix}/${item._idx}">
        <div class="list-item-thumb">${thumb}</div>
        <div class="list-item-body">
          <div class="list-item-title">${escapeHtml(item.name)}</div>
          <div class="list-item-meta">${src}${escapeHtml(item.desc || '')}</div>
        </div>
      </a>
      ${toggleHtml(isPub, `data-${dataAttrKey}="${item._idx}"`)}
      <a class="list-item-arrow" href="#${hrefPrefix}/${item._idx}">›</a>
    </div>
  `;
}

// 리스트 화면 (음식/장비 공통)
function renderProductList(dataArr, searchVar, opts) {
  document.getElementById('topbar-title').innerHTML = `${opts.icon} ${opts.label}`;
  const c = document.getElementById('app-content');
  const q = opts.getSearch();
  // 정렬 모드 (config.json) 가져오기 + admin 표시용 정렬 적용
  const sortKey = opts.type + 'Sort';
  const currentSort = (cache.config && cache.config[sortKey]) || 'random';
  const isManual = currentSort === 'manual';
  const isSearchActive = q && q.length > 0;
  // 정렬 후 _idx 포함 (원본 인덱스 유지)
  const sortedIndexed = getSortedProductsForAdmin(dataArr, currentSort);
  const arr = sortedIndexed
    .map(({ x, idx }) => ({ ...x, _idx: idx }))
    .filter(x => matchSearch(x, q, ['name', 'desc', 'source']));
  c.innerHTML = `
    <div class="page-header">
      <button class="page-back" id="back-btn">← 대시보드</button>
      <a class="btn btn-sm" href="#${opts.hashPrefix}/new" style="margin-left:auto;">+ 추가</a>
      <div class="page-count">${arr.length} / ${dataArr.length}</div>
    </div>
    <div class="search-bar">
      <div class="search-bar-input-wrap">
        <input class="input" id="prod-search" placeholder="${opts.placeholder}" value="${escapeHtml(q)}">
      </div>
      <button class="search-bar-btn" id="prod-search-btn" type="button">조회</button>
    </div>
    <div class="series-sort-bar" style="margin:8px 0 4px;">
      <span class="series-sort-label">${opts.label} 정렬:</span>
      <select class="series-sort-select" id="prod-sort-select">
        ${PRODUCT_SORT_MODES.map(m => `<option value="${m.value}" ${currentSort === m.value ? 'selected' : ''}>${m.label}</option>`).join('')}
      </select>
    </div>
    ${currentSort === 'random' ? `<div class="series-sort-note">🎲 메인 사이트에서는 매 페이지 로드마다 다른 순서로 보입니다 (admin은 입력 순서)<br>✨ 최근 7일 이내 신규는 항상 상위에 노출됩니다</div>` : ''}
    ${currentSort === 'manual' && !isSearchActive ? `<div class="series-sort-note">📝 ⋮⋮ 핸들을 드래그해서 순서를 변경하면 자동 저장됩니다</div>` : ''}
    ${currentSort === 'manual' && isSearchActive ? `<div class="series-sort-note" style="background:#fff3cd;border-color:#ffe69c;color:#856404;">⚠️ 검색 중에는 드래그 정렬이 비활성화됩니다 (검색을 비우세요)</div>` : ''}
    <div class="list" id="prod-list">
      ${arr.length === 0 ? '<div class="list-empty">검색 결과가 없어요</div>' : arr.map(x => productListItem(x, opts.hashPrefix, opts.fallbackEmoji, opts.dataAttrKey, { manual: isManual && !isSearchActive })).join('')}
    </div>
  `;
  document.getElementById('back-btn').onclick = () => location.hash = '';
  // 정렬 모드 변경
  const sortSel = document.getElementById('prod-sort-select');
  if (sortSel) {
    sortSel.addEventListener('change', (e) => {
      e.stopPropagation();
      changeProductSort(opts.type, sortSel.value, sortSel);
    });
  }
  // 토글 핸들러
  const datasetKey = opts.dataAttrKey.replace(/-([a-z])/g, (_, ch) => ch.toUpperCase());
  c.querySelectorAll(`[data-${opts.dataAttrKey}]`).forEach(toggleEl => {
    const cb = toggleEl.querySelector('input');
    cb.addEventListener('change', async (e) => {
      e.stopPropagation();
      const idx = +toggleEl.dataset[datasetKey];
      const ok = await togglePublished(opts.type, { idx }, e.target.checked, toggleEl);
      if (ok) {
        toggleEl.closest('.list-item').classList.toggle('is-unpublished', !e.target.checked);
      }
    });
  });
  // 수동 모드: 드래그앤드롭 (검색 중에는 비활성화)
  if (isManual && !isSearchActive && typeof Sortable !== 'undefined') {
    const listEl = document.getElementById('prod-list');
    if (listEl) {
      Sortable.create(listEl, {
        handle: '.drag-handle--product',
        animation: 180,
        delay: 200,
        delayOnTouchOnly: true,
        filter: 'select, button, input, a, label.pub-toggle',
        preventOnFilter: false,
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag',
        onEnd: () => {
          const newOrder = Array.from(listEl.querySelectorAll('.list-item[data-idx]'))
            .map(el => +el.dataset.idx);
          const originalOrder = dataArr.map((_, i) => i);
          const changed = newOrder.some((v, i) => v !== originalOrder[i]);
          if (!changed) return;
          saveProductOrder(opts.type, newOrder);
        }
      });
    }
  }
  const s = document.getElementById('prod-search');
  const sBtn = document.getElementById('prod-search-btn');
  // 조회 동작 (입력 즉시 rerender X — IME 조합 깨짐 방지)
  const doProdSearch = () => {
    opts.setSearch(s.value);
    opts.rerender();
  };
  sBtn.onclick = doProdSearch;
  // 엔터키 → 조회 자동 실행 (한글 조합 중 엔터는 isComposing=true → 차단)
  s.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing) {
      e.preventDefault();
      doProdSearch();
    }
  });
  // 검색어를 타이핑 중일 때만 포커스 유지 (첫 진입 시 모바일 키보드 자동 등장 방지)
  if (q.length > 0) {
    setTimeout(() => { const pos = q.length; s.focus(); s.setSelectionRange(pos, pos); }, 0);
  }
}

function _detectSourceFromUrl(url) {
  if (!url) return '';
  const u = url.toLowerCase();
  if (u.includes('coupang')) return '쿠팡';
  if (u.includes('kurly')) return '컬리';
  if (u.includes('naver')) return '네이버';
  if (u.includes('11st')) return '11번가';
  if (u.includes('gmarket')) return '지마켓';
  if (u.includes('ssg.com')) return 'SSG';
  if (u.includes('oasis')) return '오아시스';
  return '';
}

        </div>

        <div class="form-field">
          <label class="label" for="ff-url">URL *</label>
          <input type="text" id="ff-url" class="input" placeholder="https://..." value="${escapeHtml(_foodForm.url)}">
          <div class="help">쿠팡/컬리/네이버 등의 상품 페이지 URL — 입력하면 출처 자동 감지</div>

        <div class="form-field">
          <label class="label" for="ff-source">출처</label>
          <select id="ff-source">
            <option value="">선택 (URL에서 자동 감지)</option>
            ${FOOD_SOURCES.map(s => `<option value="${s}" ${_foodForm.source === s ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
        </div>

        <div class="form-field">
          <label class="label" for="ff-price-original">원가 (원)</label>
          <input type="number" id="ff-price-original" class="input" min="0" placeholder="49400" value="${_foodForm.priceOriginal}">
        </div>

        <div class="form-field">
          <label class="label" for="ff-price-sale">할인가 (원)</label>
          <input type="number" id="ff-price-sale" class="input" min="0" placeholder="할인 없으면 비워두세요" value="${_foodForm.priceSale}">

          <label class="form-image-drop" id="ff-image-drop">

      </div>
    </div>
  `;

  const $ = (id) => document.getElementById(id);
  const backHash = isEdit ? `foods/${_foodForm.editIdx}` : 'foods';
  $('back-btn').onclick = () => { resetFoodForm(); location.hash = backHash; };
  $('ff-cancel').onclick = () => { resetFoodForm(); location.hash = backHash; };

  $('ff-name').oninput = (e) => { _foodForm.name = e.target.value; };
  $('ff-desc').oninput = (e) => { _foodForm.desc = e.target.value; };
  $('ff-source').onchange = (e) => { _foodForm.source = e.target.value; };

  // URL 입력 시 출처 자동 감지 (사용자가 명시 선택 안 한 경우만)
  $('ff-url').oninput = (e) => {
    _foodForm.url = e.target.value;
    const detected = _detectSourceFromUrl(e.target.value);
    if (detected && !_foodForm.source) {
      _foodForm.source = detected;
      $('ff-source').value = detected;
    }
  };

  $('ff-price-original').oninput = (e) => {
    _foodForm.priceOriginal = e.target.value;
    _autoCalcDiscount();
  };
  $('ff-price-sale').oninput = (e) => {
    _foodForm.priceSale = e.target.value;
    _autoCalcDiscount();
  };
  $('ff-discount').oninput = (e) => { _foodForm.discountRate = e.target.value; };

  // 원가/할인가 입력 시 할인율 자동 계산
  function _autoCalcDiscount() {
    const o = parseInt(_foodForm.priceOriginal);
    const s = parseInt(_foodForm.priceSale);
    if (o > 0 && s > 0 && s < o) {
      const rate = Math.round((1 - s / o) * 100);
      _foodForm.discountRate = String(rate);
      $('ff-discount').value = rate;
    } else if (!_foodForm.priceSale) {
      _foodForm.discountRate = '';
      $('ff-discount').value = '';
    }
  }

  // 이미지 업로드
  const drop = $('ff-image-drop');
  const fileInput = $('ff-image');
  const previewEl = $('ff-image-preview');

  async function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      return showToast('이미지 파일만 가능해요', 'error');
    }
    try {
      previewEl.innerHTML = '<div class="loading">이미지 처리 중...</div>';
      const { base64, previewUrl, size } = await cropImage4to5(file);
      _foodForm.imageBase64 = base64;
      _foodForm.imagePreviewUrl = previewUrl;
      _foodForm.imageSize = size;
      _foodForm.imageChanged = true;
      renderImagePreview();
    } catch (err) {
      previewEl.innerHTML = '';
      showToast('이미지 처리 실패: ' + err.message, 'error');
    }
  }

  function renderImagePreview() {
    if (!_foodForm.imagePreviewUrl) {
      previewEl.innerHTML = '';
      return;
    }
    const isNew = _foodForm.imageChanged;
    previewEl.innerHTML = `
      <div class="form-image-preview">
        <div class="form-image-preview-thumb"><img src="${_foodForm.imagePreviewUrl}" alt=""></div>
        <div class="form-image-preview-info">
          <b>${isNew ? '새 이미지' : '기존 이미지'}</b>
          <span>${isNew ? `4:5 크롭 · 600×750 · ${(_foodForm.imageSize/1024).toFixed(0)}KB` : '교체하려면 위에서 선택'}</span>
        </div>
        ${isNew ? `<button class="form-image-preview-remove" id="ff-image-remove">제거</button>` : ''}
      </div>
    `;
    if (isNew) {

function _foodImgHash(name) {
  const str = (name || 'food') + Date.now();
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) & 0xffffffff;
  let h2 = 5381;
  for (let i = 0; i < str.length; i++) h2 = ((h2 * 33) ^ str.charCodeAt(i)) & 0xffffffff;
  return ((h >>> 0).toString(16).padStart(8, '0') + (h2 >>> 0).toString(16).padStart(8, '0')).slice(0, 12);
}

// 영구 콘텐츠 ID 생성 (통계 추적용)
// prefix: 'camp' | 'food' | 'item' | 'series' | 'ep'
// 신규 콘텐츠 등록 시 호출, 한 번 생성되면 절대 변경되지 않음
function makeContentId(prefix, name) {
  const str = `${name}|${Date.now()}|${Math.random()}`;
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) & 0xffffffff;
  let h2 = 5381;
  for (let i = 0; i < str.length; i++) h2 = ((h2 * 33) ^ str.charCodeAt(i)) & 0xffffffff;
  const hex = ((h >>> 0).toString(16).padStart(8, '0') + (h2 >>> 0).toString(16).padStart(8, '0')).slice(0, 10);
  return `${prefix}_${hex}`;
}

async function submitFoodForm() {
  const isEdit = _foodForm.mode === 'edit';

  // 검증
  if (!_foodForm.name.trim()) return showToast('이름을 입력해주세요', 'error');
  if (!_foodForm.url.trim()) return showToast('URL을 입력해주세요', 'error');

  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    return showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');

  const progress = document.getElementById('submit-progress');

  const psub = document.getElementById('submit-progress-sub');

  try {

    psub.textContent = '이미지 경로 계산';

    const newFoods = JSON.parse(JSON.stringify(cache.foods));
    const files = [];

    // 이미지 경로 결정
    let thumbPath;
    if (isEdit) {
      // 기존 이미지 경로 그대로 유지 (이미지 변경 시 같은 경로 덮어쓰기)
      thumbPath = newFoods[_foodForm.editIdx].thumb;
      if (_foodForm.imageChanged) {
        // 같은 경로에 덮어쓰기
        files.push({
          path: thumbPath.replace(/^\.\//, ''),
          content: _foodForm.imageBase64, encoding: 'base64',
        });
      }
    } else {
      // 새 음식: hash 기반 파일명
      const hash = _foodImgHash(_foodForm.name);
      const newPath = `images/products/${hash}.jpg`;
      thumbPath = `./${newPath}`;
      files.push({ path: newPath, content: _foodForm.imageBase64, encoding: 'base64' });
    }

    // 가격 정규화
    const priceOriginal = parseInt(_foodForm.priceOriginal) || 0;
    const priceSale = _foodForm.priceSale ? parseInt(_foodForm.priceSale) : null;
    const discountRate = _foodForm.discountRate ? parseInt(_foodForm.discountRate) : null;

    // 음식 객체
    const _nowIsoF = new Date().toISOString();
    const _oldFood = isEdit ? cache.foods[_foodForm.editIdx] : null;
    const foodObj = {
      id: isEdit
        ? (_oldFood.id || makeContentId('food', _foodForm.name.trim()))
        : makeContentId('food', _foodForm.name.trim()),
      name: _foodForm.name.trim(),
      desc: _foodForm.desc.trim(),
      url: _foodForm.url.trim(),
      source: _foodForm.source || _detectSourceFromUrl(_foodForm.url) || '',
      thumb: thumbPath,
      price_original: priceOriginal,
      price_sale: priceSale,
      discount_rate: discountRate,
      published: isEdit ? (_oldFood.published !== false) : true,
      created_at: isEdit ? (_oldFood.created_at || _nowIsoF) : _nowIsoF,
      updated_at: _nowIsoF,
    };

    if (isEdit) {
      newFoods[_foodForm.editIdx] = foodObj;
    } else {
      newFoods.push(foodObj);
    }

    const action = isEdit ? '수정' : '추가';
    const message = `${isEdit ? 'update' : 'sync'}(admin): 음식 '${foodObj.name}' ${action}`;

    ptext.textContent = 'GitHub 업로드 중...';
    psub.textContent = files.length ? `이미지 + 데이터` : '데이터';

    files.push({ path: 'data/foods.json', content: JSON.stringify(newFoods, null, 2) + '\n', encoding: 'utf-8' });
    await ghCommitMultipleFiles(files, message);

    cache.foods = newFoods;
    cache.loadedAt = Date.now();

    ptext.textContent = '완료!';
    psub.textContent = '1~2분 후 사이트에 반영됩니다';

      resetFoodForm();
      showToast(`음식 '${foodObj.name}' ${action} 완료!`, 'success', 3500);
      location.hash = isEdit ? `foods/${_foodForm.editIdx}` : 'foods';
    }, 1000);

  } catch (e) {
    progress.classList.remove('is-active');
    console.error(e);
    showToast('업로드 실패: ' + e.message, 'error', 5000);
  }
}

async function deleteFood(idx) {
  const food = cache.foods[idx];
  if (!food) return;

  if (!confirm(`음식 '${food.name}'을(를) 삭제할까요?\n\n이미지 파일도 함께 삭제됩니다. 되돌릴 수 없어요.`)) return;
  if (!confirm(`정말로 삭제할까요? 마지막 확인입니다.`)) return;

  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    return showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');
  }

  const progress = document.createElement('div');
  progress.className = 'submit-progress is-active';
  progress.innerHTML = `
    <div class="submit-progress-card">
      <div class="submit-progress-spinner"></div>
      <div class="submit-progress-text">음식 삭제 중...</div>
      <div class="submit-progress-sub">GitHub 업로드</div>
    </div>
  `;
  document.body.appendChild(progress);

  try {
    const newFoods = JSON.parse(JSON.stringify(cache.foods));
    newFoods.splice(idx, 1);

    const deletePaths = food.thumb ? [food.thumb.replace(/^\.\//, '')] : [];

    const message = `delete(admin): 음식 '${food.name}' 삭제`;
    await ghCommitWithDeletions(
      [{ path: 'data/foods.json', content: JSON.stringify(newFoods, null, 2) + '\n', encoding: 'utf-8' }],
      deletePaths,
      message
    );

    cache.foods = newFoods;
    cache.loadedAt = Date.now();

    progress.remove();
    showToast(`음식 '${food.name}' 삭제됨`, 'success', 2500);
    location.hash = 'foods';
  } catch (e) {
    progress.remove();
    console.error(e);
    showToast('삭제 실패: ' + e.message, 'error', 5000);
  }
}

        ? (_oldItem.id || makeContentId('item', _itemForm.name.trim()))
        : makeContentId('item', _itemForm.name.trim()),
      name: _itemForm.name.trim(),
      desc: _itemForm.desc.trim(),
      url: _itemForm.url.trim(),
      source: _itemForm.source || _detectSourceFromUrl(_itemForm.url) || '',
      thumb: thumbPath,
      price_original: priceOriginal,
      price_sale: priceSale,
      discount_rate: discountRate,
      published: isEdit ? (_oldItem.published !== false) : true,
      created_at: isEdit ? (_oldItem.created_at || _nowIsoI) : _nowIsoI,
      updated_at: _nowIsoI,
    };

    if (isEdit) {
      newItems[_itemForm.editIdx] = itemObj;
    } else {
      newItems.push(itemObj);
    }

    const action = isEdit ? '수정' : '추가';
    const message = `${isEdit ? 'update' : 'sync'}(admin): 장비 '${itemObj.name}' ${action}`;

    ptext.textContent = 'GitHub 업로드 중...';
    psub.textContent = files.length ? `이미지 + 데이터` : '데이터';

    files.push({ path: 'data/items.json', content: JSON.stringify(newItems, null, 2) + '\n', encoding: 'utf-8' });
    await ghCommitMultipleFiles(files, message);

    cache.items = newItems;
    cache.loadedAt = Date.now();

    ptext.textContent = '완료!';
    psub.textContent = '1~2분 후 사이트에 반영됩니다';
    setTimeout(() => {
      progress.classList.remove('is-active');
      resetItemForm();
      showToast(`장비 '${itemObj.name}' ${action} 완료!`, 'success', 3500);
      location.hash = isEdit ? `items/${_itemForm.editIdx}` : 'items';
    }, 1000);

  } catch (e) {
    progress.classList.remove('is-active');
    console.error(e);
    showToast('업로드 실패: ' + e.message, 'error', 5000);
  }
}

// 장비 삭제
async function deleteItem(idx) {
  const item = cache.items[idx];
  if (!item) return;

  if (!confirm(`장비 '${item.name}'을(를) 삭제할까요?\n\n이미지 파일도 함께 삭제됩니다. 되돌릴 수 없어요.`)) return;
  if (!confirm(`정말로 삭제할까요? 마지막 확인입니다.`)) return;

  if (!localStorage.getItem(STORAGE_KEYS.token)) {
    return showToast('대시보드에서 GitHub 토큰을 먼저 설정해주세요', 'error');
  }

  const progress = document.createElement('div');
  progress.className = 'submit-progress is-active';
  progress.innerHTML = `
    <div class="submit-progress-card">
      <div class="submit-progress-spinner"></div>
      <div class="submit-progress-text">장비 삭제 중...</div>
      <div class="submit-progress-sub">GitHub 업로드</div>
    </div>
  `;
  document.body.appendChild(progress);

  try {
    const newItems = JSON.parse(JSON.stringify(cache.items));
    newItems.splice(idx, 1);

    const deletePaths = item.thumb ? [item.thumb.replace(/^\.\//, '')] : [];

    const message = `delete(admin): 장비 '${item.name}' 삭제`;
    await ghCommitWithDeletions(
      [{ path: 'data/items.json', content: JSON.stringify(newItems, null, 2) + '\n', encoding: 'utf-8' }],
      deletePaths,
      message
    );

    cache.items = newItems;
    cache.loadedAt = Date.now();

    progress.remove();
    showToast(`장비 '${item.name}' 삭제됨`, 'success', 2500);
    location.hash = 'items';
  } catch (e) {
    progress.remove();
    console.error(e);
    showToast('삭제 실패: ' + e.message, 'error', 5000);
  }
}


// ════════════════════════════════════════════════════════════════════
// 로그인 & 인증
// ════════════════════════════════════════════════════════════════════
function isAuthed() {
  return sessionStorage.getItem(STORAGE_KEYS.authed) === '1';
}

const loginScreen = document.getElementById('login-screen');
const app = document.getElementById('app');
const loginPassword = document.getElementById('login-password');
const loginSubmit = document.getElementById('login-submit');
const loginError = document.getElementById('login-error');

async function tryLogin() {
  const pw = loginPassword.value;
  if (!pw) return;
  const hash = await sha256(pw);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem(STORAGE_KEYS.authed, '1');
    showApp();
  } else {
    loginError.style.display = 'block';
    loginPassword.value = '';
    loginPassword.focus();
  }
}
loginSubmit.addEventListener('click', tryLogin);
loginPassword.addEventListener('keypress', e => { if (e.key === 'Enter') tryLogin(); });

function showLogin() {
  loginScreen.style.display = 'flex';
  app.classList.remove('is-active');
  setTimeout(() => loginPassword.focus(), 100);
}
function showApp() {
  loginScreen.style.display = 'none';
  app.classList.add('is-active');
  router();
}

// 상단바 액션
document.getElementById('topbar-back').addEventListener('click', () => { window.location.href = '/'; });
document.getElementById('topbar-logout').addEventListener('click', () => {
  if (!confirm('로그아웃 할까요? (토큰은 그대로 유지됩니다)')) return;
  sessionStorage.removeItem(STORAGE_KEYS.authed);
  showLogin();
});

// 해시 변경 시 라우터 호출
window.addEventListener('hashchange', router);

// 초기 진입
if (isAuthed()) showApp(); else showLogin();
</script>
</body>
</html>
