// 시리즈 슬러그 매핑
// ════════════════════════════════════════════════════════════════════
const SERIES_SLUG_PREFIX = {
  '여름에 가기 좋은 캠핑장':   'summer',
  '봄·가을에 가기 좋은 캠핑장': 'spring-fall',
  '캠핑꿀팁':                  'tips',
  '또 해먹고 싶은 캠핑 음식':  'foods',
  '장비소개':                  'items',
};

function getSeriesSlug(seriesName, ep) {
  const prefix = SERIES_SLUG_PREFIX[seriesName] || seriesName.replace(/[^a-z0-9]/gi, '').toLowerCase() || 'series';
  if (!ep || ep === 0) {
    // 단편(ep=0)은 timestamp 뒤에 붙여서 충돌 방지
    return `${prefix}-${Date.now().toString(36)}`;
  }
  return `${prefix}-ep${String(ep).padStart(2, '0')}`;
}

// ════════════════════════════════════════════════════════════════════
// 라우터 (해시 기반)
// 경로:
//   '' / '#'          → 대시보드
//   '#camps'          → 캠핑장 리스트
//   '#camps/{idx}'    → 캠핑장 상세
//   '#series'         → 시리즈 리스트 (그룹별 EP)
//   '#series/{s}/{e}' → EP 상세
//   '#foods'          → 음식 리스트
//   '#foods/{idx}'    → 음식 상세
//   '#items'          → 장비 리스트
//   '#items/{idx}'    → 장비 상세
// ════════════════════════════════════════════════════════════════════
async function router() {
  if (!isAuthed()) return; // 로그인 안 됐으면 라우터 무시

  const content = document.getElementById('app-content');
  content.innerHTML = '<div class="loading">로딩 중...</div>';

  // 데이터 로드 (캐시 활용)
  try {
    await loadAllData();
  } catch (e) {
    content.innerHTML = `<div class="card"><strong>데이터 로드 실패</strong><div class="help">${escapeHtml(e.message)}</div></div>`;
    return;
  }

  const hash = (location.hash || '').replace(/^#/, '');
  const parts = hash ? hash.split('/').filter(Boolean) : [];

  // 콘텐츠 탭 바: 리스트 화면(시리즈/캠핑장/음식/장비)에서만 표시
  renderContentTabs(parts);

  if (parts.length === 0) {
    renderDashboard();
  } else if (parts[0] === 'camps') {
    if (parts[1] === 'new') renderCampAddForm();
    else if (parts[2] === 'edit' && parts[1] !== undefined) renderCampEditForm(+parts[1]);
    else if (parts[1] !== undefined) renderCampDetail(+parts[1]);
    else renderCampList();
  } else if (parts[0] === 'series') {
    if (parts[1] === 'new') renderEpAddForm();
    else if (parts[1] === 'new-series') renderSeriesAddForm();
    else if (parts[3] === 'edit' && parts[1] !== undefined && parts[2] !== undefined) renderEpEditForm(+parts[1], +parts[2]);
    else if (parts[1] !== undefined && parts[2] !== undefined) renderEpDetail(+parts[1], +parts[2]);
    else renderSeriesList();
  } else if (parts[0] === 'series-edit') {
    if (parts[1] !== undefined) renderSeriesEditForm(+parts[1]);
    else location.hash = 'series';
  } else if (parts[0] === 'foods') {
    if (parts[1] === 'new') renderFoodAddForm();
    else if (parts[2] === 'edit' && parts[1] !== undefined) renderFoodEditForm(+parts[1]);
    else if (parts[1] !== undefined) renderFoodDetail(+parts[1]);
    else renderFoodList();
  } else if (parts[0] === 'items') {
    if (parts[1] === 'new') renderItemAddForm();
    else if (parts[2] === 'edit' && parts[1] !== undefined) renderItemEditForm(+parts[1]);
    else if (parts[1] !== undefined) renderItemDetail(+parts[1]);
    else renderItemList();
  } else {
    renderDashboard();
  }
}

// ════════════════════════════════════════════════════════════════════
// 대시보드
// ════════════════════════════════════════════════════════════════════
let _tokenCardExpanded = false; // 토큰 카드 펼침 상태 (대시보드 재렌더 시 유지)

// ════════════════════════════════════════════════════════════════════
// 콘텐츠 탭 바 (시리즈/캠핑장/음식/장비 빠른 이동)
// ════════════════════════════════════════════════════════════════════
const CONTENT_TABS = [
  { key: 'series',  icon: '🎬', label: '시리즈',   hash: 'series' },
  { key: 'camps',   icon: '🏕', label: '캠핑장',   hash: 'camps' },
  { key: 'foods',   icon: '🍖', label: '음식',     hash: 'foods' },
  { key: 'items',   icon: '🛠', label: '장비',     hash: 'items' },
];

// 리스트 화면에서만 탭 표시. parts: location.hash split 결과
// 리스트 뷰: parts === [tabKey] (정확히 1개) → 탭 표시
// 폼/상세/대시보드: 탭 숨김
function renderContentTabs(parts) {
  const el = document.getElementById('content-tabs');
  if (!el) return;
  // 리스트 뷰가 아니면 숨김
  const isListView = parts.length === 1 && CONTENT_TABS.some(t => t.key === parts[0]);
  if (!isListView) {
    el.style.display = 'none';
    return;
  }
  const activeKey = parts[0];
  el.style.display = 'block';
  el.innerHTML = `
    <div class="content-tabs-inner">
      ${CONTENT_TABS.map(t => `
        <a class="content-tab ${t.key === activeKey ? 'is-active' : ''}" href="#${t.hash}">
          <span class="content-tab-icon">${t.icon}</span>
          <span>${t.label}</span>
        </a>
      `).join('')}
    </div>
  `;
}
function hideContentTabs() {
  const el = document.getElementById('content-tabs');
  if (el) el.style.display = 'none';
}

function renderDashboard() {
  hideContentTabs();
  document.getElementById('topbar-title').innerHTML = '🛠 kydz.kr 관리자';
  const c = document.getElementById('app-content');
  const token = localStorage.getItem(STORAGE_KEYS.token);
  const tokenConnected = !!token;
  // 토큰 있으면 기본 접힌 상태, 없으면 펼친 상태 (입력 유도)
  const tokenExpanded = _tokenCardExpanded || !tokenConnected;
  c.innerHTML = `
    <!-- 토큰 카드 -->
    <div class="card token-card ${tokenExpanded ? 'is-expanded' : 'is-collapsed'}" id="token-card">
      <div class="token-card-header" id="token-card-toggle">
        <div class="token-card-header-left">
          <span class="section-title" style="margin:0;">🔑 GitHub 토큰</span>
          <div class="token-status ${tokenConnected ? 'connected' : 'disconnected'}">${tokenConnected ? '연결됨' : '미설정'}</div>
        </div>
        ${tokenConnected ? `<span class="token-card-chevron">${tokenExpanded ? '▴' : '▾'}</span>` : ''}
      </div>
      <div class="token-card-body" ${tokenExpanded ? '' : 'style="display:none;"'}>
        ${tokenConnected ? `
          <div class="help">현재 저장된 토큰</div>
          <div class="token-preview">${escapeHtml(maskToken(token))}</div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn btn-secondary" id="token-edit" style="flex:1;">변경</button>
            <button class="btn btn-danger" id="token-remove" style="flex:1;">삭제</button>
          </div>
        ` : `
          <label class="label" for="token-input">Personal Access Token</label>
          <div class="row">
            <input type="password" id="token-input" class="input" placeholder="ghp_... or github_pat_...">
            <button class="btn" id="token-save">저장</button>
          </div>
          <div class="help">
            GitHub Settings → Developer settings → Personal access tokens<br>
            권한: <code>Contents: Read and write</code> 이 브라우저에만 저장됩니다.
          </div>
        `}
      </div>
    </div>

    <!-- 메뉴 -->
    <div class="section-title">📋 콘텐츠 관리</div>
    <div class="menu-grid">
      <a class="card menu-item" href="#series">
        <span class="menu-item-icon">🎬</span>
        <div class="menu-item-title">시리즈 EP</div>
        <div class="menu-item-desc">${cache.series.length}개 시리즈 / ${cache.series.reduce((s,x)=>s+x.eps.length,0)}편</div>
      </a>
      <a class="card menu-item" href="#camps">
        <span class="menu-item-icon">🏕</span>
        <div class="menu-item-title">캠핑장</div>
        <div class="menu-item-desc">${cache.camps.length}개</div>
      </a>
      <a class="card menu-item" href="#foods">
        <span class="menu-item-icon">🍖</span>
        <div class="menu-item-title">음식</div>
        <div class="menu-item-desc">${cache.foods.length}개</div>
      </a>
      <a class="card menu-item" href="#items">
        <span class="menu-item-icon">🛠</span>
        <div class="menu-item-title">장비</div>
        <div class="menu-item-desc">${cache.items.length}개</div>
      </a>
    </div>

    <!-- 통계 -->
    <div class="section-title" style="margin-top:28px;">
      📊 사이트 통계
      <button class="btn-tiny" id="stats-refresh" title="새로고침">↻</button>
    </div>
    <div id="stats-container">
      <div class="stats-loading">통계 불러오는 중...</div>
    </div>

    <div style="margin-top:24px;font-size:11px;color:var(--muted);text-align:center;">
      Phase 2 · 데이터 로드 ${new Date(cache.loadedAt).toLocaleTimeString('ko-KR')}
    </div>
  `;

  // 토큰 카드 헤더 클릭 → 펼침/접힘 토글 (연결된 상태일 때만)
  if (tokenConnected) {
    document.getElementById('token-card-toggle').onclick = (e) => {
      // 헤더 안 버튼 클릭 시엔 토글 안 함
      if (e.target.closest('button')) return;
      _tokenCardExpanded = !_tokenCardExpanded;
      renderDashboard();
    };
  }

  // 통계 비동기 로드 + 새로고침 버튼
  loadAndRenderStats();
  document.getElementById('stats-refresh').onclick = (e) => {
    e.preventDefault();
    loadAndRenderStats();
  };

  // 토큰 핸들러 바인딩
  if (tokenConnected) {
    document.getElementById('token-edit').onclick = () => {
      localStorage.removeItem(STORAGE_KEYS.token);
      _tokenCardExpanded = true; // 입력 받아야 하므로 펼친 상태
      renderDashboard();
    };
    document.getElementById('token-remove').onclick = () => {
      if (!confirm('저장된 토큰을 삭제할까요?')) return;
      localStorage.removeItem(STORAGE_KEYS.token);
      _tokenCardExpanded = true;
      renderDashboard();
    };
  } else {
    document.getElementById('token-save').onclick = () => {
      const v = document.getElementById('token-input').value.trim();
      if (!v) { alert('토큰을 입력해주세요'); return; }
      if (!v.startsWith('ghp_') && !v.startsWith('github_pat_')) {
        if (!confirm('GitHub 토큰 형식이 아닌 것 같아요. 그래도 저장할까요?')) return;
      }
      localStorage.setItem(STORAGE_KEYS.token, v);
      _tokenCardExpanded = false; // 저장 후 자동 접힘
      renderDashboard();
    };
  }
}

// ════════════════════════════════════════════════════════════════════
// 통계 (Cloudflare Worker /stats 조회 + 시각화)
// ════════════════════════════════════════════════════════════════════
const STATS_API = 'https://kyd-stats.kydxyz.workers.dev/stats';

// 카테고리 (탭) 한글 라벨 + 컬러 매핑
// 메인 사이트의 TAB_HASH_MAP과 동기화: stories/camps/foods/items
const CATEGORY_META = {
  'stories': { label: '캠핑이야기', color: '#7e6a8f' },
  'camps':   { label: '다녀온 캠핑장', color: '#4a7c4e' },
  'foods':   { label: '추천 음식', color: '#c97a4a' },
  'items':   { label: '추천 템', color: '#5b6d8f' },
  '':        { label: '홈', color: '#888' },
};

let _statsCache = null;
let _statsCacheAt = 0;

async function loadAndRenderStats(forceRefresh = false) {
  const container = document.getElementById('stats-container');
  if (!container) return;

  // 30초 캐시 (대시보드 새로 들어와도 너무 자주 호출 안 함)
  const now = Date.now();
  if (!forceRefresh && _statsCache && (now - _statsCacheAt < 30000)) {
    renderStats(container, _statsCache);
    return;
  }

  container.innerHTML = `<div class="stats-loading">통계 불러오는 중...</div>`;
  try {
    const resp = await fetch(STATS_API + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    _statsCache = data;
    _statsCacheAt = Date.now();
    renderStats(container, data);
  } catch (e) {
    container.innerHTML = `
      <div class="card" style="text-align:center;color:var(--muted);font-size:13px;">
        <div style="margin-bottom:8px;">⚠️ 통계 불러오기 실패</div>
        <div style="font-size:11px;">${escapeHtml(e.message)}</div>
        <div style="font-size:11px;margin-top:8px;">${STATS_API}</div>
      </div>
    `;
  }
}

function renderStats(container, data) {
  // ── 1. 기간별 카운트 계산 (KST 기준) ──
  const today = kstToday();
  const now = new Date();
  // 최근 7일/30일
  const periods = { today: 0, week: 0, month: 0 };
  const todayDate = kstDateFromStr(today);
  const weekAgo = new Date(todayDate); weekAgo.setDate(weekAgo.getDate() - 6);
  const monthAgo = new Date(todayDate); monthAgo.setDate(monthAgo.getDate() - 29);

  const dailyEntries = Object.entries(data.daily || {}).sort();
  for (const [date, d] of dailyEntries) {
    const dt = kstDateFromStr(date);
    if (date === today) periods.today += d.pv;
    if (dt >= weekAgo) periods.week += d.pv;
    if (dt >= monthAgo) periods.month += d.pv;
  }

  // ── 2. 인기 페이지 분류 (캠핑장/EP/음식/장비/카테고리) ──
  // path 형식 3가지 호환:
  //   1) ID 기반 (신규): /camps/camp_abc123 → cache에서 ID로 찾아 현재 이름 표시 ✅
  //   2) 이름 기반 (옛): /camps/산청%20우니메이카 → decode해서 그대로 표시
  //   3) 인덱스 기반 (구버전): /camps/12 → cache.camps[12].name
  // ID 기반은 이름 바뀌어도 누적 추적 가능
  const popular = { camps: [], series: [], foods: [], items: [], category: [] };

  // ID → 객체 매핑 (한 번만 만들어두고 재사용)
  const campById = {}, foodById = {}, itemById = {};
  const seriesById = {}, epById = {}; // ep: { ep, series } 형태
  (cache.camps || []).forEach(c => { if (c.id) campById[c.id] = c; });
  (cache.foods || []).forEach(f => { if (f.id) foodById[f.id] = f; });
  (cache.items || []).forEach(i => { if (i.id) itemById[i.id] = i; });
  (cache.series || []).forEach(s => {
    if (s.id) seriesById[s.id] = s;
    (s.eps || []).forEach(ep => { if (ep.id) epById[ep.id] = { ep, series: s }; });
  });

  function resolveName(category, key) {
    // key가 ID 형식이면 cache에서 찾음, 아니면 decode해서 그대로
    if (category === 'camps') {
      if (campById[key]) return campById[key].name;
    } else if (category === 'foods') {
      if (foodById[key]) return foodById[key].name;
    } else if (category === 'items') {
      if (itemById[key]) return itemById[key].name;
    }
    // ID로 못 찾으면: 숫자면 idx 매핑, 아니면 decode
    if (/^\d+$/.test(key)) {
      const arr = category === 'camps' ? cache.camps : category === 'foods' ? cache.foods : cache.items;
      const obj = arr && arr[+key];
      return obj ? obj.name : `(삭제됨 #${key})`;
    }
    try { return decodeURIComponent(key); } catch { return key; }
  }

  // URL 매핑 헬퍼 (인기 콘텐츠 클릭 시 새 탭에서 열 URL)
  function resolveUrl(category, key) {
    if (category === 'camps') {
      if (campById[key]) return campById[key].url || '';
    } else if (category === 'foods') {
      if (foodById[key]) return foodById[key].url || '';
    } else if (category === 'items') {
      if (itemById[key]) return itemById[key].url || '';
    }
    if (/^\d+$/.test(key)) {
      const arr = category === 'camps' ? cache.camps : category === 'foods' ? cache.foods : cache.items;
      const obj = arr && arr[+key];
      return obj && obj.url ? obj.url : '';
    }
    return '';
  }

  // created_at 매핑 헬퍼
  function resolveCreatedAt(category, key) {
    if (category === 'camps' && campById[key]) return campById[key].created_at || '';
    if (category === 'foods' && foodById[key]) return foodById[key].created_at || '';
    if (category === 'items' && itemById[key]) return itemById[key].created_at || '';
    if (/^\d+$/.test(key)) {
      const arr = category === 'camps' ? cache.camps : category === 'foods' ? cache.foods : cache.items;
      const obj = arr && arr[+key];
      return obj && obj.created_at ? obj.created_at : '';
    }
    return '';
  }

  // source 매핑 헬퍼 (foods/items의 쿠팡/컬리/네이버 등)
  function resolveSource(category, key) {
    if (category === 'foods' && foodById[key]) return foodById[key].source || '';
    if (category === 'items' && itemById[key]) return itemById[key].source || '';
    if (/^\d+$/.test(key)) {
      const arr = category === 'foods' ? cache.foods : category === 'items' ? cache.items : null;
      const obj = arr && arr[+key];
      return obj && obj.source ? obj.source : '';
    }
    return '';
  }

  for (const [path, count] of Object.entries(data.pages || {})) {
    const p = path.replace(/^\/?#?/, '');
    const parts = p.split('/');

    if (parts[0] === 'camps' && parts[1] !== undefined && parts[1] !== '') {
      // 뱃지 판별을 위한 캠핑장 원본 정보 같이 저장
      const campObj = campById[parts[1]] || (/^\d+$/.test(parts[1]) ? cache.camps[+parts[1]] : null);
      popular.camps.push({
        name: resolveName('camps', parts[1]),
        url: resolveUrl('camps', parts[1]),
        created_at: resolveCreatedAt('camps', parts[1]),
        graega: campObj ? !!campObj.graega : false,
        count, path,
      });
    } else if (parts[0] === 'series' && parts[1] !== undefined && parts[2] !== undefined) {
      // 표시용 메타 정보 분리: emoji, seriesName, epTitle, color
      let emoji = '', seriesName = '', epTitle = '', color = '#888', url = '', created_at = '';
      if (epById[parts[2]]) {
        const { ep, series } = epById[parts[2]];
        emoji = series.emoji || '';
        seriesName = series.name || '';
        epTitle = ep.title || '';
        color = series.color || '#888';
        url = ep.url || '';
        created_at = ep.created_at || '';
      } else if (/^\d+$/.test(parts[1]) && /^\d+$/.test(parts[2])) {
        const s = cache.series[+parts[1]];
        const ep = s && s.eps[+parts[2]];
        if (s && ep) {
          emoji = s.emoji || ''; seriesName = s.name || ''; epTitle = ep.title || '';
          color = s.color || '#888';
          url = ep.url || '';
          created_at = ep.created_at || '';
        } else {
          seriesName = `(삭제됨)`; epTitle = `#${parts[1]}/${parts[2]}`;
        }
      } else {
        try { seriesName = decodeURIComponent(parts[1]); } catch { seriesName = parts[1]; }
        try { epTitle = decodeURIComponent(parts[2]); } catch { epTitle = parts[2]; }
      }
      popular.series.push({ emoji, seriesName, epTitle, color, url, created_at, count, path });
    } else if (parts[0] === 'foods' && parts[1] !== undefined) {
      popular.foods.push({
        name: resolveName('foods', parts[1]),
        url: resolveUrl('foods', parts[1]),
        created_at: resolveCreatedAt('foods', parts[1]),
        source: resolveSource('foods', parts[1]),
        count, path,
      });
    } else if (parts[0] === 'items' && parts[1] !== undefined) {
      popular.items.push({
        name: resolveName('items', parts[1]),
        url: resolveUrl('items', parts[1]),
        created_at: resolveCreatedAt('items', parts[1]),
        source: resolveSource('items', parts[1]),
        count, path,
      });
    } else {
      // 카테고리 (/, /series, /camps 등) - 한글 라벨 + 컬러 매핑
      const raw = parts[0] || '';
      const meta = CATEGORY_META[raw] || CATEGORY_META[''];
      popular.category.push({
        rawKey: raw,
        name: meta.label,
        color: meta.color,
        count, path,
      });
    }
  }
  for (const k in popular) popular[k].sort((a, b) => b.count - a.count);

  // ── 2b. 최근 7일 트렌딩 (data.daily의 지난 7일 pages 합산 → popular과 동일 형태) ──
  // popular과 같은 분류/이름/URL/플랫폼 정보 재사용
  const popular7d = { camps: [], series: [], foods: [], items: [] };
  const recent7Pages = {};
  for (let i = 0; i < 7; i++) {
    const dt = new Date(todayDate);
    dt.setDate(dt.getDate() - i);
    const dStr = kstDateStr(dt);
    const dayData = data.daily[dStr];
    if (!dayData || !dayData.pages) continue;
    for (const [p, c] of Object.entries(dayData.pages)) {
      recent7Pages[p] = (recent7Pages[p] || 0) + c;
    }
  }
  // popular 객체에서 7d count로 다시 분류 (path 기준 lookup)
  // popular 안에는 path 필드 있음 → 그걸로 7d count 조회
  for (const cat of ['camps', 'series', 'foods', 'items']) {
    for (const item of popular[cat]) {
      const c7 = recent7Pages[item.path] || 0;
      if (c7 > 0) {
        popular7d[cat].push({ ...item, count: c7 });
      }
    }
    popular7d[cat].sort((a, b) => b.count - a.count);
  }

  // ── 3b. 시간대 히트맵 (요일×24시간, 최근 30일 기준 KST) ──
  // 요일: 0=일, 1=월, ..., 6=토
  const heatmap = Array.from({length: 7}, () => new Array(24).fill(0));
  let heatmapMax = 0;
  for (const [date, d] of dailyEntries) {
    const dt = kstDateFromStr(date);
    if (dt < monthAgo) continue;
    // KST 요일: date 문자열이 이미 KST 기준이므로 그날의 요일 계산
    const dayOfWeek = dt.getDay();
    const hourly = d.hourly || [];
    for (let h = 0; h < 24; h++) {
      heatmap[dayOfWeek][h] += (hourly[h] || 0);
      if (heatmap[dayOfWeek][h] > heatmapMax) heatmapMax = heatmap[dayOfWeek][h];
    }
  }

  // ── 3c. 레퍼러 (누적) ──
  const referrers = Object.entries(data.referrers || {})
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([name, count]) => ({ name, count }));

  // ── 3d. 7일 vs 지난 7일 트렌드 (KST 기준) ──
  const last7Ago = new Date(todayDate); last7Ago.setDate(last7Ago.getDate() - 13);
  let week_now = 0, week_prev = 0;
  for (const [date, d] of dailyEntries) {
    const dt = kstDateFromStr(date);
    if (dt >= weekAgo) week_now += d.pv;
    else if (dt >= last7Ago) week_prev += d.pv;
  }
  const trendChange = week_prev === 0 ? null : ((week_now - week_prev) / week_prev * 100);

  // ── 3. 기타 외부 링크 (data-track-external 명시된 버튼들) ──
  // 그래가파트너스 / Clip Creators / DM / 메일 / 인스타 프로필 등
  // context가 '__external__' 인 click 이벤트만 추출
  const externalClicks = [];
  for (const [key, count] of Object.entries(data.clicks || {})) {
    const sepIdx = key.indexOf('::');
    if (sepIdx === -1) continue; // context 없는 옛 데이터 무시
    const context = key.slice(0, sepIdx);
    const target = key.slice(sepIdx + 2);
    if (context === '__external__') {
      externalClicks.push({ target, count });
    }
  }
  externalClicks.sort((a, b) => b.count - a.count);

  // ── 4. 검색어 정렬 (category:query 형식) ──
  const searches = Object.entries(data.searches || {})
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([key, count]) => {
      const [cat, ...rest] = key.split(':');
      return { category: cat, query: rest.join(':'), count };
    });

  // ── 5. 디바이스 비율 ──
  const devices = data.devices || {};
  const deviceTotal = Object.values(devices).reduce((s, n) => s + n, 0) || 1;
  const devicePct = {
    mobile: Math.round((devices.mobile || 0) / deviceTotal * 100),
    desktop: Math.round((devices.desktop || 0) / deviceTotal * 100),
    tablet: Math.round((devices.tablet || 0) / deviceTotal * 100),
  };

  // ── 6. 30일 차트 데이터 (KST 기준) ──
  const chartDates = [];
  for (let i = 29; i >= 0; i--) {
    const dt = new Date(todayDate);
    dt.setDate(dt.getDate() - i);
    chartDates.push(kstDateStr(dt));
  }
  const chartData = chartDates.map(d => (data.daily[d] && data.daily[d].pv) || 0);
  const chartMax = Math.max(1, ...chartData);

  // ── 6-1. 오늘 활동 상세 (KST 기준) ──
  const yesterday = new Date(todayDate);
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = kstDateStr(yesterday);
  const todayData = data.daily[today] || { pv: 0, pages: {}, clicks: {} };
  const yesterdayData = data.daily[yesterdayStr] || { pv: 0, pages: {}, clicks: {} };
  // 콘텐츠 카드 클릭(=콘텐츠 path 페이지뷰) vs 일반 페이지뷰 구분
  const isContentPathFn = (p) => /^\/(series|camps|foods|items)\/[^/]+/.test(p || '');
  let todayCardViews = 0, todayVisits = 0;
  for (const [p, c] of Object.entries(todayData.pages || {})) {
    if (isContentPathFn(p)) todayCardViews += c;
    else todayVisits += c;
  }
  let yesterdayCardViews = 0, yesterdayVisits = 0;
  for (const [p, c] of Object.entries(yesterdayData.pages || {})) {
    if (isContentPathFn(p)) yesterdayCardViews += c;
    else yesterdayVisits += c;
  }
  // 오늘 외부 링크 클릭 (__external__만)
  let todayExternalClicks = 0, yesterdayExternalClicks = 0;
  for (const [k, c] of Object.entries(todayData.clicks || {})) {
    if (k.startsWith('__external__::')) todayExternalClicks += c;
  }
  for (const [k, c] of Object.entries(yesterdayData.clicks || {})) {
    if (k.startsWith('__external__::')) yesterdayExternalClicks += c;
  }
  // 오늘 인기 콘텐츠 1위 (콘텐츠 path 중 가장 많이 본 것)
  const todayContentRanking = Object.entries(todayData.pages || {})
    .filter(([p]) => isContentPathFn(p))
    .sort((a, b) => b[1] - a[1]);
  let todayTopName = '없음';
  let todayTopCount = 0;
  if (todayContentRanking.length > 0) {
    const [topPath, topCount] = todayContentRanking[0];
    todayTopCount = topCount;
    // path → 이름 변환 (series/camps/foods/items)
    const m = topPath.match(/^\/([^/]+)\/(.+?)\/?$/);
    if (m) {
      const tab = m[1], rest = decodeURIComponent(m[2]);
      if (tab === 'series') {
        const parts = rest.split('/');
        if (parts.length === 2) {
          const s = (cache.series || []).find(x => x.id === parts[0]);
          const ep = s && (s.eps || []).find(e => e.id === parts[1]);
          todayTopName = ep ? `🎬 ${ep.title}` : '🎬 ' + rest;
        }
      } else if (tab === 'camps') {
        const c = (cache.camps || []).find(x => x.id === rest);
        todayTopName = c ? `🏕 ${c.name}` : '🏕 ' + rest;
      } else if (tab === 'foods') {
        const f = (cache.foods || []).find(x => x.id === rest);
        todayTopName = f ? `🍖 ${f.name}` : '🍖 ' + rest;
      } else if (tab === 'items') {
        const i = (cache.items || []).find(x => x.id === rest);
        todayTopName = i ? `🛠 ${i.name}` : '🛠 ' + rest;
      }
    }
  }
  // 트렌드 표시 헬퍼
  function trendHtml(todayN, yesterdayN) {
    if (yesterdayN === 0 && todayN === 0) return '';
    if (yesterdayN === 0) return `<span class="today-trend up">신규 ▲</span>`;
    const pct = Math.round((todayN - yesterdayN) / yesterdayN * 100);
    if (pct >= 5) return `<span class="today-trend up">↑ ${pct}%</span>`;
    if (pct <= -5) return `<span class="today-trend down">↓ ${Math.abs(pct)}%</span>`;
    return `<span class="today-trend flat">─</span>`;
  }

  // ── 7. updated_at ──
  const updated = data.updated_at
    ? new Date(data.updated_at).toLocaleString('ko-KR', { hour12: false })
    : '없음';

  container.innerHTML = `
    <!-- 요약 카드 4개 -->
    <div class="stats-summary">
      <div class="stats-card">
        <div class="stats-card-label">오늘</div>
        <div class="stats-card-value">${periods.today.toLocaleString()}</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-label">최근 7일${trendChange !== null ? (
          trendChange > 5 ? `<span class="stats-trend up">↑ ${Math.round(trendChange)}%</span>` :
          trendChange < -5 ? `<span class="stats-trend down">↓ ${Math.round(Math.abs(trendChange))}%</span>` :
          `<span class="stats-trend flat">─</span>`
        ) : ''}</div>
        <div class="stats-card-value">${periods.week.toLocaleString()}</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-label">최근 30일</div>
        <div class="stats-card-value">${periods.month.toLocaleString()}</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-label">누적</div>
        <div class="stats-card-value">${(data.total.pv || 0).toLocaleString()}</div>
      </div>
    </div>

    <!-- 오늘 활동 미니 카드 (페이지뷰/카드클릭/외부링크/오늘 1위) -->
    <div class="card today-card">
      <div class="stats-section-title">📅 오늘 활동 <span style="font-size:11px;font-weight:400;color:var(--muted);">(${today})</span></div>
      <div class="today-grid">
        <div class="today-item">
          <div class="today-label">방문</div>
          <div class="today-value">${todayVisits.toLocaleString()} ${trendHtml(todayVisits, yesterdayVisits)}</div>
        </div>
        <div class="today-item">
          <div class="today-label">카드 클릭</div>
          <div class="today-value">${todayCardViews.toLocaleString()} ${trendHtml(todayCardViews, yesterdayCardViews)}</div>
        </div>
        <div class="today-item">
          <div class="today-label">외부 링크</div>
          <div class="today-value">${todayExternalClicks.toLocaleString()} ${trendHtml(todayExternalClicks, yesterdayExternalClicks)}</div>
        </div>
      </div>
      <div class="today-top">
        <div class="today-top-label">🏆 오늘 인기 1위</div>
        <div class="today-top-name">${todayTopName === '없음' ? '<span style="color:var(--muted);">오늘 아직 콘텐츠 클릭이 없어요</span>' : `${escapeHtml(todayTopName)} <span class="today-top-count">${todayTopCount}회</span>`}</div>
      </div>
    </div>

    <!-- 30일 차트 -->
    <div class="card stats-chart-card">
      <div class="stats-section-title">최근 30일 방문</div>
      ${renderBarChart(chartDates, chartData, chartMax)}
    </div>

    <!-- 🔥 최근 7일 트렌딩 (7일 내 누적 카운트, 데이터 없는 카테고리 숨김) -->
    ${(popular7d.series.length + popular7d.camps.length + popular7d.foods.length + popular7d.items.length) > 0 ? `
    <div class="card trending-card">
      <div class="stats-section-title">🔥 최근 7일 트렌딩</div>
      ${popular7d.series.length > 0 ? renderSeriesPopular('🎬 시리즈 EP', popular7d.series, 5) : ''}
      ${popular7d.camps.length > 0 ? renderPopularSection('🏕 캠핑장', popular7d.camps, 5, 'camps') : ''}
      ${popular7d.foods.length > 0 ? renderPopularSection('🍖 음식', popular7d.foods, 5, 'foods') : ''}
      ${popular7d.items.length > 0 ? renderPopularSection('🛠 장비', popular7d.items, 5, 'items') : ''}
    </div>
    ` : ''}

    <!-- 인기 콘텐츠 -->
    <div class="card">
      <div class="stats-section-title">🏆 인기 콘텐츠 TOP <span style="font-size:11px;font-weight:400;color:var(--muted);">(누적)</span></div>
      ${renderSeriesPopular('🎬 시리즈 EP', popular.series, 8)}
      ${renderPopularSection('🏕 캠핑장', popular.camps, 5, 'camps')}
      ${renderPopularSection('🍖 음식', popular.foods, 5, 'foods')}
      ${renderPopularSection('🛠 장비', popular.items, 5, 'items')}
    </div>

    <!-- 카테고리 (별도 카드) -->
    <div class="card">
      <div class="stats-section-title">📂 카테고리</div>
      ${popular.category.length === 0
        ? '<div class="stats-empty">아직 데이터가 없어요</div>'
        : renderCategoryPopular('', popular.category, 5)}
    </div>

    <!-- 기타 외부링크 (그래가파트너스 / Clip Creators / DM / 메일 / 인스타 프로필) -->
    <div class="card">
      <div class="stats-section-title">🔗 기타 외부링크</div>
      ${externalClicks.length === 0
        ? '<div class="stats-empty">아직 외부링크 클릭이 없어요</div>'
        : `<div class="stats-list">
            ${externalClicks.map((it, i) => `
              <div class="stats-row">
                <span class="stats-row-rank">${i + 1}</span>
                <span class="stats-row-label">${escapeHtml(it.target)}</span>
                <span class="stats-row-count">${it.count.toLocaleString()}</span>
              </div>
            `).join('')}
          </div>`}
    </div>

    <!-- 시간대 히트맵 (요일×24시간, 최근 30일) -->
    <div class="card">
      <div class="stats-section-title">🕐 시간대 히트맵 <span style="font-size:11px;font-weight:400;color:var(--muted);">(최근 30일)</span></div>
      ${heatmapMax === 0
        ? '<div class="stats-empty">아직 충분한 데이터가 없어요</div>'
        : renderHeatmap(heatmap, heatmapMax)}
    </div>

    <!-- 📊 콘텐츠별 분석 (신규) -->
    <div class="card" id="content-analysis-card">
      <div class="stats-section-title">📊 콘텐츠별 분석 <span style="font-size:11px;font-weight:400;color:var(--muted);">(최근 30일)</span></div>
      <div class="ca-loading">대시보드 로딩 중...</div>
    </div>

    <!-- 레퍼러 (유입 경로) -->
    <div class="card">
      <div class="stats-section-title">🔗 유입 경로 (referrer)</div>
      ${referrers.length === 0
        ? '<div class="stats-empty">아직 유입 데이터가 없어요</div>'
        : `<div class="stats-list">
            ${referrers.map((r, i) => `
              <div class="stats-row">
                <span class="stats-row-rank">${i + 1}</span>
                <span class="stats-row-label">${escapeHtml(r.name)}</span>
                <span class="stats-row-count">${r.count.toLocaleString()}</span>
              </div>
            `).join('')}
          </div>`}
    </div>

    <!-- 인기 검색어 -->
    <div class="card">
      <div class="stats-section-title">🔍 인기 검색어</div>
      ${searches.length === 0
        ? '<div class="stats-empty">아직 검색 데이터가 없어요</div>'
        : `<div class="stats-list">
            ${searches.map(s => `
              <div class="stats-row">
                <span class="stats-row-label">
                  <span class="stats-tag">${escapeHtml(s.category)}</span>
                  ${escapeHtml(s.query)}
                </span>
                <span class="stats-row-count">${s.count.toLocaleString()}</span>
              </div>
            `).join('')}
          </div>`}
    </div>

    <!-- 디바이스 -->
    <div class="card">
      <div class="stats-section-title">📱 디바이스 비율</div>
      ${deviceTotal <= 1
        ? '<div class="stats-empty">아직 데이터가 없어요</div>'
        : `<div class="stats-device-bars">
            <div class="stats-device-row">
              <span class="stats-device-label">📱 모바일</span>
              <div class="stats-device-bar"><div class="stats-device-fill" style="width:${devicePct.mobile}%;background:#5b9aff;"></div></div>
              <span class="stats-device-pct">${devicePct.mobile}%</span>
            </div>
            <div class="stats-device-row">
              <span class="stats-device-label">💻 PC</span>
              <div class="stats-device-bar"><div class="stats-device-fill" style="width:${devicePct.desktop}%;background:#6b8fb8;"></div></div>
              <span class="stats-device-pct">${devicePct.desktop}%</span>
            </div>
            ${devicePct.tablet > 0 ? `
            <div class="stats-device-row">
              <span class="stats-device-label">📟 태블릿</span>
              <div class="stats-device-bar"><div class="stats-device-fill" style="width:${devicePct.tablet}%;background:#a3a3a3;"></div></div>
              <span class="stats-device-pct">${devicePct.tablet}%</span>
            </div>` : ''}
          </div>`}
    </div>

    <!-- 요약 푸터 -->
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px;">
      마지막 집계: ${updated}<br>
      총 페이지뷰 ${(data.total.pv || 0).toLocaleString()} · 외부 클릭 ${(data.total.click || 0).toLocaleString()} · 검색 ${(data.total.search || 0).toLocaleString()}<br>
      <span style="font-size:10px;">GitHub 동기화는 매시간 정각 / 데이터는 30초 캐시</span>
    </div>
  `;

  // 📊 콘텐츠별 분석 초기화 (innerHTML 후 DOM 준비됨)
  initContentAnalysis(data);

  // 동적 렌더된 인스타 anchor (인기 콘텐츠 TOP 등) href 정규화
  if (typeof window.normalizeAllInstagramAnchors === 'function') {
    window.normalizeAllInstagramAnchors();
  }
}

function renderPopularSection(label, items, limit = 5, sectionKey = '') {
  if (items.length === 0) return '';
  const sectionCls = sectionKey ? ` sub-${sectionKey}` : '';
  return `
    <div class="stats-popular-sub${sectionCls}">${label}</div>
    <div class="stats-list${sectionCls}">
      ${items.slice(0, limit).map((it, i) => {
        const hasUrl = !!it.url;
        const tag = hasUrl ? 'a' : 'div';
        const attrs = hasUrl ? `href="${escapeHtml(it.url)}" target="_blank" rel="noopener"` : '';
        // 플랫폼 뱃지: 캠핑장은 graega/캠핏/네이버, 음식/장비는 source(쿠팡/컬리/네이버)
        let platformBadge = '';
        if ('graega' in it) {
          platformBadge = campPlatformBadgeHtml(it);
        } else if (it.source) {
          platformBadge = sourcePlatformBadgeHtml(it.source);
        }
        return `
        <${tag} class="stats-row${hasUrl ? ' is-link' : ''}" ${attrs}>
          <span class="stats-row-rank">${i + 1}</span>
          <span class="stats-row-label">${platformBadge}${escapeHtml(it.name)}</span>
          <span class="stats-row-count">${it.count.toLocaleString()}</span>
        </${tag}>
      `;
      }).join('')}
    </div>
  `;
}

// 캠핑장 예약 플랫폼 뱃지 (메인 사이트의 campPlatformBadge와 동일 로직)
function campPlatformBadgeHtml(it) {
  if (it.graega) return '<span class="stats-platform-badge bg-graega">그래가</span>';
  if (!it.url) return '';
  const u = it.url.toLowerCase();
  if (u.includes('naver.com')) return '<span class="stats-platform-badge bg-naver">네이버</span>';
  if (u.includes('camfit.co.kr')) return '<span class="stats-platform-badge bg-camfit">캠핏</span>';
  if (u.includes('thankqcamping.com') || u.includes('camperstory.com')) return '<span class="stats-platform-badge bg-thankq">땡큐캠핑</span>';
  return '<span class="stats-platform-badge bg-etc">기타</span>';
}

// 음식/장비 구매처 뱃지 (source 필드 기반: 쿠팡/컬리/네이버 등)
function sourcePlatformBadgeHtml(source) {
  if (!source) return '';
  const s = source.trim();
  const cls = s === '쿠팡'   ? 'bg-coupang'
            : s === '컬리'   ? 'bg-kurly'
            : s === '네이버' ? 'bg-naver'
            : s === '카카오' ? 'bg-kakao'
            : 'bg-etc';
  return `<span class="stats-platform-badge ${cls}">${escapeHtml(s)}</span>`;
}

function renderHeatmap(heatmap, max) {
  // heatmap: 7행(요일) × 24열(시간) 배열로 들어옴
  // 모바일 가독성을 위해 24행(시간) × 7열(요일) 세로형으로 전치해서 그림
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  // 3시간 단위로 시간 라벨 강조 (0, 3, 6, ..., 21)
  return `
    <div class="heatmap-wrap heatmap-vertical">
      <div class="heatmap-grid-v">
        <div class="heatmap-corner"></div>
        ${days.map(d => `<div class="heatmap-col-label-v">${d}</div>`).join('')}
        ${Array.from({length: 24}, (_, h) => {
          const isMarker = h % 3 === 0;
          return `
            <div class="heatmap-row-label-v ${isMarker ? 'is-marker' : ''}">${String(h).padStart(2, '0')}</div>
            ${days.map((_, dayIdx) => {
              const v = heatmap[dayIdx][h] || 0;
              const intensity = max > 0 ? v / max : 0;
              const alpha = v === 0 ? 0.05 : (0.15 + intensity * 0.85);
              return `<div class="heatmap-cell-v" style="background:rgba(74,124,78,${alpha});" title="${days[dayIdx]} ${h}시: ${v}회"></div>`;
            }).join('')}
          `;
        }).join('')}
      </div>
      <div class="heatmap-legend">
        <span>적음</span>
        <div class="heatmap-legend-bar"></div>
        <span>많음 (최대 ${max}회)</span>
      </div>
    </div>
  `;
}

function renderBarChart(dates, data, max) {
  // 라벨 간격: 데이터 개수에 따라 자동 (모바일 가독성)
  //  - 12개 이하 (월별): 모든 라벨
  //  - 13~30개 (일별): 약 5개 라벨만
  //  - 31개 이상: 약 6개 라벨만
  const n = dates.length;
  const labelStep = n <= 12 ? 1 : (n <= 30 ? Math.ceil(n / 5) : Math.ceil(n / 6));
  const bars = data.map((v, i) => {
    const heightPct = Math.round((v / max) * 100);
    const date = dates[i];
    // YYYY-MM-DD → MM/DD,  YYYY-MM → MM월
    const isMonthly = date.length === 7;
    const md = isMonthly ? `${parseInt(date.slice(5), 10)}월` : date.slice(5).replace('-', '/');
    const isLast = i === n - 1;
    const showLabel = (i % labelStep === 0) || isLast;
    return `
      <div class="stats-bar-col" title="${date}: ${v}회">
        <div class="stats-bar-value">${v > 0 ? v : ''}</div>
        <div class="stats-bar" style="height:${heightPct}%;"></div>
        <div class="stats-bar-label">${showLabel ? md : ''}</div>
      </div>
    `;
  }).join('');
  return `<div class="stats-bar-chart">${bars}</div>`;
}

// ════════════════════════════════════════════════════════════════════
// 📊 콘텐츠별 분석 (신규)
// 일별: raw events 기반 (정확) / 월별: stats.daily 기반 (12개월치)
// 시간대 히트맵: raw events 기반
// ════════════════════════════════════════════════════════════════════
const EVENTS_API = 'https://kyd-stats.kydxyz.workers.dev/events';
// 5개 카테고리: series / camps / foods / items / external
// 기본값 series. 외부 액션(인스타 프로필/DM/메일/그래가/Clip Creators)은 click 이벤트(__external__),
// 나머지 4개는 pageview
let _analysisMode = 'series';
let _analysisTarget = null;           // 선택된 path (콘텐츠) 또는 target (외부)
let _analysisPeriod = 'daily';        // 'daily' (30일) | 'monthly' (12개월)
let _analysisData = null;             // renderStats가 전달한 stats 데이터
let _eventsCache = null;              // raw events 캐시
let _eventsCacheAt = 0;
let _eventsCacheDays = 0;             // 캐시된 일수

// 카테고리 메타 (toggle 라벨, content path prefix)
const ANALYSIS_CATEGORIES = [
  { key: 'series',   label: '🎬 시리즈', pathRegex: /^\/series\/[^/]+/, isExternal: false },
  { key: 'camps',    label: '🏕 캠핑장', pathRegex: /^\/camps\/[^/]+/,  isExternal: false },
  { key: 'foods',    label: '🍖 음식',   pathRegex: /^\/foods\/[^/]+/,  isExternal: false },
  { key: 'items',    label: '🛠 장비',   pathRegex: /^\/items\/[^/]+/,  isExternal: false },
  { key: 'external', label: '🔗 기타',   pathRegex: null,               isExternal: true  },
];
function getCategoryMeta(key) {
  return ANALYSIS_CATEGORIES.find(c => c.key === key) || ANALYSIS_CATEGORIES[0];
}

// click 키 파싱: `context::target` → { ctx, target }
function parseClickKey(key) {
  const sepIdx = key.indexOf('::');
  if (sepIdx === -1) return { ctx: '', target: key };
  return { ctx: key.slice(0, sepIdx), target: key.slice(sepIdx + 2) };
}

// 카테고리별 후보 산출 (현재 _analysisData 기준 누적 카운트 정렬)
function getCandidatesForCategory(key, data) {
  const meta = getCategoryMeta(key);
  if (meta.isExternal) {
    // 외부(기타): click 키 중 context === '__external__' 만 target별 합산
    const byTarget = {};
    for (const [k, count] of Object.entries(data.clicks || {})) {
      const { ctx, target } = parseClickKey(k);
      if (ctx !== '__external__') continue;
      byTarget[target] = (byTarget[target] || 0) + count;
    }
    return Object.entries(byTarget).sort((a, b) => b[1] - a[1]);
  }
  // 콘텐츠: pages 중 path가 카테고리 regex 매칭만
  return Object.entries(data.pages || {})
    .filter(([path]) => meta.pathRegex.test(path))
    .sort((a, b) => b[1] - a[1]);
}

// path/target → { prefix(카테고리 라벨), name(본문) }로 분리 반환
// prefix는 카테고리 컬러 뱃지로, name은 ellipsis로 잘릴 본문
function analysisLabelParts(mode, key) {
  const meta = getCategoryMeta(mode);
  if (meta.isExternal) {
    return { prefix: '기타', name: key };
  }
  // 콘텐츠: cache에서 본문(시리즈명·EP / 캠핑장명 등) 추출
  if (key === '/' || key === '') return { prefix: '홈', name: '/' };
  const m = key.match(/^\/([^/]+)\/(.+?)\/?$/);
  if (m) {
    const tab = m[1], rest = decodeURIComponent(m[2]);
    if (tab === 'series') {
      const parts = rest.split('/');
      if (parts.length === 2) {
        const seriesId = parts[0], epId = parts[1];
        for (const s of (cache.series || [])) {
          if (s.id !== seriesId) continue;
          const ep = (s.eps || []).find(e => e.id === epId);
          if (ep) return { prefix: s.name || '시리즈', name: ep.title || epId };
          return { prefix: s.name || '시리즈', name: epId };
        }
        return { prefix: '시리즈', name: rest };
      }
    }
    if (tab === 'camps') {
      const c = (cache.camps || []).find(x => x.id === rest);
      return { prefix: '캠핑장', name: c?.name || rest };
    }
    if (tab === 'foods') {
      const f = (cache.foods || []).find(x => x.id === rest);
      return { prefix: '음식', name: f?.name || rest };
    }
    if (tab === 'items') {
      const i = (cache.items || []).find(x => x.id === rest);
      return { prefix: '장비', name: i?.name || rest };
    }
  }
  return { prefix: '기타', name: key };
}

// 기존 호환용 (단일 문자열 라벨 - 다른 곳에서 쓰이면 폴백)
function analysisLabelFor(mode, key) {
  const { prefix, name } = analysisLabelParts(mode, key);
  return `${prefix} · ${name}`;
}

// 카테고리 prefix HTML — 인기 콘텐츠 TOP과 동일한 뱃지 사용
// - 시리즈: cache.series.color로 컬러 뱃지 (시리즈명)
// - 캠핑장: campPlatformBadgeHtml (그래가/네이버/캠핏/땡큐)
// - 음식/장비: sourcePlatformBadgeHtml (쿠팡/컬리/네이버 등)
// - 기타: 회색 뱃지
function renderDropdownBadge(mode, key) {
  // 시리즈
  if (mode === 'series') {
    const seriesId = (key.match(/^\/series\/([^/]+)/) || [])[1];
    const s = (cache.series || []).find(x => x.id === seriesId);
    const color = s?.color || '#888';
    const label = s?.name || '시리즈';
    return `<span class="ca-cat-prefix is-series" style="background:${escapeHtml(color)};">${escapeHtml(label)}</span>`;
  }
  // 캠핑장 → 예약 플랫폼 뱃지 (campPlatformBadgeHtml과 동일 로직)
  if (mode === 'camps') {
    const campId = (key.match(/^\/camps\/(.+?)\/?$/) || [])[1];
    const camp = (cache.camps || []).find(x => x.id === campId);
    if (!camp) return '<span class="stats-platform-badge bg-etc">캠핑장</span>';
    return campPlatformBadgeHtml(camp);
  }
  // 음식 → 구매 플랫폼 뱃지
  if (mode === 'foods') {
    const foodId = (key.match(/^\/foods\/(.+?)\/?$/) || [])[1];
    const food = (cache.foods || []).find(x => x.id === foodId);
    if (!food || !food.source) return '<span class="stats-platform-badge bg-etc">음식</span>';
    return sourcePlatformBadgeHtml(food.source);
  }
  // 장비 → 구매 플랫폼 뱃지
  if (mode === 'items') {
    const itemId = (key.match(/^\/items\/(.+?)\/?$/) || [])[1];
    const item = (cache.items || []).find(x => x.id === itemId);
    if (!item || !item.source) return '<span class="stats-platform-badge bg-etc">장비</span>';
    return sourcePlatformBadgeHtml(item.source);
  }
  // 기타
  return '<span class="stats-platform-badge bg-etc">기타</span>';
}

// 일별 시계열: raw events에서 추출 (최근 N일, KST 기준)
function buildDailySeriesFromEvents(events, mode, target, days = 30) {
  // KST 헬퍼 사용 (위에 정의된 kstDateStr)
  const today = new Date();
  const dates = [];
  const dateMap = {};
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = kstDateStr(d);
    dates.push(ds);
    dateMap[ds] = 0;
  }
  for (const e of events) {
    // mode = 'external' → click 이벤트만, 그 외(series/camps/foods/items) → pageview만
    const meta = getCategoryMeta(mode);
    if (meta.isExternal) {
      if (e.type !== 'click') continue;
      if (e.ctx !== '__external__') continue;
      if (e.target !== target) continue;
    } else {
      if (e.type !== 'pageview') continue;
      if (e.path !== target) continue;
    }
    // e.ts는 epoch ms (UTC). KST 기준 날짜 매핑
    const dt = new Date(e.ts);
    const kstDate = kstDateStr(dt);
    if (kstDate in dateMap) dateMap[kstDate]++;
  }
  const series = dates.map(d => dateMap[d]);
  return { dates, series, total: series.reduce((a, b) => a + b, 0) };
}

// 월별 시계열: stats.daily에서 추출 (최근 12개월)
function buildMonthlySeriesFromDaily(data, mode, target, months = 12) {
  const now = new Date();
  const labels = [];
  const monthMap = {};
  // 최근 N개월 (오래된 것부터)
  for (let i = months - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    labels.push(ym);
    monthMap[ym] = 0;
  }
  const meta = getCategoryMeta(mode);
  const daily = data.daily || {};
  for (const [date, d] of Object.entries(daily)) {
    const ym = date.slice(0, 7);
    if (!(ym in monthMap)) continue;
    if (meta.isExternal) {
      // 외부: __external__ context + target 매칭만 합산
      for (const [key, count] of Object.entries(d.clicks || {})) {
        const parsed = parseClickKey(key);
        if (parsed.ctx !== '__external__') continue;
        if (parsed.target !== target) continue;
        monthMap[ym] += count;
      }
    } else {
      // 콘텐츠: pages에서 path 매칭
      monthMap[ym] += (d.pages || {})[target] || 0;
    }
  }
  const series = labels.map(ym => monthMap[ym]);
  return { labels, series, total: series.reduce((a, b) => a + b, 0) };
}

// 시간대 히트맵: raw events에서 추출 (요일×24시간, 명시적 KST 기준)
function buildContentHeatmap(events, mode, target) {
  const heatmap = Array.from({ length: 7 }, () => new Array(24).fill(0));
  let max = 0;
  const meta = getCategoryMeta(mode);
  for (const e of events) {
    if (meta.isExternal) {
      if (e.type !== 'click') continue;
      if (e.ctx !== '__external__') continue;
      if (e.target !== target) continue;
    } else {
      if (e.type !== 'pageview') continue;
      if (e.path !== target) continue;
    }
    // UTC ts → KST 시각으로 변환 후 요일/시 계산 (브라우저 로컬 의존성 제거)
    const kst = new Date(e.ts + KST_OFFSET_MS);
    const dayOfWeek = kst.getUTCDay();   // KST 기준 요일
    const hour = kst.getUTCHours();      // KST 기준 시
    heatmap[dayOfWeek][hour]++;
    if (heatmap[dayOfWeek][hour] > max) max = heatmap[dayOfWeek][hour];
  }
  return { heatmap, max };
}

// 최근 N일치 events 모두 fetch (5분 캐시)
async function loadEventsForAnalysis(days = 30) {
  const now = Date.now();
  if (_eventsCache && _eventsCacheDays >= days && (now - _eventsCacheAt < 5 * 60 * 1000)) {
    return _eventsCache;
  }
  const today = new Date();
  const dates = [];
  for (let i = 0; i < days; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0, 10));
  }
  const results = await Promise.all(dates.map(async (date) => {
    try {
      const r = await fetch(`${EVENTS_API}?date=${date}&t=${now}`);
      if (!r.ok) return [];
      const j = await r.json();
      return j.events || [];
    } catch { return []; }
  }));
  const allEvents = results.flat();
  _eventsCache = allEvents;
  _eventsCacheAt = now;
  _eventsCacheDays = days;
  return allEvents;
}

// 콘텐츠 분석 초기화
function initContentAnalysis(data) {
  _analysisData = data;
  const candidates = getCandidatesForCategory(_analysisMode, data);
  if (candidates.length === 0) {
    _analysisTarget = null;
  } else if (!_analysisTarget || !candidates.map(c => c[0]).includes(_analysisTarget)) {
    _analysisTarget = candidates[0][0];
  }
  renderContentAnalysisCard();
}

// 카드 전체 렌더 (5개 카테고리 토글: 시리즈 / 캠핑장 / 음식 / 장비 / 기타)
function renderContentAnalysisCard() {
  const card = document.getElementById('content-analysis-card');
  if (!card || !_analysisData) return;
  const data = _analysisData;
  const candidates = getCandidatesForCategory(_analysisMode, data);
  const meta = getCategoryMeta(_analysisMode);

  card.innerHTML = `
    <div class="stats-section-title">📊 콘텐츠별 분석</div>

    <!-- 5개 카테고리 토글 (가로 5등분, 짧은 라벨 + 작은 폰트) -->
    <div class="ca-toggle ca-toggle-5">
      ${ANALYSIS_CATEGORIES.map(c => `
        <button class="ca-toggle-btn ${_analysisMode === c.key ? 'is-active' : ''}" data-mode="${c.key}">${c.label}</button>
      `).join('')}
    </div>

    ${candidates.length === 0 ? `
      <div class="ca-empty">아직 ${escapeHtml(meta.label)} 데이터가 없어요</div>
    ` : `
      <div class="ca-select-wrap">
        <label class="ca-select-label">🎯 ${escapeHtml(meta.label.replace(/^[^\s]+\s/, ''))} 선택</label>
        <div class="ca-cdd" id="ca-cdd">
          <button type="button" class="ca-cdd-trigger" id="ca-cdd-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span class="ca-cdd-trigger-label" id="ca-cdd-trigger-label">${(() => {
              const { name } = analysisLabelParts(_analysisMode, _analysisTarget);
              return `${renderDropdownBadge(_analysisMode, _analysisTarget)}<span class="ca-cdd-option-name">${escapeHtml(name)}</span>`;
            })()}</span>
          </button>
          <div class="ca-cdd-panel" role="listbox">
            ${candidates.map(([key, count]) => {
              const { name } = analysisLabelParts(_analysisMode, key);
              const isSel = key === _analysisTarget;
              return `
                <div class="ca-cdd-option ${isSel ? 'is-selected' : ''}" data-value="${escapeHtml(key)}" role="option" aria-selected="${isSel}">
                  ${renderDropdownBadge(_analysisMode, key)}
                  <span class="ca-cdd-option-name">${escapeHtml(name)}</span>
                  <span class="ca-cdd-option-count">${count.toLocaleString()}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>

      <div class="ca-toggle" style="margin-bottom:14px;">
        <button class="ca-toggle-btn ${_analysisPeriod === 'daily' ? 'is-active' : ''}" data-period="daily">📅 일별 (30일)</button>
        <button class="ca-toggle-btn ${_analysisPeriod === 'monthly' ? 'is-active' : ''}" data-period="monthly">📆 월별 (12개월)</button>
      </div>

      <div id="ca-charts"></div>
    `}
  `;

  // 카테고리 토글
  card.querySelectorAll('.ca-toggle-btn[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      if (mode === _analysisMode) return;
      _analysisMode = mode;
      _analysisTarget = null;
      initContentAnalysis(_analysisData);
    });
  });

  // 기간 토글
  card.querySelectorAll('.ca-toggle-btn[data-period]').forEach(btn => {
    btn.addEventListener('click', () => {
      const period = btn.dataset.period;
      if (period === _analysisPeriod) return;
      _analysisPeriod = period;
      renderContentAnalysisCard();
    });
  });

  // 커스텀 드롭다운: 트리거 클릭으로 열고/닫고, 옵션 클릭으로 선택
  const cdd = document.getElementById('ca-cdd');
  if (cdd) {
    const trigger = cdd.querySelector('.ca-cdd-trigger');
    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      cdd.classList.toggle('is-open');
      trigger.setAttribute('aria-expanded', cdd.classList.contains('is-open') ? 'true' : 'false');
    });
    cdd.querySelectorAll('.ca-cdd-option').forEach(opt => {
      opt.addEventListener('click', () => {
        _analysisTarget = opt.dataset.value;
        cdd.classList.remove('is-open');
        renderContentAnalysisCard();
      });
    });
    // 바깥 클릭 시 닫기
    document.addEventListener('click', function closeOnOutside(e) {
      if (!cdd.contains(e.target)) {
        cdd.classList.remove('is-open');
        document.removeEventListener('click', closeOnOutside);
      }
    });
  }

  if (_analysisTarget) renderContentAnalysisCharts();
}

// 차트 영역 렌더
async function renderContentAnalysisCharts() {
  const container = document.getElementById('ca-charts');
  if (!container || !_analysisData || !_analysisTarget) return;

  if (_analysisPeriod === 'monthly') {
    // 월별: stats.daily 기반 (즉시)
    const monthly = buildMonthlySeriesFromDaily(_analysisData, _analysisMode, _analysisTarget, 12);
    const mMax = Math.max(1, ...monthly.series);
    container.innerHTML = `
      ${monthly.total === 0
        ? '<div class="ca-empty">최근 12개월간 활동이 없어요<br><span style="font-size:10px;">v6 deploy(260521) 이전 카드 데이터는 부정확할 수 있어요</span></div>'
        : renderBarChart(monthly.labels, monthly.series, mMax) +
          `<div class="ca-summary">합계 ${monthly.total}회</div>`}

      <div class="ca-section-sub">🕐 시간대 히트맵 (요일×시간, KST · 최근 30일)</div>
      <div id="ca-heatmap"><div class="ca-loading">히트맵 불러오는 중...</div></div>
    `;
  } else {
    // 일별: raw events 기반 (events fetch 필요)
    container.innerHTML = `
      <div id="ca-daily"><div class="ca-loading">일별 데이터 불러오는 중...</div></div>
      <div class="ca-section-sub">🕐 시간대 히트맵 (요일×시간, KST)</div>
      <div id="ca-heatmap"><div class="ca-loading">히트맵 불러오는 중...</div></div>
    `;
  }

  // events fetch (히트맵 + 일별 모두 사용)
  try {
    const events = await loadEventsForAnalysis(30);

    // 일별 (해당 기간이 daily일 때만)
    if (_analysisPeriod === 'daily') {
      const daily = buildDailySeriesFromEvents(events, _analysisMode, _analysisTarget, 30);
      const dMax = Math.max(1, ...daily.series);
      const dailyEl = document.getElementById('ca-daily');
      if (dailyEl) {
        dailyEl.innerHTML = daily.total === 0
          ? '<div class="ca-empty">최근 30일간 활동이 없어요</div>'
          : renderBarChart(daily.dates, daily.series, dMax) +
            `<div class="ca-summary">합계 ${daily.total}회</div>`;
      }
    }

    // 시간대 히트맵
    const { heatmap, max } = buildContentHeatmap(events, _analysisMode, _analysisTarget);
    const hmEl = document.getElementById('ca-heatmap');
    if (!hmEl) return;
    if (max === 0) {
      hmEl.innerHTML = '<div class="ca-empty">최근 30일간 활동이 없어요</div>';
    } else {
      hmEl.innerHTML = renderHeatmap(heatmap, max);
    }
  } catch (e) {
    const dailyEl = document.getElementById('ca-daily');
    if (dailyEl) dailyEl.innerHTML = `<div class="ca-empty">로딩 실패: ${escapeHtml(e.message)}</div>`;
    const hmEl = document.getElementById('ca-heatmap');
    if (hmEl) hmEl.innerHTML = `<div class="ca-empty">로딩 실패: ${escapeHtml(e.message)}</div>`;
  }
}

// 캠핑장 리스트
// ════════════════════════════════════════════════════════════════════
let _campSearch = '';
function renderCampList() {
  document.getElementById('topbar-title').innerHTML = '🏕 캠핑장';
  const c = document.getElementById('app-content');
  // 좌표 등록 현황
  const total = cache.camps.length;
  const withCoord = cache.camps.filter(x => typeof x.lat === 'number' && typeof x.lng === 'number').length;
  const coordProgress = total ? Math.round(withCoord / total * 100) : 0;
  // 검색 필터: ":no-coord" 또는 "좌표없음" 입력 시 좌표 미등록만 보여주기
  let arr;
  const sq = _campSearch.trim();
  if (sq === ':no-coord' || sq === '좌표없음') {
    arr = cache.camps
      .map((x, idx) => ({ ...x, _idx: idx }))
      .filter(x => !(typeof x.lat === 'number' && typeof x.lng === 'number'));
  } else if (sq === ':coord' || sq === '좌표있음') {
    arr = cache.camps
      .map((x, idx) => ({ ...x, _idx: idx }))
      .filter(x => typeof x.lat === 'number' && typeof x.lng === 'number');
  } else {
    arr = cache.camps
      .map((x, idx) => ({ ...x, _idx: idx }))
      .filter(x => matchSearch(x, _campSearch, ['name', 'region', 'extras', 'landscape', 'seasons']));
  }

  c.innerHTML = `

      <button class="page-back" id="back-btn">← 대시보드</button>

    </div>
    <div class="search-bar">
      <div class="search-bar-input-wrap">

        <div style="width:${coordProgress}%;height:100%;background:var(--point);"></div>
      </div>
      ${withCoord < total ? `<button id="filter-no-coord" type="button" style="padding:4px 10px;background:#1a1a1a;color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;">미등록만 보기</button>` : ''}
    </div>
    <div class="list">
      ${arr.length === 0 ? '<div class="list-empty">검색 결과가 없어요</div>' : arr.map(camp => {
        const visits = camp.visits || 0;
        const seasons = (camp.seasons || []).filter(Boolean);
        const thumb = camp.imgs && camp.imgs[0]
          ? `<img src="../${camp.imgs[0].replace(/^\.\//, '')}" alt="" loading="lazy">`
          : '🏕';
        const isPub = camp.published !== false;
        const hasCoord = typeof camp.lat === 'number' && typeof camp.lng === 'number';
        // 뱃지 메타: 지역 뱃지 + 시즌 뱃지 + 횟수 텍스트 (빈 값은 생략)
        const metaParts = [];
        if (camp.region) metaParts.push(`<span class="meta-badge meta-badge--region">${escapeHtml(camp.region)}</span>`);
        if (seasons.length) metaParts.push(`<span class="meta-badge meta-badge--season">${escapeHtml(seasons.join('·'))}</span>`);
        if (visits > 0) metaParts.push(`<span class="meta-visits">${visits}회 방문</span>`);
        return `
          <div class="list-item ${isPub ? '' : 'is-unpublished'}">
            <a class="list-item-link" href="#camps/${camp._idx}">
              <div class="list-item-thumb">${thumb}</div>
              <div class="list-item-body">
                <div class="list-item-title">${escapeHtml(camp.name)}${camp.graega ? ' <span class="badge badge-graega" style="font-size:9px;padding:1px 5px;">G</span>' : ''}${!hasCoord ? ' <span title="좌표 미등록" style="font-size:11px;color:#c94a4a;">📍❌</span>' : ''}</div>
                <div class="list-item-meta-row">${metaParts.join('')}</div>
              </div>
            </a>
            ${toggleHtml(isPub, `data-camp-idx="${camp._idx}"`)}
            <a class="list-item-arrow" href="#camps/${camp._idx}">›</a>
          </div>
        `;
      }).join('')}
    </div>
  `;
  document.getElementById('back-btn').onclick = () => location.hash = '';
  // 미등록만 보기 버튼
  const filterBtn = document.getElementById('filter-no-coord');
  if (filterBtn) {
    filterBtn.onclick = () => {
      _campSearch = ':no-coord';
      renderCampList();
    };
  }
  // 토글 핸들러
  c.querySelectorAll('[data-camp-idx]').forEach(toggleEl => {
    const cb = toggleEl.querySelector('input');
    cb.addEventListener('change', async (e) => {
      e.stopPropagation();
      const idx = +toggleEl.dataset.campIdx;
      const ok = await togglePublished('camps', { idx }, e.target.checked, toggleEl);
      if (ok) {
        toggleEl.closest('.list-item').classList.toggle('is-unpublished', !e.target.checked);
      }
    });
  });
  const search = document.getElementById('camp-search');
  const searchBtn = document.getElementById('camp-search-btn');
  // 조회 동작: 검색어 갱신 + rerender (IME 조합 깨짐 방지 위해 입력 즉시 rerender X)
  const doCampSearch = () => {
    _campSearch = search.value;
    renderCampList();
  };
  searchBtn.onclick = doCampSearch;
  // 엔터키 → 조회 자동 실행 (IME 조합 중 엔터는 isComposing=true → 차단해서 한글 조합 안 깨짐)
  search.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing) {
      e.preventDefault();
      doCampSearch();
    }
  });
  // 검색어를 타이핑 중일 때만 포커스 유지 (첫 진입 시 모바일 키보드 자동 등장 방지)
  if (_campSearch.length > 0) {
    setTimeout(() => {
      const pos = _campSearch.length;
      search.focus(); search.setSelectionRange(pos, pos);
    }, 0);
  }
}

function _campImgIdBase() {
  // 캠핑장 이름 + timestamp로 md5 12자 (간단 해시)
  const str = (_campForm.name || 'camp') + Date.now();
  // 간단 hash (md5 모듈 없으니 djb2 같은 거)
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) & 0xffffffff;
  // 16진수 12자
  const hex = (h >>> 0).toString(16).padStart(8, '0');
  // 12자 필요 → 한 번 더 hash해서 채움
  let h2 = 5381;
  for (let i = 0; i < str.length; i++) h2 = ((h2 * 33) ^ str.charCodeAt(i)) & 0xffffffff;
  return (hex + (h2 >>> 0).toString(16).padStart(8, '0')).slice(0, 12);
}
