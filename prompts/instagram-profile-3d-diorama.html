<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>인스타 프로필 3D 디오라마 프롬프트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    padding: 24px 16px 48px;
    max-width: 640px;
    margin: 0 auto;
    -webkit-text-size-adjust: 100%;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .btn-copy {
    display: block;
    width: 100%;
    padding: 18px;
    font-size: 16px;
    font-weight: 600;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s, background 0.15s;
    font-family: inherit;
  }
  .btn-copy:active { transform: scale(0.98); }
  .btn-copy.success { background: #10a45c; }
  .preview {
    margin-top: 20px;
    padding: 16px;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    color: #333;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 55vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 40px;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: #fff;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: transform 0.25s ease, opacity 0.25s ease;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast.error { background: #d33; }
  .footer {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: #aaa;
  }
  .footer a {
    color: #888;
    text-decoration: none;
    border-bottom: 1px solid #ddd;
    padding-bottom: 1px;
  }
</style>
</head>
<body>
  <h1>📋 인스타 프로필 3D 디오라마</h1>
  <p class="sub">버튼을 누르면 프롬프트 전체가 클립보드에 복사돼요.<br>ChatGPT나 Sora에 바로 붙여넣기 하세요.</p>

  <button class="btn-copy" id="copyBtn">📋 프롬프트 복사하기</button>

  <div class="preview" id="preview">불러오는 중…</div>

  <div class="toast" id="toast">✓ 복사됐어요</div>

  <p class="footer">
    <a href="./instagram-profile-3d-diorama.txt" target="_blank">원본 .txt 파일 보기</a>
  </p>

<script>
  const TXT_URL = './instagram-profile-3d-diorama.txt';
  const btn = document.getElementById('copyBtn');
  const preview = document.getElementById('preview');
  const toast = document.getElementById('toast');
  let promptText = '';

  // 페이지 로드 시 .txt fetch
  fetch(TXT_URL)
    .then(r => {
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      return r.text();
    })
    .then(text => {
      promptText = text;
      preview.textContent = text;
    })
    .catch(err => {
      preview.textContent = '프롬프트를 불러올 수 없어요. 페이지를 새로고침해주세요.';
      console.error(err);
    });

  function showToast(msg, isError) {
    toast.textContent = (isError ? '⚠ ' : '✓ ') + msg;
    toast.classList.toggle('error', !!isError);
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.opacity = '0';
    ta.setAttribute('readonly', '');
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length);
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    document.body.removeChild(ta);
    return ok;
  }

  btn.addEventListener('click', async () => {
    if (!promptText) {
      showToast('아직 로드 중이에요. 잠시 후 다시 눌러주세요', true);
      return;
    }
    let success = false;
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(promptText);
        success = true;
      } else {
        success = fallbackCopy(promptText);
      }
    } catch (err) {
      // Clipboard API 실패 시 fallback
      success = fallbackCopy(promptText);
    }

    if (success) {
      btn.classList.add('success');
      btn.textContent = '✓ 복사됨!';
      showToast('복사됐어요');
      setTimeout(() => {
        btn.classList.remove('success');
        btn.textContent = '📋 프롬프트 복사하기';
      }, 1800);
    } else {
      showToast('복사 실패. 아래 텍스트를 직접 선택해주세요', true);
    }
  });
</script>
</body>
</html>
