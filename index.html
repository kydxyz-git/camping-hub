  <style>
    :root {
      --bg:#FAFAFA; --surface:#FFFFFF; --text:#111111; --text-sub:#666666;
      --line:rgba(0,0,0,0.08); --accent-soft:#EEEEEE; --point:#5E6C4F;
      --ocean-bg:#CCE5F1; --ocean-fg:#2E8BC0; --mountain-bg:#E0EAD4; --mountain-fg:#5A7D4A;
      --forest-bg:#D4E3D0; --forest-fg:#3A6B3A; --valley-bg:#DBEBFA; --valley-fg:#4A90E2;
      --river-bg:#D6EBE2; --river-fg:#5BA896; --lake-bg:#DDECF5; --lake-fg:#6A9FC4;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family:'SUIT Variable','SUIT',-apple-system,sans-serif;
      background:var(--bg); color:var(--text);
      max-width:420px; margin:0 auto; min-height:100vh;
      border-left:1px solid var(--line); border-right:1px solid var(--line);
      -webkit-font-smoothing:antialiased;
    }
    a { color:inherit; text-decoration:none; }
    button { font-family:inherit; background:none; border:none; cursor:pointer; color:inherit; }

    /* ── 헤더: 타이틀 왼쪽, 부제목 오른쪽 ── */
    .header {
      padding: 22px 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .header-left { flex-shrink: 0; }
    .header-label {
      font-size: 10px; letter-spacing: 0.2em; color: var(--point);
      font-weight: 600; text-transform: uppercase; margin-bottom: 6px;
    }
    .header-title {
      font-size: 24px; font-weight: 800;
      letter-spacing: -0.035em; line-height: 1.15;
      white-space: nowrap;
    }
    .header-right { flex-shrink: 1; text-align: right; margin-top: 22px; }
    .header-sub {
      font-size: 11.5px; color: var(--text-sub);
      font-weight: 500; line-height: 1.6;
      word-break: keep-all;
    }
    .header-badges {
      display: inline-flex; flex-wrap: wrap; gap: 5px;
      margin-top: 6px; justify-content: flex-end;
    }
    .header-badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px;
      background: #1a1a1a; color: #fff;
      font-size: 10px; font-weight: 700;
      letter-spacing: -0.01em;
      border-radius: 100px;
      white-space: nowrap;
    }
    .header-badge:empty { display: none; }
    a.header-badge:hover { background: #333; }
    .header-badge-naver {
      background: #03C75A;
    }
    .header-badge-naver-icon,
    .header-badge-icon {
      display: inline-block;
      width: 12px; height: 12px;
      margin-right: 4px;
      vertical-align: -1px;
    }
    a.header-badge.header-badge-naver:hover { background: #02b551; }
    a.header-badge { text-decoration: none; }

    /* ── 탭 바 (4개) ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--line);
      padding: 0 2px;
      background: var(--bg);
    }
    .tab-btn {
      flex: 1; padding: 8px 4px 9px;
      font-size: 12px; font-weight: 700;
      color: var(--text-sub); letter-spacing: -0.02em;
      border: 1.5px solid transparent;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      background: transparent;
      transition: all 0.15s; text-align: center;
      line-height: 1.3; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      cursor: pointer;
      position: relative; bottom: -2px;
    }
    .tab-btn:hover { color:var(--text); background:var(--accent-soft); }
    .tab-btn.active {
      background: var(--point);
      color: #fff;
      border-color: var(--point);
      border-bottom-color: var(--point);
      font-weight: 800;
    }

    /* ── 탭 콘텐츠 ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── 파트너스 면책 문구 (2줄) ── */
    .partners-notice {
      margin: 16px 20px 0;
      padding: 10px 16px;
      background: #F5F5F5;
      border-radius: 8px;
      font-size: 11.5px; color: var(--text-sub);
      line-height: 1.6; letter-spacing: -0.02em;
      text-align: center;
      word-break: keep-all;
    }
    .partners-notice span { display: block; }
    .price-notice {
      margin: 0 20px 24px;
      padding: 9px 14px;
      background: #FAFAFA;
      border: 1px solid #EEE;
      border-radius: 6px;
      font-size: 10.5px; color: var(--text-sub);
      line-height: 1.5; letter-spacing: -0.02em;
      text-align: center;
      word-break: keep-all;
    }

    /* ── 상품 카드 그리드 ── */
    .product-section { padding: 14px 16px 32px; }
    .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
    .product-card {
      display: block; background: var(--surface);
      border: 1px solid var(--line); border-radius: 10px;
      overflow: hidden; transition: transform 0.18s; cursor: pointer;
    }
    .product-card:active { transform: scale(0.97); }
    .product-thumb { width: 100%; aspect-ratio: 1/1; background: var(--accent-soft); position: relative; overflow: hidden; }
    .product-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .product-thumb.ph { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }
    .product-thumb.ph svg { width: 24px; height: 24px; opacity: 0.2; stroke: var(--text); fill: none; }
    .product-thumb.ph span { font-size: 8px; color: var(--text-sub); opacity: 0.5; font-weight: 600; letter-spacing: 0.05em; }
    .source-badge { position: absolute; bottom: 5px; right: 5px; font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 100px; color: white; letter-spacing: -0.01em; }
    .badge-coupang { background: #FF4B4B; }
    .badge-kurly   { background: #5D3CC7; }
    .badge-naver   { background: #03C75A; }
    .product-info { padding: 7px 8px 9px; }
    .product-name {
      font-size: 11px; font-weight: 700; color: var(--text);
      line-height: 1.3; letter-spacing: -0.02em;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      min-height: 28px; margin-bottom: 4px;
    }
    .product-desc {
      font-size: 9.5px; color: var(--text-sub); line-height: 1.35;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
      margin-bottom: 6px;
    }
    .product-link { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 700; color: var(--point); }
    .price-wrap { margin-bottom: 5px; }
    .price-original { font-size: 9px; color: var(--text-sub); text-decoration: line-through; letter-spacing: -0.01em; }
    .price-row { display: flex; align-items: baseline; gap: 3px; }
    .price-discount-rate { font-size: 11px; font-weight: 800; color: #E44646; letter-spacing: -0.02em; }
    .price-sale { font-size: 12px; font-weight: 800; color: var(--text); letter-spacing: -0.03em; }
    .price-only { font-size: 12px; font-weight: 800; color: var(--text); letter-spacing: -0.03em; }
    .product-link svg { width: 9px; height: 9px; fill: none; stroke: currentColor; stroke-width: 2; }
    .product-card.empty { border: 1.5px dashed var(--line); background: transparent; }
    .product-card.empty .product-name { color: var(--text-sub); font-weight: 400; font-style: italic; }

    /* ── 시리즈 ── */
    .series-section { padding: 20px 0 8px; }
    .series-group { margin-bottom:24px; position:relative; }
    .series-group-bar { height: 2px; margin: 0 20px 10px; border-radius: 100px; opacity: 0.45; }
    .series-group-title { font-size:14px; font-weight:800; letter-spacing:-0.03em; }
    .series-group-count { font-size:11px; color:var(--text-sub); font-weight:500; }
    .series-group-header { padding:0 20px 10px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; }
    .series-group-header:active { opacity:0.7; }
    .series-group-header-right { display:flex; align-items:center; gap:8px; }
    .series-chevron { width:12px; height:12px; color:var(--text-sub); transition:transform 0.28s ease; flex-shrink:0; }
    .series-group.collapsed .series-chevron { transform:rotate(-90deg); }
    .series-body { position:relative; display:grid; grid-template-rows:1fr; transition:grid-template-rows 0.3s ease, opacity 0.28s ease, margin 0.3s ease; opacity:1; }
    .series-body > .series-body-inner { position:relative; overflow:hidden; min-height:0; }
    .series-group.collapsed .series-body { grid-template-rows:0fr; opacity:0; pointer-events:none; margin-bottom:-12px; }
    .series-scroll { display:flex; gap:8px; align-items:flex-start; overflow-x:auto; padding:0 0 8px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .series-scroll::-webkit-scrollbar { display:none; }

    .series-scroll-wrap { position:relative; overflow:hidden; margin:0 20px; }
    .sa-btn {
      position: absolute;
      width: 24px;
      height: 151px;  /* ep-thumb 모바일 높이와 동일 */
      top: 0;
      background: rgba(0, 0, 0, 0.4);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0; color: #fff;
      z-index: 10;
      transition: background 0.15s;
    }
    .sa-btn:hover { background: rgba(0, 0, 0, 0.6); }
    @keyframes sa-bounce-r { 0%,100%{transform:translateX(0)} 40%{transform:translateX(4px)} }
    @keyframes sa-bounce-l { 0%,100%{transform:translateX(0)} 40%{transform:translateX(-4px)} }
    .sa-btn.sa-right:not(.sa-hide) svg { animation: sa-bounce-r 1.4s ease-in-out infinite; }
    .sa-btn.sa-left:not(.sa-hide)  svg { animation: sa-bounce-l 1.4s ease-in-out infinite; }
    .sa-btn.sa-left  { left: 0; border-radius: 0 6px 6px 0; }
    .sa-btn.sa-right { right: 0; border-radius: 6px 0 0 6px; }
    .sa-btn.sa-hide  { display: none; }
    .sa-btn svg {
      width: 12px; height: 18px;
    }
    .ep-card { flex-shrink:0; width:121px; scroll-snap-align:start; cursor:pointer; transition:transform 0.18s; display:flex; flex-direction:column; }

    .ep-card:active { transform:scale(0.96); }
    .ep-thumb { width:121px; height:151px; border-radius:8px; overflow:hidden; background:var(--accent-soft); position:relative; margin-bottom:6px; flex-shrink:0; }
    .ep-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .ep-thumb.empty { border:1.5px dashed var(--line); background:transparent; }
    .ep-thumb-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    .ep-thumb-ph svg { width:22px; height:22px; opacity:0.22; stroke:var(--text); fill:none; }
    .ep-badge { position:absolute; bottom:6px; left:6px; font-size:9px; font-weight:800; padding:2px 7px; border-radius:100px; color:white; letter-spacing:0.03em; }
    .ep-ig { position:absolute; bottom:6px; right:6px; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
    .ep-ig svg { width:11px; height:11px; fill:white; }
    .ep-name { font-size:11px; font-weight:600; color:var(--text); line-height:1.3; letter-spacing:-0.01em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; }
    .ep-name.dim { color:var(--text-sub); font-weight:400; }

    /* ── 캠핑장 ── */
    .env-section { padding:16px 16px 12px; }
    .section-label { font-size:10px; letter-spacing:0.2em; color:var(--text-sub); font-weight:700; margin:0 4px 10px; text-transform:uppercase; display:block; }
    .env-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:4px; }
    .env-btn { display:flex; flex-direction:column; align-items:center; gap:5px; padding:8px 2px 7px; border-radius:10px; transition:all 0.18s; }
    .env-btn.active { background:var(--accent-soft); }
    .env-btn.active .env-icon-wrap { outline:2px solid var(--text); outline-offset:2px; }
    .env-icon-wrap { width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; }
    .env-icon-wrap[data-t="ocean"]    {background:var(--ocean-bg);color:var(--ocean-fg)}
    .env-icon-wrap[data-t="mountain"]{background:var(--mountain-bg);color:var(--mountain-fg)}
    .env-icon-wrap[data-t="forest"]  {background:var(--forest-bg);color:var(--forest-fg)}
    .env-icon-wrap[data-t="valley"]  {background:var(--valley-bg);color:var(--valley-fg)}
    .env-icon-wrap[data-t="river"]   {background:var(--river-bg);color:var(--river-fg)}
    .env-icon-wrap[data-t="lake"]    {background:var(--lake-bg);color:var(--lake-fg)}
    .env-icon { width:22px; height:22px; }
    .env-name { font-size:10px; font-weight:600; color:var(--text); letter-spacing:-0.02em; }
    .filter-section { padding:4px 20px 14px; }
    .filter-box { background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
    .filter-box > summary { padding:13px 16px; font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center; cursor:pointer; list-style:none; }
    .filter-box > summary::-webkit-details-marker { display:none; }
    .fsum-l,.fsum-r { display:flex; align-items:center; gap:8px; }
    .filter-icon { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.8; }
    .ftotal { font-size:11px; padding:2px 9px; background:var(--text); color:var(--bg); border-radius:100px; font-weight:700; }
    .ftotal.z { display:none; }
    .chevron { transition:transform 0.2s; width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; }
    .filter-box[open] .chevron { transform:rotate(180deg); }
    .filter-body { padding:0 16px 12px; }
    .filter-row { padding:13px 0 10px; border-top:1px solid var(--line); }
    .filter-row-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .filter-row-name { font-size:10px; letter-spacing:0.2em; color:var(--text-sub); font-weight:700; text-transform:uppercase; }
    .row-cnt { font-size:10px; padding:1px 7px; background:var(--accent-soft); color:var(--text); border-radius:100px; font-weight:700; }
    .row-cnt.z { display:none; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { padding:6px 12px; background:transparent; border:1px solid var(--line); border-radius:100px; font-size:12px; color:var(--text); transition:all 0.15s; font-weight:500; cursor:pointer; }
    .chip.active { background:var(--text); color:var(--bg); border-color:var(--text); }
    .reset-row { padding:4px 20px 10px; display:flex; justify-content:flex-end; }
    .reset-btn { font-size:11px; color:var(--text-sub); text-decoration:underline; font-weight:500; cursor:pointer; }
    .count-bar { padding:6px 20px 12px; display:flex; justify-content:space-between; align-items:baseline; border-top:1px solid var(--line); }
    .count-num { font-size:20px; font-weight:800; letter-spacing:-0.02em; }
    .count-num::after { content:'개'; font-size:12px; margin-left:2px; font-weight:500; color:var(--text-sub); }
    .count-visits { font-size:13px; font-weight:600; color:var(--text-sub); margin-left:6px; letter-spacing:-0.01em; }
    .count-desc { font-size:11px; color:var(--text-sub); letter-spacing:0.05em; }
    .grid { padding:0 16px 32px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .camp-card { display:block; background:var(--surface); border-radius:8px; overflow:hidden; transition:transform 0.2s; animation:fadeUp 0.35s ease backwards; }
    .camp-card:active { transform:scale(0.97); }
    .camp-card.no-link { cursor:default; }
    .camp-card.no-link:active { transform:none; }

<script>
/* ══ 데이터 — Phase 1: 외부 JSON으로 분리됨 ══ */
/*  data/config.json, series.json, foods.json, items.json, camps.json
 *  init() 함수에서 fetch로 로드 후 값 주입됨
 */
let siteConfig = {};
let series     = [];
let foods      = [];
let items      = [];
let camps      = [];

async function loadData() {
  const files = ['config', 'series', 'foods', 'items', 'camps'];
  const results = await Promise.all(
    files.map(name => fetch(`./data/${name}.json?v=${Date.now()}`).then(r => {
      if (!r.ok) throw new Error(`${name}.json 로드 실패: ${r.status}`);
      return r.json();
    }))
  );
  siteConfig = results[0];
  series     = results[1];
  foods      = results[2];
  items      = results[3];
  camps      = results[4];
  // 데이터 로드 완료 플래그 (지도 init race condition 해결용)
  window._dataLoaded = true;
}
</script>

async function copyEmail() {
  const email = siteConfig.footerEmail;

    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(email);
    } else {
      // 폴백: execCommand
      const ta = document.createElement('textarea');
      ta.value = email; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    showToast('복사됐어요!');
  } catch (e) {
    showToast('복사에 실패했어요');
  }
}

/* ─── 랜덤 셔플 + 최근 N일 가산
   "랜덤 정렬을 유지하되, created_at 기준 7일 이내 신규 항목이 사용자에게 먼저 보이도록"
   - 최근 N일 그룹 셔플 → 그 이후 항목 셔플 → 이어붙임
   - created_at 없으면 older로 처리 */
function sortRecentFirst(arr, days) {
  const cutoff = Date.now() - (days || 7) * 86400000;
  const recent = [], older = [];
  for (const item of arr) {
    const ts = item.created_at ? new Date(item.created_at).getTime() : 0;
    if (ts && ts >= cutoff) recent.push(item);
    else older.push(item);
  }
  recent.sort(() => Math.random() - 0.5);
  older.sort(() => Math.random() - 0.5);
  return [...recent, ...older];
}

function renderSeries() {
  const wrap = document.getElementById('series-wrap');
  // 비공개 시리즈 제외 + 공개 EP만 가진 시리즈 중 빈 것도 제외
  const visibleSeries = series
    .filter(s => s.published !== false)
    .map(s => ({ ...s, eps: s.eps.filter(e => e.published !== false) }))
    .filter(s => s.eps.length > 0);
  wrap.innerHTML = visibleSeries.map(s => {
    // 정렬 모드: s.sort 필드 ('ep_desc'/'ep_asc'/'random'/'manual')
    const mode = s.sort || 'ep_desc';
    let sortedEps;
    if (mode === 'manual') {
      // 수동: 데이터 배열 순서 그대로
      sortedEps = [...s.eps];
    } else if (mode === 'random') {
      // 랜덤: 매 로드마다 셔플 + 최근 7일 신규 EP 가산 (created_at 기준)
      sortedEps = sortRecentFirst(s.eps, 7);
    } else if (mode === 'ep_asc') {
      // 오름차순: EP.01, EP.02, ... (ep=0은 맨 뒤 랜덤)
      sortedEps = [...s.eps].sort((a, b) => {
        const aHas = (a.ep || 0) > 0, bHas = (b.ep || 0) > 0;
        if (aHas && bHas) return a.ep - b.ep;
        if (aHas) return -1;
        if (bHas) return 1;
        return Math.random() - 0.5;
      });
    } else {
      // 기본: 내림차순 (최신 우선)
      sortedEps = [...s.eps].sort((a, b) => {
        const aHas = (a.ep || 0) > 0, bHas = (b.ep || 0) > 0;
        if (aHas && bHas) return b.ep - a.ep;
        if (aHas) return -1;
        if (bHas) return 1;
        return Math.random() - 0.5;
      });
    }
    const eps = sortedEps;
    const cnt = `${s.eps.length}편`;
    return `<div class="series-group">
      <div class="series-group-bar" style="background:${s.color}"></div>
      <div class="series-group-header" onclick="toggleSeries(this)">
        <span class="series-group-title">${s.emoji} ${s.name}</span>
        <div class="series-group-header-right">
          <span class="series-group-count">${cnt}</span>
          <svg class="series-chevron" viewBox="0 0 12 12" fill="none"><path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="series-body"><div class="series-body-inner">
        <button class="sa-btn sa-left sa-hide" onclick="saScroll(this,-1)"><svg width="9" height="16" viewBox="0 0 7 13" fill="none"><path d="M6 1L1 6.5L6 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="sa-btn sa-right" onclick="saScroll(this,1)"><svg width="9" height="16" viewBox="0 0 7 13" fill="none"><path d="M1 1l5 5.5L1 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div class="series-scroll-wrap">
          <div class="series-scroll" onscroll="saUpdate(this)">
            ${eps.map(ep => {
              const empty = ep.empty || !ep.url;
              const tag = empty ? 'div' : 'a';
              const attr = empty ? '' : `href="${ep.url}" target="_blank" rel="noopener"`;
              // EP 배지: url 유무와 무관하게 ep번호가 있으면 표시
              const epBadge = (ep.ep && ep.ep > 0) ? `<span class="ep-badge" style="background:${s.color}">EP.${String(ep.ep).padStart(2,'0')}</span>` : '';
              // 인스타 아이콘: 실제 인스타 주소가 입력된 경우에만
              const isInsta = ep.url && /instagram\.com/i.test(ep.url);
              // 통계 추적용 ID 기반 path
              const trackTitle = `${s.name} - ${ep.title}`.replace(/"/g, '&quot;');
              const seriesId = s.id || encodeURIComponent(s.name);
              const epId = ep.id || encodeURIComponent(ep.title);
              const trackPath = `/series/${seriesId}/${epId}`;
              const trackAttrs = `data-track-path="${trackPath}" data-track-title="${trackTitle}"`;
              return `<${tag} class="ep-card" ${attr} ${trackAttrs}>
                <div class="ep-thumb${empty?' empty':''}">
                  ${ep.thumb ? `<img src="${ep.thumb}" loading="lazy">` : `<div class="ep-thumb-ph">${PH_SVG}</div>`}
                  ${epBadge}
                  ${isInsta ? `<div class="ep-ig">${IG_SVG}</div>` : ''}
                </div>
                <div class="ep-name${empty?' dim':''}">${ep.title.replace(/^EP\.\d+\s*/i, '')}</div>
              </${tag}>`;
            }).join('')}
          </div>
        </div>
      </div></div>
    </div>`;
  }).join('');
}

/* ─── 캠핑장 슬라이드쇼 ─── */
const _timers = [];
function initSlideshow() {
  // 기존 타이머 모두 정리 (재호출 시 중복 방지)
  _timers.forEach(t => { clearInterval(t); clearTimeout(t); });
  _timers.length = 0;

  document.querySelectorAll('.camp-img').forEach(el => {
    const imgs = el.querySelectorAll('img');
    if (imgs.length < 2) return;

    // 1) 페이지 로드시 시작 이미지를 랜덤 1장 선택
    let i = Math.floor(Math.random() * imgs.length);
    imgs.forEach((img, j) => { img.style.opacity = (j === i) ? 1 : 0; });

    // 3) 카드마다 0~5000ms 사이 랜덤 시차로 첫 전환 시작 → 동시 전환 방지
    const startDelay = Math.random() * 5000;
    const tid = setTimeout(() => {
      const iv = setInterval(() => {
        // 2) 5초마다 다음 이미지로 페이드 전환
        const next = (i + 1) % imgs.length;
        imgs[i].style.opacity = 0;
        imgs[next].style.opacity = 1;
        i = next;
      }, 5000);
      _timers.push(iv);
    }, startDelay);
    _timers.push(tid);
  });
}
/* ─── 시리즈 화살표 + 아코디언 ─── */
function toggleSeries(header) {
  const g = header.closest('.series-group');
  g.classList.toggle('collapsed');
}
function saScroll(btn, dir) {
  const sc = btn.closest('.series-group').querySelector('.series-scroll');
  sc.scrollBy({left: dir * 240, behavior: 'smooth'});
}
function saUpdate(sc) {
  const g = sc.closest('.series-group');
  g.querySelector('.sa-left').classList.toggle('sa-hide', sc.scrollLeft <= 2);
  g.querySelector('.sa-right').classList.toggle('sa-hide', sc.scrollLeft + sc.clientWidth >= sc.scrollWidth - 2);
}
function saInit() {
  document.querySelectorAll('.series-group').forEach(g => {
    const sc = g.querySelector('.series-scroll');
    const noScroll = sc.scrollWidth <= sc.clientWidth + 2;
    g.querySelector('.sa-left').classList.toggle('sa-hide', noScroll || sc.scrollLeft <= 2);
    g.querySelector('.sa-right').classList.toggle('sa-hide', noScroll);
  });
}

window.addEventListener('resize', () => {
  clearTimeout(_saResizeTimer);
  _saResizeTimer = setTimeout(saInit, 100);
});
/* ─── 상품 정렬 (음식/장비 공통) ───
   mode = 'random' | 'latest' | 'manual'
   - random: 7일 이내 신규 우선 + 나머지 셔플
   - latest: created_at 내림차순 (없으면 뒤)
   - manual: 데이터 배열 순서 그대로 */
function sortProductsByMode(arr, mode) {
  if (mode === 'manual') return [...arr];
  if (mode === 'latest') {
    return [...arr].sort((a, b) => {
      const ta = a.created_at ? new Date(a.created_at).getTime() : 0;
      const tb = b.created_at ? new Date(b.created_at).getTime() : 0;
      return tb - ta;  // 내림차순
    });
  }
  // 기본: random
  return sortRecentFirst(arr, 7);
}

function renderProducts(containerId, dataArr) {
  const grid = document.getElementById(containerId);
  // 통계 추적 카테고리 (food-grid → foods, item-grid → items)
  const trackCategory = containerId === 'food-grid' ? 'foods' : containerId === 'item-grid' ? 'items' : 'product';
  // 정렬 모드: config.json의 foodsSort / itemsSort (기본 'random')
  const sortMode = trackCategory === 'foods'
    ? (siteConfig.foodsSort || 'random')
    : (siteConfig.itemsSort || 'random');
  const visible = (dataArr || []).filter(x => x.published !== false);
  const shuffled = sortProductsByMode(visible, sortMode);
  if (!shuffled.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:40px 0;text-align:center;color:var(--text-sub);font-size:13px;">아직 등록된 항목이 없어요</div>`;
    return;
  }
  grid.innerHTML = shuffled.map(item => {
    const src = (item.source||'').toLowerCase(); const bc = (src==='쿠팡'||src==='coupang')?'badge-coupang':(src==='컬리'||src==='kurly')?'badge-kurly':(src==='네이버'||src==='naver')?'badge-naver':'';
    const bl = (src==='쿠팡'||src==='coupang')?'쿠팡':(src==='컬리'||src==='kurly')?'컬리':(src==='네이버'||src==='naver')?'네이버':'';
    const empty = !item.url || item.url==='#';
    // 통계 추적 path/title — ID 기반
    const trackId = item.id || encodeURIComponent(item.name);
    const trackPath = `/${trackCategory}/${trackId}`;
    const trackTitle = (item.name || '').replace(/"/g, '&quot;');
    const trackAttrs = `data-track-path="${trackPath}" data-track-title="${trackTitle}"`;
    return `<a class="product-card${empty?' empty':''}" href="${empty?'#':item.url}" ${empty?'':' target="_blank" rel="noopener"'} ${trackAttrs}>
      <div class="product-thumb${item.thumb?'':' ph'}">
        ${item.thumb ? `<img src="${item.thumb}" loading="lazy" alt="${item.name}">` : `${PH_SVG}<span>이미지</span>`}
        ${bl ? `<span class="source-badge ${bc}">${bl}</span>` : ''}
      </div>
      <div class="product-info">
        <div class="product-name">${item.name}</div>
        ${item.desc ? `<div class="product-desc">${item.desc}</div>` : ''}
        ${(item.price_sale || item.price_original) ? `
        <div class="price-wrap">
          ${(item.price_original && item.price_sale) ? `<span class="price-original">${Number(item.price_original).toLocaleString()}원</span>` : ''}
          <div class="price-row">
            ${item.discount_rate ? `<span class="price-discount-rate">${item.discount_rate}%</span>` : ''}
            ${item.price_sale ? `<span class="price-sale">${Number(item.price_sale).toLocaleString()}원</span>` : item.price_original ? `<span class="price-only">${Number(item.price_original).toLocaleString()}원</span>` : ''}
          </div>
        </div>` : ''}
        ${!empty ? `<span class="product-link">구매하기 ${ARROW_SVG}</span>` : ''}
      </div>
    </a>`;
  }).join('');
}

/* ─── Landscape + 캠핑장 ─── */
function renderEnv() {
  document.getElementById('env-grid').innerHTML = landscapeOpts.map(o =>
    `<button class="env-btn${state.landscape.has(o.key)?' active':''}" data-key="${o.key}">
      <div class="env-icon-wrap" data-t="${o.t}">${o.svg}</div>
      <span class="env-name">${o.label}</span>
    </button>`).join('');
  document.querySelectorAll('.env-btn').forEach(b =>
    b.addEventListener('click', ()=>{ toggle(state.landscape,b.dataset.key); renderEnv(); renderGrid(); }));
}
function renderChips(id, opts, set, cntId) {
  const el = document.getElementById(id);
  el.innerHTML = opts.map(o => `<button class="chip${set.has(o)?' active':''}" data-v="${o}">${o}</button>`).join('');
  el.querySelectorAll('.chip').forEach(c =>
    c.addEventListener('click', ()=>{ toggle(set,c.dataset.v); renderChips(id,opts,set,cntId); updCnt(cntId,set.size); updTotal(); renderGrid(); }));
  updCnt(cntId, set.size);
}
function updCnt(id, n) { const e=document.getElementById(id); e.textContent=n; e.classList.toggle('z',n===0); }
function updTotal() { const n=state.region.size+state.season.size+state.extras.size; const e=document.getElementById('ftotal'); e.textContent=n; e.classList.toggle('z',n===0); }
function toggle(set, k) { set.has(k)?set.delete(k):set.add(k); }
function match(c) {
  if(state.landscape.size && !c.landscape.some(l=>state.landscape.has(l))) return false;
  if(state.region.size   && !state.region.has(c.region)) return false;
  if(state.season.size   && !c.seasons.some(s=>state.season.has(s))) return false;
  if(state.extras.size   && !c.extras.some(e=>state.extras.has(e))) return false;
  return true;
}
function sortCamps(arr) {
  return [...arr].sort((a, b) => {
    // 1. 그래가 예약 가능 캠핑장 최우선
    if (a.graega !== b.graega) return (b.graega?1:0) - (a.graega?1:0);
    // 2. 이미지 등록된 곳 우선 (imgs 배열 비어있지 않으면 1)
    const ai = (a.imgs && a.imgs.length > 0) ? 1 : 0;
    const bi = (b.imgs && b.imgs.length > 0) ? 1 : 0;
    if (ai !== bi) return bi - ai;
    // 3. 방문 횟수 내림차순
    const va = a.visits||0, vb = b.visits||0;
    if (va !== vb) return vb - va;
    // 4. 이름 가나다 순
    return a.name.localeCompare(b.name, 'ko');
  });
}
function renderGrid() {
  // 비공개 캠핑장 제외 + 사용자 필터 적용
  const visible = camps.filter(c => c.published !== false);
  const filtered = sortCamps(visible.filter(match));
  document.getElementById('result-count').textContent = filtered.length;
  // 고아웃 노지 등 삭제된 캠핑장 방문 기록 보정(+3회)
  const totalVisits = filtered.reduce((sum, c) => sum + (c.visits || 0), 0) + 3;
  document.getElementById('result-visits').textContent = totalVisits ? ` / ${totalVisits}회` : '';
  const grid = document.getElementById('camp-grid');
  if(!filtered.length){ grid.innerHTML='<div class="empty-msg">조건에 맞는 캠핑장이 없어요.</div>'; return; }
  const NOIMG_GRAD = {'바다':['#ddeef7','#c8e4f2'],'강':['#d8eef0','#c2e3e6'],'계곡':['#daeee0','#c5e5cd'],'호수':['#d8ecf4','#c2e0ed'],'숲':['#dceae0','#c8e0cc'],'산':['#ebebdf','#deded0']};
  function campThumb(c) {
    const hasImg = c.imgs && c.imgs.length;
    if (hasImg) return c.imgs.map((src,j)=>`<img src="${src}" loading="lazy" style="opacity:${j===0?1:0}" onerror="this.remove()">`).join('');
    const ls = (c.landscape && c.landscape[0]) || '산';
    const [g1, g2] = NOIMG_GRAD[ls] || ['#5a6040','#8a9060'];
    const nm = c.name.replace(/오토캠핑장|캠핑빌리지/g,'').replace(/펜션&|&펜션/g,'').trim();
    return `<div class="camp-noimg" style="background:linear-gradient(145deg,${g1},${g2})"><div class="camp-noimg-txt">${nm.split(' ').join('<br>')}</div></div>`;
  }
  function campPlatformBadge(c) {
    if (c.graega) return '<span class="camp-badge bg-graega">그래가</span>';
    if (!c.url) return '';
    const u = c.url.toLowerCase();
    if (u.includes('naver.com'))          return '<span class="camp-badge bg-naver">네이버</span>';
    if (u.includes('camfit.co.kr'))       return '<span class="camp-badge bg-camfit">캠핏</span>';
    if (u.includes('thankqcamping.com') || u.includes('camperstory.com')) return '<span class="camp-badge bg-thankq">땡큐캠핑</span>';
    return '<span class="camp-badge bg-etc">기타</span>';
  }
  grid.innerHTML = filtered.map((c,i) => {
    const hasUrl = !!c.url;
    const tag = hasUrl ? 'a' : 'div';
    const attrs = hasUrl ? `href="${c.url}" target="_blank" rel="noopener"` : '';
    const nocursor = hasUrl ? '' : 'style="cursor:default;animation-delay:'+(i*0.03)+'s" ';
    const style = hasUrl ? `style="animation-delay:${i*0.03}s"` : nocursor.slice(0,-1);
    // 통계 추적용: ID 기반 path (이름 바뀌어도 동일 ID로 누적)
    const trackId = c.id || encodeURIComponent(c.name);
    const trackAttrs = `data-track-path="/camps/${trackId}" data-track-title="${(c.name || '').replace(/"/g, '&quot;')}"`;
    return `
    <${tag} ${attrs} ${trackAttrs} class="camp-card${hasUrl?'':' no-link'}" ${style}>
      <div class="camp-img">
        ${campThumb(c)}
        ${campPlatformBadge(c)}
      </div>
      <div class="camp-info">
        <div class="camp-name">${c.name}</div>
        <div class="camp-region">${c.region}</div>
        <div class="camp-meta">
          ${c.rating ? (()=>{
            const f=Math.floor(c.rating), h=(c.rating%1)>=0.5, e=5-f-(h?1:0);
            return '<span class="camp-stars">'+'<span class="sf">★</span>'.repeat(f)+(h?'<span class="sh">☆</span>':'')+'<span style="color:#e0e0e0;font-size:9px">☆</span>'.repeat(e)+'</span>';
          })() : '<span></span>'}
          ${c.visits ? `<span class="camp-visits">${c.visits}회</span>` : ''}
        </div>
      </div>
    </${tag}>`;
  }).join('');
  setTimeout(initSlideshow, 80);
  // 마퀴: 카드가 완전히 그려진 후 측정 (탭 전환 애니메이션 + layout)
  requestAnimationFrame(() => requestAnimationFrame(applyMarquee));
  setTimeout(applyMarquee, 400);
}

/* ─── 긴 캠핑장명 좌측 스크롤 마퀴 처리 ─── */
function applyMarquee() {
  document.querySelectorAll('.camp-info .camp-name').forEach(el => {
    const text = el.dataset.fullName || el.textContent.trim();
    el.dataset.fullName = text;
    // 측정용 임시 span (CSS 동일 적용)
    const probe = document.createElement('span');
    probe.style.cssText = 'visibility:hidden;position:absolute;white-space:nowrap;font-size:12px;font-weight:700;letter-spacing:-0.02em;left:-9999px;top:0';
    probe.textContent = text;
    document.body.appendChild(probe);
    const textWidth = probe.offsetWidth;
    probe.remove();
    const containerWidth = el.offsetWidth;
    if (containerWidth > 0 && textWidth > containerWidth - 2) {
      el.classList.add('scroll');
      el.innerHTML = `<span class="scroll-track"><span>${text}</span><span>${text}</span></span>`;
    } else {
      el.classList.remove('scroll');
      el.textContent = text;
    }
  });
}

/* ─── 인스타 링크 → 인앱 브라우저는 외부 브라우저로 강제 전환 ─── */
/* 처리 케이스:
   1. 인스타 인앱 브라우저(인스타에서 kydz.kr 들어옴): 외부 기본 브라우저로 강제 열기
      → 외부 브라우저에서 OS의 Universal Link가 인스타 앱 자동 호출 (팝업 없음)
   2. 일반 모바일 브라우저(Chrome/Safari): 그대로 두기 (Universal Link 정상 작동)
   3. PC: 그대로 두기 (target=_blank 새 탭) */
(function() {
  const ua = navigator.userAgent || '';
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);
  // 인스타 인앱 브라우저 감지 (UA에 'Instagram' 포함)
  const isInstagramInApp = /Instagram/i.test(ua);
  // 페북 인앱 브라우저(FBAN/FBAV)도 같은 처리 (메타 자회사라 동작 동일)
  const isMetaInApp = isInstagramInApp || /FBAN|FBAV/i.test(ua);

  // 인스타 URL 정규화 — 앱 라우팅 안정성 (모든 환경에서 적용)
  // - /reel/, /reels/, /tv/ → /p/ (인스타 앱이 reel URL을 Universal Link로 잡지만 홈으로 떨어지는 이슈)
  // - igsh 등 share/추적 파라미터 제거 (앱 내 라우터 간섭 가능성)
  function normalizeInstagramUrl(url) {
    try {
      const u = new URL(url);
      const host = u.hostname.replace(/^www\./, '').toLowerCase();
      if (host !== 'instagram.com') return url;
      u.pathname = u.pathname.replace(/^\/(reel|reels|tv)\//i, '/p/');
      const removeParams = ['igsh', 'igshid', 'ig_rid', 'utm_source', 'utm_medium', 'utm_campaign'];
      for (const p of removeParams) u.searchParams.delete(p);
      return u.toString();
    } catch {
      return url;
    }
  }

  // 페이지 내 모든 인스타 anchor href를 미리 정규화 (이중 안전망)
  // 동적 렌더 후에도 호출 가능 (window.normalizeAllInstagramAnchors)
  function normalizeAllInstagramAnchors() {
    document.querySelectorAll('a[href*="instagram.com"]').forEach(a => {
      const orig = a.getAttribute('href');
      if (!orig) return;
      const norm = normalizeInstagramUrl(orig);
      if (norm !== orig) a.setAttribute('href', norm);
    });
  }
  window.normalizeAllInstagramAnchors = normalizeAllInstagramAnchors;
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', normalizeAllInstagramAnchors);
  } else {
    normalizeAllInstagramAnchors();
  }

  // 인스타 앱 호출용 intent:// URL 생성 (Android)
  // package=com.instagram.android 지정 시 인스타 앱 직접 호출 (앱 우선 처리)
  // S.browser_fallback_url로 앱 미설치 시 웹페이지 fallback
  function toInstaIntentUrl(url) {
    return 'intent://' + url.replace(/^https?:\/\//, '') +
      '#Intent;scheme=https;action=android.intent.action.VIEW;' +
      'category=android.intent.category.BROWSABLE;' +
      'package=com.instagram.android;' +
      'S.browser_fallback_url=' + encodeURIComponent(url) + ';end';
  }

  function openInExternalBrowser(url) {
    if (isIOS) {
      // iOS: x-safari-https:// 스킴으로 Safari 강제 호출
      const safariUrl = url.replace(/^https?:\/\//, 'x-safari-https://');
      window.location.href = safariUrl;
    } else if (isAndroid) {
      // Android 인앱: intent:// + package 미지정 → 사용자 기본 브라우저 (삼성 인터넷/Chrome 등)
      const intentUrl = 'intent://' + url.replace(/^https?:\/\//, '') +
        '#Intent;scheme=https;action=android.intent.action.VIEW;' +
        'category=android.intent.category.BROWSABLE;' +
        'S.browser_fallback_url=' + encodeURIComponent(url) + ';end';
      window.location.href = intentUrl;
    } else {
      window.open(url, '_blank', 'noopener');
    }
  }

  document.addEventListener('click', function(e) {
    const a = e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href');
    if (!href || !/^https?:\/\/(www\.)?instagram\.com/i.test(href)) return;
    const normalized = normalizeInstagramUrl(href);
    if (isMetaInApp) {
      // 인스타/페북 인앱: 외부 브라우저 강제 전환 (외부 브라우저가 다시 인스타 앱으로 Universal Link)
      e.preventDefault();
      openInExternalBrowser(normalized);
    } else if (isAndroid) {
      // Android 일반 브라우저 (Chrome/삼성 인터넷/네이버 등): intent:// + package=com.instagram.android
      // → 인스타 앱 강제 호출 (앱 설치 시 직접 앱 열림, 미설치 시 fallback URL)
      // 삼성 인터넷이 anchor href 정규화만으론 인스타 앱 호출 안 잡히는 케이스 해결
      e.preventDefault();
      window.location.href = toInstaIntentUrl(normalized);
    } else if (normalized !== href) {
      // iOS / PC: anchor href를 정규화 URL로 교체 → 브라우저 기본 navigation (Universal Link 잡힘)
      a.setAttribute('href', normalized);
    }
    // 정규화도 안 됐고 인앱/Android도 아니면 기본 동작 유지
  }, true);
})();

/* ─── 탭 전환 + 해시 라우팅 ─── */
const TAB_HASH_MAP = { 't1': 'stories', 't2': 'camps', 't3': 'foods', 't4': 'items', 't5': 'map' };
const HASH_TAB_MAP = { 'stories': 't1', 'camps': 't2', 'foods': 't3', 'items': 't4', 'map': 't5' };

function activateTab(tabId, updateHash) {
  const btn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
  const content = document.getElementById(tabId);
  if (!btn || !content) return;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  content.classList.add('active');
  // 다녀온 캠핑장 탭(t2) 진입 시 마퀴 재적용
  if (tabId === 't2' && typeof applyMarquee === 'function') {
    requestAnimationFrame(() => requestAnimationFrame(applyMarquee));
    setTimeout(applyMarquee, 300);
  }
  // 지도 탭(t5) 진입 시 lazy init
  if (tabId === 't5' && typeof initCampMap === 'function') {
    initCampMap();
  }
  if (updateHash) {
    const newHash = TAB_HASH_MAP[tabId];
    if (newHash && window.location.hash !== '#' + newHash) {
      history.replaceState(null, '', '#' + newHash);
    }
  }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab, true));
});

// ════════════════════════════════════════════════════════════════════
// 캠핑장 지도 (Leaflet + OpenStreetMap)
// 첫 진입 시 Leaflet JS lazy load → 마커 표시 → 한 번만 init
// ════════════════════════════════════════════════════════════════════
let _mapInitState = 'idle';  // 'idle' | 'loading' | 'ready'
let _mapInstance = null;

// HTML escape (메인 사이트에 공용 헬퍼 없어서 인라인 정의)
function _mapEscHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function initCampMap() {
  if (_mapInitState !== 'idle') return;  // 한 번만 init
  _mapInitState = 'loading';

  // 데이터 분류
  // 데이터가 아직 로드 안 됐으면 대기 후 재시도 (페이지 첫 진입 시 race condition)
  // camps는 빈 배열로 초기화되므로 _dataLoaded 플래그로 정확히 판정
  if (!window._dataLoaded || typeof camps === 'undefined' || !Array.isArray(camps)) {
    _mapInitState = 'idle';  // 복구해서 다음 시도 가능하게
    setTimeout(() => initCampMap(), 300);
    return;
  }
  const allCamps = camps.filter(c => c.published !== false);
  const withCoord = allCamps.filter(c => typeof c.lat === 'number' && typeof c.lng === 'number');
  const noCoord = allCamps.filter(c => !(typeof c.lat === 'number' && typeof c.lng === 'number'));

  // 좌표 없는 캠핑장 리스트 렌더
  if (noCoord.length > 0) {
    const sec = document.getElementById('map-nocoord-section');
    const list = document.getElementById('map-nocoord-list');
    sec.style.display = '';
    list.innerHTML = noCoord.map(c => {
      const attrs = c.url
        ? `href="${_mapEscHtml(c.url)}" target="_blank" rel="noopener"`
        : `href="#camps"`;
      return `<a class="map-nocoord-item" ${attrs}>${_mapEscHtml(c.name)}</a>`;
    }).join('');
  }

  // 좌표 있는 캠핑장이 0개면 빈 지도 + 안내
  if (withCoord.length === 0) {
    document.getElementById('camp-map').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-sub);font-size:13px;text-align:center;padding:20px;">' +
      '아직 좌표가 등록된 캠핑장이 없어요<br><span style="font-size:11px;opacity:0.7;">관리자 페이지에서 좌표를 추가하세요</span></div>';
    _mapInitState = 'ready';
    return;
  }

  // Leaflet JS lazy load + markercluster 플러그인
  function _loadLeafletScripts(onReady) {
    const leafletScript = document.createElement('script');
    leafletScript.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    leafletScript.crossOrigin = '';
    leafletScript.onload = () => {
      // markercluster 플러그인 로드
      const clusterScript = document.createElement('script');
      clusterScript.src = 'https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js';
      clusterScript.crossOrigin = '';
      clusterScript.onload = onReady;
      clusterScript.onerror = () => {
        // 클러스터 로드 실패해도 일반 마커로 진행
        console.warn('markercluster load failed, fallback to plain markers');
        onReady();
      };
      document.head.appendChild(clusterScript);
    };
    leafletScript.onerror = () => {
      document.getElementById('camp-map').innerHTML =
        '<div style="padding:20px;color:#c94a4a;">지도 라이브러리 로드 실패. 새로고침해주세요.</div>';
      _mapInitState = 'idle';
    };
    document.head.appendChild(leafletScript);
  }
  _loadLeafletScripts(() => _renderCampMap(withCoord));
}

function _renderCampMap(camps) {
  // 한국 중심 좌표
  const initialCenter = [36.5, 127.8];
  // 컨테이너가 display:none 상태이거나 크기 0이면 잠시 후 재시도
  const container = document.getElementById('camp-map');
  if (!container || container.offsetHeight === 0) {
    setTimeout(() => _renderCampMap(camps), 200);
    return;
  }

  const map = L.map('camp-map', {
    center: initialCenter,
    zoom: 7,
    minZoom: 7,        // 너무 축소 못하게 (한국이 충분히 채우는 정도)
    maxZoom: 17,
    zoomControl: true,
    attributionControl: true,
    // 한국 영역으로 드래그 제한 (남쪽 제주 ~ 북쪽 강원, 서쪽 백령 ~ 동쪽 독도)
    maxBounds: [
      [33.0, 124.5],  // 남서쪽 (제주 서남쪽)
      [38.7, 132.0],  // 북동쪽 (독도 동쪽)
    ],
    maxBoundsViscosity: 1.0,  // 경계 밖으로 절대 못 가게 (탄성 막)
  });
  _mapInstance = map;

  // OSM 타일
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  // EP 연결 캠핑장 ID set 만들기 (시리즈 EP의 camp_id 기준)
  const epCampIds = new Set();
  const seriesArr = (typeof series !== 'undefined' && Array.isArray(series)) ? series : [];
  for (const s of seriesArr) {
    if (s.published === false) continue;
    for (const ep of (s.eps || [])) {
      if (ep.published === false) continue;
      if (ep.camp_id) epCampIds.add(ep.camp_id);
    }
  }

  // 플랫폼 판별 헬퍼 (마커 색상 + 버튼 색상 통일)
  // borderColor: 마커 테두리용 어두운 톤 (대비 강화)
  function _getPlatform(c) {
    if (c.graega) return { key: 'graega', color: '#1a1a1a', borderColor: '#000', btnLabel: '예약사이트 →' };
    if (!c.url) return { key: 'etc', color: '#5E6C4F', borderColor: '#3a4530', btnLabel: '캠핑장 목록 보기 →' };
    const u = c.url.toLowerCase();
    if (u.includes('naver.com'))      return { key: 'naver',  color: '#03C75A', borderColor: '#017a37', btnLabel: '예약사이트 →' };
    if (u.includes('camfit.co.kr'))   return { key: 'camfit', color: '#2D8F4C', borderColor: '#1c5f31', btnLabel: '예약사이트 →' };
    if (u.includes('thankqcamping.com') || u.includes('camperstory.com')) {
      return { key: 'thankq', color: '#FF6B2C', borderColor: '#c44a14', btnLabel: '예약사이트 →' };
    }
    return { key: 'etc', color: '#5E6C4F', borderColor: '#3a4530', btnLabel: '예약사이트 →' };
  }

  // 마커 그룹 + 클러스터링
  const bounds = [];
  const cluster = (typeof L.markerClusterGroup === 'function')
    ? L.markerClusterGroup({
        showCoverageOnHover: false,
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
        disableClusteringAtZoom: 12,  // 12 이상 줌인하면 개별 마커
      })
    : null;
  // 줌 레벨 기반 마커 크기 결정
  // - level 0: 작은 핀 (줌아웃)
  // - level 1: 큰 핀 (줌인)
  function _markerSizeForZoom(z) {
    return z >= 11 ? 1 : 0;
  }
  const markerData = [];  // {marker, c, platform, hasEp}
  for (const c of camps) {
    const isGraega = !!c.graega;
    const hasEp = epCampIds.has(c.id);
    const platform = _getPlatform(c);
    // 미니멀 핀 마커 (SVG 물방울)
    // 일반: 안에 흰 원 / EP 연결: 안에 🎬 배지
    const sizeLevel = _markerSizeForZoom(map.getZoom());
    const innerHtml = hasEp
      ? `<span class="camp-pin-center-badge">🎬</span>`
      : `<span class="camp-pin-center-dot"></span>`;
    const markerHtml = `
      <div class="camp-pin ${hasEp ? 'has-ep' : ''} ${sizeLevel === 1 ? 'is-large' : ''}"
           data-name="${_mapEscHtml(c.name)}">
        <svg viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0 C5.4 0 0 5.4 0 12 C0 19.5 7.5 26 12 32 C16.5 26 24 19.5 24 12 C24 5.4 18.6 0 12 0 Z"
                fill="${platform.color}"
                stroke="${platform.borderColor}"
                stroke-width="1"/>
        </svg>
        ${innerHtml}
      </div>
    `;
    const icon = L.divIcon({
      html: markerHtml,
      className: 'camp-pin-wrap',
      iconSize: null,
      iconAnchor: [0, 0],
      popupAnchor: [0, -28],
    });
    const marker = L.marker([c.lat, c.lng], { icon, zIndexOffset: hasEp ? 1000 : 0 });
    if (cluster) cluster.addLayer(marker);
    else marker.addTo(map);
    markerData.push({ marker, c, platform, hasEp });

    // 팝업 콘텐츠
    // 이미지: 여러 장이면 슬라이드쇼 (3초 간격 자동 회전)
    const imgs = c.imgs || [];
    let imgHtml = '';
    if (imgs.length > 0) {
      const slidesId = 'cps_' + (c.id || Math.random().toString(36).slice(2, 8));
      const slidesHtml = imgs.map((src, i) => `
        <img class="camp-popup-slide ${i === 0 ? 'is-active' : ''}" data-i="${i}" src="${src}" alt="" loading="lazy">
      `).join('');
      const dotsHtml = imgs.length > 1
        ? `<div class="camp-popup-dots">${imgs.map((_, i) => `<span class="camp-popup-dot ${i === 0 ? 'is-active' : ''}" data-i="${i}"></span>`).join('')}</div>`
        : '';
      imgHtml = `
        <div class="camp-popup-slides" data-slides-id="${slidesId}" data-count="${imgs.length}">
          ${slidesHtml}
          ${dotsHtml}
        </div>
      `;
    }
    const visits = c.visits || 0;
    const metaParts = [];
    if (c.region) metaParts.push(c.region);
    if (visits > 0) metaParts.push(`${visits}회 방문`);
    if (isGraega) metaParts.push('그래가');
    if (hasEp) metaParts.push('🎬 영상 있음');
    const meta = metaParts.join(' · ');

    // EP 영상 URL 찾기 (이 캠핑장과 연결된 EP 중 첫 번째)
    let epUrl = null;
    if (hasEp) {
      for (const s of seriesArr) {
        if (s.published === false) continue;
        for (const ep of (s.eps || [])) {
          if (ep.published === false) continue;
          if (ep.camp_id === c.id && ep.url) { epUrl = ep.url; break; }
        }
        if (epUrl) break;
      }
    }

    // 버튼 영역: EP URL 있으면 [영상보기 | 예약하기] 분할, 없으면 예약만
    const bookAttrs = c.url
      ? `href="${_mapEscHtml(c.url)}" target="_blank" rel="noopener" data-track-path="/camps/${_mapEscHtml(c.id || '')}" data-track-title="${_mapEscHtml(c.name)}"`
      : `href="#camps"`;
    let btnsHtml;
    if (epUrl) {
      // 두 버튼: 영상보기 (인스타 그라데이션) | 예약하기 (플랫폼 색)
      btnsHtml = `
        <div class="camp-popup-btns">
          <a class="camp-popup-link camp-popup-link-half btn-instagram" href="${_mapEscHtml(epUrl)}" target="_blank" rel="noopener">🎬 영상보기</a>
          <a class="camp-popup-link camp-popup-link-half" style="background:${platform.color};" ${bookAttrs}>${platform.btnLabel.replace(' →', '')}</a>
        </div>
      `;
    } else {
      btnsHtml = `<a class="camp-popup-link" style="background:${platform.color};" ${bookAttrs}>${platform.btnLabel}</a>`;
    }

    const popupHtml = `
      <div class="camp-popup">
        ${imgHtml}
        <div class="camp-popup-title">${_mapEscHtml(c.name)}${hasEp ? ' <span style="font-size:11px;color:#d97a3f;">🎬</span>' : ''}</div>
        ${meta ? `<div class="camp-popup-meta">${_mapEscHtml(meta)}</div>` : ''}
        ${btnsHtml}
      </div>
    `;
    marker.bindPopup(popupHtml, { maxWidth: 240, autoPan: true });
    // 팝업 열릴 때 슬라이드쇼 시작 (3초 간격)
    if (imgs.length > 1) {
      marker.on('popupopen', (e) => {
        const popupEl = e.popup.getElement();
        if (!popupEl) return;
        const slidesContainer = popupEl.querySelector('.camp-popup-slides');
        if (!slidesContainer) return;
        const slides = popupEl.querySelectorAll('.camp-popup-slide');
        const dots = popupEl.querySelectorAll('.camp-popup-dot');
        const count = slides.length;
        let current = 0;
        // 기존 interval 정리
        if (slidesContainer._slideInterval) clearInterval(slidesContainer._slideInterval);
        slidesContainer._slideInterval = setInterval(() => {
          slides[current].classList.remove('is-active');
          if (dots[current]) dots[current].classList.remove('is-active');
          current = (current + 1) % count;
          slides[current].classList.add('is-active');
          if (dots[current]) dots[current].classList.add('is-active');
        }, 3000);
      });
      marker.on('popupclose', (e) => {
        const popupEl = e.popup.getElement();
        if (!popupEl) return;
        const slidesContainer = popupEl.querySelector('.camp-popup-slides');
        if (slidesContainer && slidesContainer._slideInterval) {
          clearInterval(slidesContainer._slideInterval);
          slidesContainer._slideInterval = null;
        }
      });
    }
    bounds.push([c.lat, c.lng]);
  }
  // 클러스터 활성화 시 한 번에 map에 추가
  if (cluster) map.addLayer(cluster);

  // 줌 변경 시 모든 마커 크기 갱신 (작은 핀/큰 핀)
  function _updateAllMarkerLabels() {
    const z = map.getZoom();
    const sizeLevel = _markerSizeForZoom(z);
    for (const { marker, c, platform, hasEp } of markerData) {
      const innerHtml = hasEp
        ? `<span class="camp-pin-center-badge">🎬</span>`
        : `<span class="camp-pin-center-dot"></span>`;
      const newHtml = `
        <div class="camp-pin ${hasEp ? 'has-ep' : ''} ${sizeLevel === 1 ? 'is-large' : ''}"
             data-name="${_mapEscHtml(c.name)}">
          <svg viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0 C5.4 0 0 5.4 0 12 C0 19.5 7.5 26 12 32 C16.5 26 24 19.5 24 12 C24 5.4 18.6 0 12 0 Z"
                  fill="${platform.color}"
                  stroke="${platform.borderColor}"
                  stroke-width="1"/>
          </svg>
          ${innerHtml}
        </div>
      `;
      const newIcon = L.divIcon({
        html: newHtml,
        className: 'camp-pin-wrap',
        iconSize: null,
        iconAnchor: [0, 0],
        popupAnchor: [0, -28],
      });
      marker.setIcon(newIcon);
    }
  }
  map.on('zoomend', _updateAllMarkerLabels);

  // 모든 마커가 보이도록 줌 자동 조정
  if (bounds.length === 1) {
    map.setView(bounds[0], 11);
  } else if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 11 });
  }

  // 지도 리사이즈 대응 (탭 전환 시 가끔 깨짐) - 여러 시점에 호출
  setTimeout(() => map.invalidateSize(), 100);
  setTimeout(() => map.invalidateSize(), 500);
  setTimeout(() => map.invalidateSize(), 1500);

  _mapInitState = 'ready';
}

// 페이지 로드 시 URL 해시에 따라 초기 탭 결정
function applyHashTab() {
  const hash = (window.location.hash || '').replace(/^#/, '').toLowerCase();
  const targetTab = HASH_TAB_MAP[hash];
  if (targetTab) activateTab(targetTab, false);
}
applyHashTab();
// 뒤로가기/앞으로가기 시 해시 변경 대응
window.addEventListener('hashchange', applyHashTab);
document.getElementById('reset-btn').addEventListener('click', () => {
  state.landscape.clear(); state.region.clear(); state.season.clear(); state.extras.clear();
  renderEnv();
  renderChips('region-chips',usedRegions,state.region,'rcnt');
  renderChips('season-chips',usedSeasons,state.season,'scnt');
  renderChips('extra-chips',autoExtras,state.extras,'ecnt');
  updTotal(); renderGrid();
});

/* ─── 초기화 ─── */
async function init() {
  try {
    await loadData();
    // camps 의존 파생 변수 계산 (비공개 제외)
    const visibleCamps = camps.filter(c => c.published !== false);
    usedRegions = filterOpts.region.filter(r => visibleCamps.some(c => c.region === r));
    usedSeasons = filterOpts.season.filter(s => visibleCamps.some(c => c.seasons.includes(s)));
    autoExtras  = [...new Set(visibleCamps.flatMap(c => c.extras))].sort((a,b) => a.localeCompare(b,'ko'));

    renderConfig();
    renderSeries();
    // 화살표 초기화: 여러 시점에 호출해서 이미지 로딩 등 타이밍 이슈 대응
    setTimeout(saInit, 50);
    setTimeout(saInit, 300);
    setTimeout(saInit, 1000);
    // 이미지 로드 완료 후에도 한 번 더
    window.addEventListener('load', saInit, { once: true });
    renderEnv();
    renderChips('region-chips', usedRegions, state.region, 'rcnt');
    renderChips('season-chips', usedSeasons, state.season, 'scnt');
    renderChips('extra-chips',  autoExtras,  state.extras, 'ecnt');
    renderGrid();
    renderProducts('food-grid', foods);
    renderProducts('item-grid', items);
  } catch (e) {
    console.error('초기화 실패:', e);
    document.body.innerHTML = `<div style="padding:40px;text-align:center;font-family:system-ui;">
      <h2 style="margin-bottom:12px;">데이터 로드 실패</h2>
      <p style="color:#666;">잠시 후 다시 시도해주세요.</p>
      <p style="color:#999;font-size:12px;margin-top:20px;">${e.message}</p>
    </div>`;
  }
}
init();
</script>

<!-- ════════════════════════════════════════════════════════════════════
     통계 추적 (Cloudflare Worker로 전송)
     - 페이지뷰: 해시 변경마다 자동
     - 외부 링크 클릭: 도메인 자동 감지
     - 검색어: 디바운스 1초 후 전송
     - 봇 차단: Worker에서 처리
     ════════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  const STATS_URL = 'https://kyd-stats.kydxyz.workers.dev/log';

  // ─── 디바이스 감지 (클라이언트 측에서 명시) ─────────────────────
  // Worker가 User-Agent에서 감지하긴 하지만, sendBeacon은 일부 환경에서 UA가
  // minimal로 전송될 수 있어 클라이언트에서 명시적으로 보내는 게 안전
  function detectDevice() {
    const ua = navigator.userAgent || '';
    if (/iPad|Tablet|tablet/i.test(ua)) return 'tablet';
    if (/Mobile|Android|iPhone|iPod|Phone/i.test(ua)) return 'mobile';
    return 'desktop';
  }
  const DEVICE = detectDevice();

  // ─── 레퍼러 분류 ────────────────────────────────────────────────
  // 어디서 유입됐는지 자동 분류 (인스타/검색/직접 등)
  function classifyReferrer() {
    const ref = document.referrer || '';
    if (!ref) return 'direct';  // 북마크, 직접 입력, 앱에서 진입
    try {
      const host = new URL(ref).hostname.toLowerCase();
      // 자기 사이트 → null (referrer로 안 침)
      if (host === location.hostname || host.endsWith('kydz.kr')) return null;
      // 분류
      if (host.includes('instagram') || host.includes('ig.me') || host.includes('cdninstagram')) return '인스타그램';
      if (host.includes('facebook') || host.includes('fb.com')) return '페이스북';
      if (host.includes('youtube') || host.includes('youtu.be')) return '유튜브';
      if (host.includes('google')) return '구글';
      if (host.includes('naver')) return '네이버';
      if (host.includes('daum') || host.includes('kakao')) return '다음/카카오';
      if (host.includes('bing')) return '빙';
      if (host.includes('graega')) return '그래가';
      // 기타: 호스트명 그대로
      return host;
    } catch { return 'direct'; }
  }
  const REFERRER = classifyReferrer();

  // 전송 함수 (sendBeacon 우선, 실패 시 fetch fallback)
  function send(payload) {
    try {
      // 모든 이벤트에 device 자동 포함 (Worker가 fallback으로 UA 봄)
      payload.device = DEVICE;
      // referrer는 페이지뷰에만 (클릭은 페이지뷰 context로 묶임)
      if (payload.type === 'pageview' && REFERRER) {
        payload.referrer = REFERRER;
      }
      const body = JSON.stringify(payload);
      let beaconOk = false;
      if (navigator.sendBeacon) {
        // sendBeacon은 같은 핸들러에서 두 번째 호출 시 false 반환 가능 (브라우저 큐 한계)
        const blob = new Blob([body], { type: 'text/plain;charset=UTF-8' });
        beaconOk = navigator.sendBeacon(STATS_URL, blob);
        if (DEBUG && !beaconOk) console.log('[kydz stats] sendBeacon returned false, falling back to fetch');
      }
      // sendBeacon이 없거나 false 반환 시 fetch fallback (keepalive로 navigation 후도 OK)
      if (!beaconOk) {
        fetch(STATS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
          body,
          keepalive: true,
          mode: 'cors',
          credentials: 'omit',
        }).then(r => {
          if (DEBUG) console.log('[kydz stats] fetch fallback:', r.status);
        }).catch(err => {
          if (DEBUG) console.log('[kydz stats] fetch fallback failed:', err.message);
        });
      } else if (DEBUG) {
        console.log('[kydz stats] sendBeacon OK');
      }
    } catch (e) {
      if (DEBUG) console.log('[kydz stats] send error:', e.message);
    }
  }

  // ─── 1) 페이지뷰 추적 ──────────────────────────────────────────────
  // 해시 변경마다 전송 (예: #, #camps, #camps/12, #series/0/3)
  // 중복 차단 (path 종류에 따라 dedup 강도 분리):
  // ▶ 방문 카운팅 (/, /#stories, /#camps 등 탭/홈):
  //   1) 메모리 1초 + 2) sessionStorage 30분 + 3) localStorage 24시간
  // ▶ 콘텐츠 클릭 (/series/xxx, /camps/xxx, /foods/xxx, /items/xxx 등 카드):
  //   1) 메모리 1초 + 2) sessionStorage 5분 (기존 유지) — 24시간은 X
  //   → 자주 본 콘텐츠가 24시간 동안 안 잡히면 인기 데이터가 왜곡되므로 콘텐츠는 짧게
  let lastPath = '';
  let lastSent = 0;
  const MEM_DEDUP_MS       = 1000;                // 1초 (공통)
  const CONTENT_DEDUP_MS   = 5 * 60 * 1000;       // 콘텐츠 클릭 5분 (기존)
  const VISIT_DEDUP_MS     = 30 * 60 * 1000;      // 방문 30분 (5분→강화)
  const VISIT_LOCAL_DEDUP  = 24 * 60 * 60 * 1000; // 방문 24시간 (신규)
  // 디버그 모드: URL에 ?debug=1 또는 localStorage.setItem('kydzm:debug', '1')
  const DEBUG = (function() {
    try {
      if (location.search.includes('debug=1')) {
        localStorage.setItem('kydzm:debug', '1');
        return true;
      }
      return localStorage.getItem('kydzm:debug') === '1';
    } catch { return false; }
  })();
  if (DEBUG) console.log('[kydz stats] debug ON, device=' + DEVICE + ', referrer=' + REFERRER);

  // 콘텐츠 경로 판별: /series/xxx, /camps/xxx, /foods/xxx, /items/xxx 형태
  // 방문 경로 (/, /#stories 등)는 false
  function isContentPath(path) {
    return /^\/(series|camps|foods|items)\/[^/]+/.test(path);
  }

  function shouldTrack(path) {
    const now = Date.now();
    const isContent = isContentPath(path);
    const sessionDedupMs = isContent ? CONTENT_DEDUP_MS : VISIT_DEDUP_MS;
    // 1) 메모리 중복 차단 (1초, 공통)
    if (path === lastPath && now - lastSent < MEM_DEDUP_MS) {
      if (DEBUG) console.log('[kydz stats] dedup 1s:', path);
      return false;
    }
    // 2) sessionStorage 중복 차단 (콘텐츠 5분 / 방문 30분)
    try {
      const key = 'kydzm:pv:' + path;
      const prev = sessionStorage.getItem(key);
      if (prev && (now - parseInt(prev, 10) < sessionDedupMs)) {
        if (DEBUG) console.log(`[kydz stats] dedup ${isContent ? '5m' : '30m'}:`, path);
        return false;
      }
      sessionStorage.setItem(key, String(now));
    } catch (e) {}
    // 3) localStorage 24시간 dedup — 방문 경로에만 적용 (콘텐츠는 X)
    if (!isContent) {
      try {
        const lkey = 'kydzm:pvd:' + path;
        const prev = localStorage.getItem(lkey);
        if (prev && (now - parseInt(prev, 10) < VISIT_LOCAL_DEDUP)) {
          if (DEBUG) console.log('[kydz stats] dedup 24h:', path);
          return false;
        }
        localStorage.setItem(lkey, String(now));
      } catch (e) {}
    }
    lastPath = path;
    lastSent = now;
    return true;
  }

  // 페이지 로드 시 24시간 지난 localStorage dedup 키 자동 정리 (lazy cleanup)
  // 방문 dedup만 localStorage 사용하므로 cleanup도 그것만
  (function cleanupOldLocalDedup() {
    try {
      const now = Date.now();
      const expired = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith('kydzm:pvd:')) continue;
        const v = localStorage.getItem(k);
        if (v && (now - parseInt(v, 10)) > VISIT_LOCAL_DEDUP) {
          expired.push(k);
        }
      }
      expired.forEach(k => localStorage.removeItem(k));
      if (DEBUG && expired.length) console.log('[kydz stats] cleanup expired dedup keys:', expired.length);
    } catch (e) {}
  })();

  function trackPageView() {
    const path = location.pathname + (location.hash || '');
    if (!shouldTrack(path)) return;
    send({
      type: 'pageview',
      path: path || '/',
      title: document.title || '',
    });
  }
  // 초기 로드
  trackPageView();
  // 해시 변경
  window.addEventListener('hashchange', trackPageView);

  // ─── 2) 외부 링크 클릭 추적 ────────────────────────────────────────
  // 도메인별 라벨 매핑
  function detectTarget(url) {
    if (!url) return null;
    const u = url.toLowerCase();
    if (u.includes('graega.co.kr') || u.includes('graega')) return '그래가';
    if (u.includes('booking.naver') || u.includes('naver.me') || u.includes('place.naver')) return '네이버예약';
    if (u.includes('campit')) return '캠핏';
    if (u.includes('thankqcamping') || u.includes('thankq')) return '땡큐캠핑';
    if (u.includes('coupang')) return '쿠팡';
    if (u.includes('kurly')) return '컬리';
    if (u.includes('naver')) return '네이버';
    if (u.includes('11st')) return '11번가';
    if (u.includes('gmarket')) return '지마켓';
    if (u.includes('ssg.com')) return 'SSG';
    if (u.includes('oasis')) return '오아시스';
    if (u.includes('ig.me') || u.includes('instagram.com')) return '인스타DM';
    if (u.startsWith('mailto:')) return '메일';
    if (u.startsWith('tel:')) return '전화';
    // 외부 도메인 (자체 도메인 제외)
    try {
      const host = new URL(url, location.href).hostname;
      if (host && host !== location.hostname && !host.endsWith('kydz.kr')) return host;
    } catch {}
    return null;
  }

  // 카드 페이지뷰 - pointerdown 단계에서 미리 발송
  // 이유: click → 새 탭 navigation 사이 매우 짧은 시간에 send 요청이 drop될 수 있음
  // pointerdown은 click보다 먼저, 새 탭 열리기 한참 전에 발생 → 안전
  function sendCardPageview(card) {
    if (!card) return;
    const cardPath = card.getAttribute('data-track-path') || '';
    const cardTitle = card.getAttribute('data-track-title') || '';
    if (!cardPath) return;
    if (DEBUG) console.log('[kydz stats] card detected:', cardPath);
    if (!shouldTrack(cardPath)) return;
    if (DEBUG) console.log('[kydz stats] sending pageview:', cardPath);
    send({
      type: 'pageview',
      path: cardPath,
      title: cardTitle,
    });
  }

  // pointerdown: 마우스/터치/펜 모두 잡음, 좌클릭만
  document.addEventListener('pointerdown', function(e) {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    const card = e.target.closest('[data-track-path]');
    if (card) sendCardPageview(card);
  }, true);  // capture 단계에서 빨리

  // 클릭 이벤트 캡쳐 (외부 링크 + fallback)
  document.addEventListener('click', function(e) {
    // 명시적 외부 채널 버튼 (data-track-target + data-track-external)
    const externalBtn = e.target.closest('[data-track-external="1"]');
    if (externalBtn) {
      const explicitTarget = externalBtn.getAttribute('data-track-target') || 'unknown';
      send({
        type: 'click',
        target: explicitTarget,
        url: externalBtn.getAttribute('href') || externalBtn.tagName.toLowerCase() === 'button' ? '#button' : '',
        context: '__external__',
      });
      return;
    }

    // 카드 fallback (키보드 Enter, 일부 접근성 도구 등 pointerdown 안 발생하는 케이스)
    const card = e.target.closest('[data-track-path]');
    let cardPath = '';
    if (card) {
      cardPath = card.getAttribute('data-track-path') || '';
      // pointerdown에서 이미 발송했으면 shouldTrack 1초 dedup에서 차단됨
      sendCardPageview(card);
    }

    // 외부 링크 클릭 추적
    const a = e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href');
    if (!href) return;
    const target = detectTarget(href);
    if (!target) return; // 내부 링크 또는 미분류 → 추적 안 함
    // context: 추적 카드 path 우선, 없으면 현재 위치 (탭 hash)
    const context = cardPath || (location.pathname + (location.hash || ''));
    send({
      type: 'click',
      target,
      url: href,
      context,
    });
  }, true);

  // ─── 3) 검색어 추적 (디바운스 1초) ────────────────────────────────
  let searchTimer = null;
  let lastSearch = { category: '', query: '' };
  document.addEventListener('input', function(e) {
    const t = e.target;
    if (!t || t.tagName !== 'INPUT') return;
    // 검색창인지 판별 (id에 'search' 포함)
    const id = (t.id || '').toLowerCase();
    if (!id.includes('search')) return;
    // 카테고리 추정 (해시 기반)
    const hash = (location.hash || '').replace(/^#/, '').split('/')[0];
    const category = hash || 'unknown';
    const query = t.value.trim();
    if (!query || query.length < 2) return; // 너무 짧으면 무시
    if (category === lastSearch.category && query === lastSearch.query) return;

    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      lastSearch = { category, query };
      send({ type: 'search', category, query });
    }, 1000); // 1초 후 전송 (타이핑 멈춤 감지)
  }, true);
})();
</script>
</body>
</html>
