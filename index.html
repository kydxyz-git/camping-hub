<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공대남자의 캠핑장 추천</title>
  <meta name="description" content="5년차 부부캠퍼 공대남자가 직접 가본 캠핑장 기록">

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css" />

  <style>
    :root[data-theme="B"] {
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --text: #111111;
      --text-sub: #666666;
      --line: rgba(0, 0, 0, 0.08);
      --accent: #333333;
      --accent-soft: #EEEEEE;
      --point: #5E6C4F;
    }
    :root[data-theme="BK"] {
      --bg: #0D0D0D;
      --surface: #1A1A1A;
      --text: #F2F2F2;
      --text-sub: #8A8A8A;
      --line: rgba(255, 255, 255, 0.08);
      --accent: #E5E5E5;
      --accent-soft: rgba(255, 255, 255, 0.06);
      --point: #E4A04A;
    }

    :root {
      --ocean-bg: #CCE5F1;       --ocean-fg: #2E8BC0;
      --mountain-bg: #E0EAD4;    --mountain-fg: #5A7D4A;
      --forest-bg: #D4E3D0;      --forest-fg: #3A6B3A;
      --valley-bg: #DBEBFA;      --valley-fg: #4A90E2;
      --river-bg: #D6EBE2;       --river-fg: #5BA896;
      --lake-bg: #DDECF5;        --lake-fg: #6A9FC4;
    }
    :root[data-theme="BK"] {
      --ocean-bg: rgba(46, 139, 192, 0.18);    --ocean-fg: #5AAEDC;
      --mountain-bg: rgba(90, 125, 74, 0.22);  --mountain-fg: #8BB275;
      --forest-bg: rgba(58, 107, 58, 0.22);    --forest-fg: #66A966;
      --valley-bg: rgba(74, 144, 226, 0.18);   --valley-fg: #7AB5F0;
      --river-bg: rgba(91, 168, 150, 0.18);    --river-fg: #7BC5B0;
      --lake-bg: rgba(106, 159, 196, 0.18);    --lake-fg: #9BC9E3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { overflow-x: hidden; }

    body {
      font-family: 'SUIT Variable', 'SUIT', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; background: none; border: none; cursor: pointer; color: inherit; }

    .theme-toggle {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--line);
    }
    .theme-label {
      font-size: 10px; color: var(--text-sub);
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .theme-btns { display: flex; gap: 4px; }
    .theme-btn {
      padding: 5px 11px;
      border-radius: 100px;
      border: 1px solid var(--line);
      font-size: 10px; font-weight: 700;
      color: var(--text-sub);
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }
    .theme-btn.active {
      background: var(--text); color: var(--bg); border-color: var(--text);
    }

    .header { padding: 36px 20px 24px; }
    .header-label {
      font-size: 11px; letter-spacing: 0.2em;
      color: var(--point); font-weight: 600;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .header-title {
      font-size: 28px; font-weight: 800;
      color: var(--text);
      letter-spacing: -0.035em; line-height: 1.15;
      margin-bottom: 8px;
    }
    .header-sub {
      font-size: 14px; color: var(--text-sub);
      font-weight: 500; line-height: 1.55;
    }

    .env-section { padding: 0 16px 14px; }
    .section-label {
      font-size: 10px; letter-spacing: 0.2em;
      color: var(--text-sub); font-weight: 700;
      margin: 0 4px 10px; text-transform: uppercase;
    }
    .env-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }
    .env-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px 2px 7px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      transition: all 0.18s;
    }
    .env-btn:hover .env-icon-wrap { transform: scale(1.06); }
    .env-btn.active { background: var(--accent-soft); }
    .env-icon-wrap {
      width: 40px; height: 40px;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.22s;
    }
    .env-icon-wrap[data-type="ocean"]    { background: var(--ocean-bg); color: var(--ocean-fg); }
    .env-icon-wrap[data-type="mountain"] { background: var(--mountain-bg); color: var(--mountain-fg); }
    .env-icon-wrap[data-type="forest"]   { background: var(--forest-bg); color: var(--forest-fg); }
    .env-icon-wrap[data-type="valley"]   { background: var(--valley-bg); color: var(--valley-fg); }
    .env-icon-wrap[data-type="river"]    { background: var(--river-bg); color: var(--river-fg); }
    .env-icon-wrap[data-type="lake"]     { background: var(--lake-bg); color: var(--lake-fg); }

    .env-btn.active .env-icon-wrap {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }
    .env-icon { width: 22px; height: 22px; }
    .env-name {
      font-size: 10px; font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .filter-section { padding: 6px 20px 16px; }
    .filter-box {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    .filter-box > summary {
      padding: 14px 16px;
      font-size: 13px; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; list-style: none; user-select: none;
    }
    .filter-box > summary::-webkit-details-marker { display: none; }
    .filter-summary-left, .filter-summary-right {
      display: flex; align-items: center; gap: 8px;
    }
    .filter-summary-right { gap: 10px; }
    .filter-icon {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none; stroke-width: 1.8;
    }
    .filter-total {
      font-size: 11px; padding: 2px 9px;
      background: var(--text); color: var(--bg);
      border-radius: 100px; font-weight: 700;
    }
    .filter-total.zero { display: none; }
    .chevron {
      transition: transform 0.2s;
      width: 14px; height: 14px;
      stroke: currentColor; fill: none; stroke-width: 2;
    }
    .filter-box[open] .chevron { transform: rotate(180deg); }
    .filter-body { padding: 0 16px 12px; }
    .filter-row {
      padding: 14px 0 12px;
      border-top: 1px solid var(--line);
    }
    .filter-row-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .filter-row-name {
      font-size: 10px; letter-spacing: 0.2em;
      color: var(--text-sub); font-weight: 700;
      text-transform: uppercase;
    }
    .row-count {
      font-size: 10px; padding: 1px 7px;
      background: var(--accent-soft); color: var(--text);
      border-radius: 100px; font-weight: 700;
    }
    .row-count.zero { display: none; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 100px;
      font-size: 12px; color: var(--text);
      transition: all 0.15s; font-weight: 500;
    }
    .chip:hover { border-color: var(--accent); }
    .chip.active {
      background: var(--text); color: var(--bg);
      border-color: var(--text);
    }

    .reset-row {
      padding: 4px 20px 12px;
      display: flex; justify-content: flex-end;
    }
    .reset-btn {
      font-size: 11px; color: var(--text-sub);
      text-decoration: underline; font-weight: 500;
    }
    .reset-btn:hover { color: var(--point); }

    .count-bar {
      padding: 8px 20px 14px;
      display: flex; justify-content: space-between; align-items: baseline;
      border-top: 1px solid var(--line);
    }
    .count-num {
      font-size: 20px; font-weight: 800;
      color: var(--text); letter-spacing: -0.02em;
    }
    .count-num::after {
      content: '개'; font-size: 12px; margin-left: 2px;
      font-weight: 500; color: var(--text-sub);
    }
    .count-desc {
      font-size: 11px; color: var(--text-sub);
      letter-spacing: 0.05em;
    }

    .grid {
      padding: 0 16px 32px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .card {
      display: block;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s;
      animation: fadeUp 0.35s ease backwards;
    }
    .card:active { transform: scale(0.97); }
    .card-image {
      width: 100%; aspect-ratio: 1 / 1.25;
      overflow: hidden;
      background: var(--accent-soft);
      position: relative;
    }
    .card-image img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .card-image img.active {
      opacity: 1;
    }
    .card-badge {
      position: absolute; top: 6px; left: 6px;
      background: var(--point); color: white;
      font-size: 9px; padding: 2px 6px;
      border-radius: 100px;
      font-weight: 700; letter-spacing: 0.03em;
      z-index: 2;
    }
    .card-dots {
      position: absolute; bottom: 6px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 3px;
      z-index: 2;
    }
    .card-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
      transition: background 0.3s;
    }
    .card-dot.active {
      background: rgba(255, 255, 255, 0.95);
    }
    .card-content { padding: 8px 8px 10px; }
    .card-name {
      font-size: 12px; font-weight: 700;
      color: var(--text);
      line-height: 1.25; letter-spacing: -0.02em;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 2px;
    }
    .card-region {
      font-size: 10px; color: var(--text-sub);
      letter-spacing: 0.02em;
    }
    .empty {
      grid-column: 1 / -1;
      padding: 60px 20px;
      text-align: center;
      color: var(--text-sub); font-size: 13px;
    }

    .footer {
      background: var(--text); color: var(--bg);
      padding: 28px 20px 24px;
      text-align: center;
    }
    .footer-actions {
      display: flex; flex-direction: column; gap: 8px;
      max-width: 280px; margin: 0 auto 18px;
    }
    .footer-btn {
      padding: 13px 20px;
      background: var(--bg); color: var(--text);
      border-radius: 8px;
      font-size: 13px; font-weight: 700;
      letter-spacing: -0.01em;
      transition: opacity 0.15s;
    }
    .footer-btn:active { opacity: 0.7; }
    .footer-collab {
      font-size: 11px; opacity: 0.6;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }
    .footer-credits {
      font-size: 10px; opacity: 0.4;
      letter-spacing: 0.05em;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  const usedRegions = new Set(camps.map(c => c.region));
  const usedSeasons = new Set(camps.flatMap(c => c.seasons));
  const visibleRegions = filterOptions.region.filter(r => usedRegions.has(r));
  const visibleSeasons = filterOptions.season.filter(s => usedSeasons.has(s));
  const autoExtraOptions = [...new Set(camps.flatMap(c => c.extras || []))]
    .sort((a, b) => a.localeCompare(b, 'ko'));


  const state = {
    landscape: new Set(),
    region: new Set(),
    season: new Set(),
    extras: new Set()
  };

  const SLIDE_INTERVAL = 3000;
  const STAGGER_MS = 400;
  let slideshowTimers = [];

  function renderHeader() {
    document.getElementById('header-label').textContent = siteConfig.headerLabel;
    document.getElementById('header-title').innerHTML = siteConfig.headerTitle;
    document.getElementById('header-sub').innerHTML = siteConfig.headerSub;
    document.getElementById('footer-collab').textContent = siteConfig.footerCollab;
  }

  function renderEnvFilters() {
    const container = document.getElementById('env-grid');
    container.innerHTML = landscapeOptions.map(o => `
      <button class="env-btn ${state.landscape.has(o.key) ? 'active' : ''}" data-key="${o.key}">
        <div class="env-icon-wrap" data-type="${o.type}">${o.svg}</div>
        <span class="env-name">${o.label}</span>
      </button>
    `).join('');
    container.querySelectorAll('.env-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        toggleSet(state.landscape, btn.dataset.key);
        renderEnvFilters();
        renderGrid();
      });
    });
  }

  function renderChips(containerId, options, set, countId) {
    const container = document.getElementById(containerId);
    container.innerHTML = options.map(o => `
      <button class="chip ${set.has(o) ? 'active' : ''}" data-key="${o}">${o}</button>
    `).join('');
    container.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        toggleSet(set, chip.dataset.key);
        renderChips(containerId, options, set, countId);
        updateRowCount(countId, set.size);
        updateFilterTotal();
        renderGrid();
      });
    });
    updateRowCount(countId, set.size);
  }

  function updateRowCount(id, n) {
    const el = document.getElementById(id);
    el.textContent = n;
    el.classList.toggle('zero', n === 0);
  }

  function updateFilterTotal() {
    const total = state.region.size + state.season.size + state.extras.size;
    const el = document.getElementById('filter-total');
    el.textContent = total;
    el.classList.toggle('zero', total === 0);
  }

  function toggleSet(set, key) {
    if (set.has(key)) set.delete(key);
    else set.add(key);
  }

  function match(camp) {
    if (state.landscape.size > 0 && !camp.landscape.some(l => state.landscape.has(l))) return false;
    if (state.region.size > 0 && !state.region.has(camp.region)) return false;
    if (state.season.size > 0) {
      const ok = camp.seasons.some(s => state.season.has(s)) || camp.seasons.includes("사계절");
      if (!ok) return false;
    }
    if (state.extras.size > 0 && !(camp.extras || []).some(e => state.extras.has(e))) return false;
    return true;
  }

  function clearSlideshows() {
    slideshowTimers.forEach(t => clearInterval(t));
    slideshowTimers = [];
  }

  function startSlideshow(cardEl, staggerIndex) {
    const imgs = cardEl.querySelectorAll('.card-image img');
    const dots = cardEl.querySelectorAll('.card-dot');
    if (imgs.length < 2) return;

    let idx = 0;
    const delay = staggerIndex * STAGGER_MS;

    const timeout = setTimeout(() => {
      const interval = setInterval(() => {
        imgs[idx].classList.remove('active');
        if (dots[idx]) dots[idx].classList.remove('active');
        idx = (idx + 1) % imgs.length;
        imgs[idx].classList.add('active');
        if (dots[idx]) dots[idx].classList.add('active');
      }, SLIDE_INTERVAL);
      slideshowTimers.push(interval);
    }, delay);
    slideshowTimers.push(timeout);
  }

  function renderGrid() {
    clearSlideshows();
    const filtered = camps.filter(match);
    document.getElementById('result-count').textContent = filtered.length;
    const grid = document.getElementById('grid');
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">조건에 맞는 캠핑장이 없어요.</div>';
      return;
    }
    grid.innerHTML = filtered.map((c, i) => {
      const href = c.reservUrl || '#';
      const target = c.reservUrl ? 'target="_blank" rel="noopener"' : '';
      const imgs = (c.images || []).map((src, imgIdx) => `
        <img src="${src}" alt="${c.name} ${imgIdx + 1}" loading="lazy" class="${imgIdx === 0 ? 'active' : ''}">
      `).join('');
      const dots = c.images && c.images.length > 1 ? `
        <div class="card-dots">
          ${c.images.map((_, di) => `<span class="card-dot ${di === 0 ? 'active' : ''}"></span>`).join('')}
        </div>
      ` : '';
      return `
        <a href="${href}" ${target} class="card" style="animation-delay: ${i * 0.03}s">
          <div class="card-image">
            ${imgs}
            ${c.graega ? '<span class="card-badge">그래가</span>' : ''}
            ${dots}
          </div>
          <div class="card-content">
            <div class="card-name">${c.name}</div>
            <div class="card-region">${c.region}</div>
          </div>
        </a>
      `;
    }).join('');

    // 슬라이드쇼 시작 (이미지 2장 이상인 카드만)
    const cards = grid.querySelectorAll('.card');
    cards.forEach((card, idx) => startSlideshow(card, idx));
  }

  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.documentElement.setAttribute('data-theme', btn.dataset.theme);
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    state.landscape.clear();
    state.region.clear();
    state.season.clear();
    state.extras.clear();
    renderEnvFilters();
    renderChips('region-chips', visibleRegions, state.region, 'region-count');
    renderChips('season-chips', visibleSeasons, state.season, 'season-count');
    renderChips('extra-chips', autoExtraOptions, state.extras, 'extra-count');
    updateFilterTotal();
    renderGrid();
  });

  document.documentElement.setAttribute('data-theme', 'B');
  renderHeader();
  renderEnvFilters();
  renderChips('region-chips', visibleRegions, state.region, 'region-count');
  renderChips('season-chips', visibleSeasons, state.season, 'season-count');
  renderChips('extra-chips', autoExtraOptions, state.extras, 'extra-count');
  updateFilterTotal();
  renderGrid();
  </script>
</body>
</html>
